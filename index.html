    setView(item.onView);
    setCheckinModalOpen(false);
  };

  return (
    <div style={{
      ...s.root,
      position: "relative",
      overflowX: "hidden"
    }}><style>{css}</style>

      {/* Global iOS 18 Glassmorphism Ambient Glows (Fixed viewport positioning for silky performance) */}
      <div style={{position: "fixed", top: -80, right: -80, width: 320, height: 320, borderRadius: "50%", background: "radial-gradient(circle, rgba(255, 107, 53, 0.15) 0%, rgba(255, 107, 53, 0) 70%)", filter: "blur(50px)", pointerEvents: "none", zIndex: 0}} />
      <div style={{position: "fixed", top: 40, left: -80, width: 280, height: 280, borderRadius: "50%", background: "radial-gradient(circle, rgba(167, 139, 250, 0.1) 0%, rgba(167, 139, 250, 0) 70%)", filter: "blur(50px)", pointerEvents: "none", zIndex: 0}} />
      <div style={{position: "fixed", top: "25vh", left: "30vw", width: 250, height: 250, borderRadius: "50%", background: "radial-gradient(circle, rgba(76, 201, 240, 0.08) 0%, rgba(76, 201, 240, 0) 70%)", filter: "blur(45px)", pointerEvents: "none", zIndex: 0}} />
      <div style={{position: "fixed", top: "40vh", right: -100, width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(255, 209, 102, 0.08) 0%, rgba(255, 209, 102, 0) 70%)", filter: "blur(55px)", pointerEvents: "none", zIndex: 0}} />
      <div style={{position: "fixed", top: "55vh", left: -120, width: 360, height: 360, borderRadius: "50%", background: "radial-gradient(circle, rgba(0, 217, 192, 0.12) 0%, rgba(0, 217, 192, 0) 70%)", filter: "blur(60px)", pointerEvents: "none", zIndex: 0}} />
      <div style={{position: "fixed", top: "70vh", right: -40, width: 270, height: 270, borderRadius: "50%", background: "radial-gradient(circle, rgba(239, 71, 111, 0.09) 0%, rgba(239, 71, 111, 0) 70%)", filter: "blur(45px)", pointerEvents: "none", zIndex: 0}} />
      <div style={{position: "fixed", bottom: "30vh", left: "20vw", width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(167, 139, 250, 0.08) 0%, rgba(167, 139, 250, 0) 70%)", filter: "blur(50px)", pointerEvents: "none", zIndex: 0}} />
      <div style={{position: "fixed", bottom: 80, right: -60, width: 320, height: 320, borderRadius: "50%", background: "radial-gradient(circle, rgba(167, 139, 250, 0.12) 0%, rgba(167, 139, 250, 0) 70%)", filter: "blur(50px)", pointerEvents: "none", zIndex: 0}} />
      <div style={{position: "fixed", bottom: -80, left: -60, width: 260, height: 260, borderRadius: "50%", background: "radial-gradient(circle, rgba(255, 107, 53, 0.07) 0%, rgba(255, 107, 53, 0) 70%)", filter: "blur(45px)", pointerEvents: "none", zIndex: 0}} />

      {isMobile && sidebarOpen && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)",zIndex:95}} onClick={()=>setSidebarOpen(false)}/>}
      <aside style={{...s.sidebar, transform: sidebarOpen ? "translateX(0)" : "translateX(-100%)", transition: "transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)"}}>
        <div style={s.logo}><span style={{color:"#FF6B35",display:"flex"}}>{IC.bolt}</span><span style={s.logoTxt}>FitForge</span></div>
        <nav style={s.nav}>
          {[
            ["dashboard","Dashboard",IC.dashboard],
            ["log","Training starten",IC.log],
            ["plans","Trainingspläne",IC.plans],
            ["history","Verlauf",IC.history],
            ["library","Bibliothek",IC.library],
            ["stats","Statistiken",IC.stats],
            ["fortschritt","Fortschritt",IC.progress],
            ["wochenplan","Wochenplan",IC.calendar],
            ["nutrition","Ernährung",(<NutritionViewIcon favFoods={favFoods} nutrition={nutrition}/>)],
            ["recipes","Rezepte",IC.recipe],
            ["goals","Ziele",IC.goals]
          ].map(([id,label,icon])=>(
            <button key={id} style={{...s.navItem,...(view===id?s.navOn:{})}} onClick={()=>{setView(id);setPresetPlanId(null);setAutoOpenAdd(null);setPresetMealType(null);closeAll();if(isMobile)setSidebarOpen(false);}}><span style={{display:"flex",flexShrink:0}}>{icon}</span><span>{label}</span></button>
          ))}
        </nav>
        <div style={{paddingTop:20, display:"flex", flexDirection:"column", gap:10}}>
          <div style={s.streakCard}><span style={{color:"#FFD166",display:"flex"}}>{IC.fire}</span><div><div style={s.streakN}>{cwDays} {cwDays === 1 ? 'Tag' : 'Tage'}</div><div style={s.streakL}>{cwSessions} {cwSessions === 1 ? 'Einheit' : 'Einheiten'}</div></div></div>
          {lastSync && <div style={{fontSize:10, color:"#444", textAlign:"center", padding:"0 10px"}}>Cloud Sync: {lastSync.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>}
        </div>
      </aside>
      <main style={{...s.main, marginLeft: isMobile ? 0 : 236, minWidth: 0, maxWidth: isMobile ? "100%" : "none", overflowX: isMobile ? "hidden" : "visible"}}>
        <div style={s.topBar}>
          <div style={{display:"flex",alignItems:"center",gap:12, flex: 1, minWidth: 0}}>
            {isMobile && <button style={{...s.iconCircle, border:"none", background:"transparent", color:"#F0EDE8", flexShrink: 0}} onClick={()=>setSidebarOpen(o=>!o)}>{sidebarOpen ? IC.x : IC.menu}</button>}
            <div style={{...s.topGreet, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", minWidth: 0}}>{user.firstName?`Hey, ${user.firstName}! 👋`:"Hey, Athlet! 👋"}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12, flexShrink: 0}}>
            {!isMobile && <span style={{fontSize:13,fontWeight:600,color:"#F0EDE8",whiteSpace:"nowrap"}}>{clkStr}</span>}
            <div style={{position:"relative"}}>
              <button className="iconBtn" style={{...s.iconCircle,...(notifOpen?s.iconOn:{})}} onClick={()=>{setNotifOpen(o=>!o);setProfileOpen(false);}}>
                {IC.bell}{unread>0&&<span style={s.badge}>{unread}</span>}
              </button>
              {notifOpen&&<div style={{...s.dropdown, background: "#16161A", backdropFilter: "none", WebkitBackdropFilter: "none", border: "1px solid #1E1E24", width: isMobile ? "280px" : 350, right: isMobile ? "-16px" : 0}} className="dropIn" onClick={e=>e.stopPropagation()}>
                <div style={s.ddHead}><span style={s.ddTitle}>Benachrichtigungen</span>{unread>0&&<button className="markAllBtn" onClick={markAll}>Alle lesen</button>}</div>
                <div style={{maxHeight:320,overflowY:"auto"}}>
                  {!notifs.length&&<div style={{padding:"36px 18px",textAlign:"center",color:"#555",fontSize:13}}>Alles erledigt 🎉</div>}
                  {notifs.map(n=>(<div key={n.id} style={{...s.nRow,...(n.read?{}:s.nRowU)}} className="notifRow" onClick={()=>markRead(n.id)}>
                    <div style={{width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,background:"#1A1A1F"}}>{{training:"💪",reminder:"📅",warning:"⚠️",achievement:"🏆"}[n.type]||"🔔"}</div>
                    <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:12}}>{n.title}</div><div style={{color:"#888",fontSize:11,marginTop:2}}>{n.body}</div><div style={{color:"#555",fontSize:10,marginTop:2}}>{timeAgo(n.ts)}</div></div>
                    {!n.read&&<div style={{width:7,height:7,borderRadius:"50%",background:"#FF6B35",flexShrink:0,marginTop:4}}/>}
                    <button style={{background:"transparent",border:"none",color:"#444",cursor:"pointer",padding:3,display:"flex"}} onClick={e=>{e.stopPropagation();delNotif(n.id);}}>{IC.x}</button>
                  </div>))}
                </div>
                {user.notificationsEnabled&&<div style={{padding:"10px 16px",background:"#0F0F11",borderTop:"1px solid #1E1E24",fontSize:11,color:"#666"}}>🔔 Erinnerungen um {user.reminderTime} Uhr</div>}
              </div>}
            </div>
            <div style={{position:"relative"}}>
              <button style={{...s.avatarBtn,...(profileOpen?s.avatarOn:{})}} onClick={()=>{setProfileOpen(o=>!o);setNotifOpen(false);}}>
                {user.avatar?<img src={user.avatar} alt="av" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={s.initials}>{getInitials(user)}</span>}
              </button>
              {profileOpen&&<div style={{...s.dropdown,width:250}} className="dropIn" onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 18px"}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#FF6B35,#FF8C60)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
                    {user.avatar?<img src={user.avatar} alt="av" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}/>:<span style={{fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:800,color:"#fff"}}>{getInitials(user)}</span>}
                  </div>
                  <div style={{minWidth:0}}><div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:800,fontSize:14}}>{user.firstName||user.lastName?`${user.firstName} ${user.lastName}`.trim():"Kein Name"}</div><div style={{color:"#666",fontSize:11,marginTop:2}}>{user.email||"Keine E-Mail"}</div><div style={{color:"#FF6B35",fontSize:10,fontWeight:600,marginTop:2}}>{user.goal}</div></div>
                </div>
                <div style={{height:1,background:"#1E1E24",margin:"0 16px"}}/>
                <div style={{display:"flex",padding:"12px 16px",gap:14}}>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}><span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:800,fontSize:14}}>{data.workouts.length}</span><span style={{color:"#666",fontSize:10}}>Trainings</span></div>
                  {user.weight&&<div style={{display:"flex",flexDirection:"column",gap:2}}><span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:800,fontSize:14}}>{user.weight}kg</span><span style={{color:"#666",fontSize:10}}>Gewicht</span></div>}
                </div>
                <div style={{height:1,background:"#1E1E24",margin:"0 16px"}}/>
                <button className="profEditBtn" style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"transparent",border:"none",color:"#aaa",cursor:"pointer",padding:"12px 16px",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>{setProfileOpen(false);setView("profile");}}>
                  {IC.edit} Profil bearbeiten
                </button>

                <div style={{padding:"8px 16px 6px",fontSize:10,color:"#444",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🔑 {authUser?.email}</div>
                <button style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"transparent",border:"none",color:"#06D6A0",cursor:"pointer",padding:"12px 16px",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>{setProfileOpen(false); rescueWorkouts();}}>
                  <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                  Daten retten
                </button>
                <button style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"transparent",border:"none",color:"#EF476F",cursor:"pointer",padding:"10px 16px 14px",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}} onClick={async()=>{setProfileOpen(false);await window.firebaseSignOut();}}>
                  <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                  Abmelden
                </button>
              </div>}
            </div>
          </div>
        </div>
        {(profileOpen||notifOpen)&&<div style={s.veil} onClick={closeAll}/>}
        {toast&&<div style={{...s.toast,...(toast.type==="error"?s.toastErr:{})}} className="dropIn">{toast.type==="success"?IC.check:IC.x} {toast.msg}</div>}
        <div key={animK} className="pageEnter">
          {view==="dashboard"&&<Dashboard data={data} user={user} onLog={()=>{setActiveWorkout(null); setPresetPlanId(null); setView("log");}} onView={setView} streak={streak} totalVol={totalVol} thisWeek={thisWeek} todayNut={todayNut} isMobile={isMobile} checklist={checklist} onChecklistItemClick={onChecklistItemClick}/>}
          {view==="plans"&&<Plans data={data} setData={setData} onNew={()=>setPlanModal(true)} onEdit={p=>{setEditPlan(p);setPlanModal(true);}} notify={showToast} library={library}/>}
          {view==="library"&&<LibraryPage library={library} setLibrary={setLibrary} notify={showToast}/>}
          {view==="wochenplan"&&<WochenplanPage weekPlans={weekPlans} setWeekPlans={setWeekPlans} data={data} user={user} library={library} notify={showToast}/>}
          {view==="log"&&<LogWorkout user={user} setUser={setUser} data={data} setData={setData} notify={showToast} prs={prs} onSavePR={savePR} library={library} activeWorkout={activeWorkout} setActiveWorkout={setActiveWorkout} presetPlanId={presetPlanId} setView={setView} isMobile={isMobile}/>}
          {view==="history"&&<History data={data} setData={setData} selWO={selWO} setSelWO={setSelWO} notify={showToast} library={library} setWeeklyReport={setWeeklyReport} isMobile={isMobile}/>}
          {view==="stats"&&<Stats data={data} prs={prs} nutrition={nutrition} user={user}/>}
          {view==="fortschritt"&&<ProgressPage data={data} setData={setData} user={user} notify={showToast} isMobile={isMobile} autoOpenAdd={autoOpenAdd==="fortschritt"}/>}
          {view==="nutrition"&&<Nutrition nutrition={nutrition} setNutrition={setNutrition} user={user} notify={showToast} favFoods={favFoods} setFavFoods={setFavFoods} isMobile={isMobile} autoOpenAdd={autoOpenAdd==="nutrition"} presetMealType={presetMealType}/>}
          {view==="recipes"&&<RecipesPage notify={showToast} isMobile={isMobile}/>}
          {view==="goals"&&<GoalsPage user={user} setUser={setUser} data={data} notify={showToast} isMobile={isMobile}/>}
          {view==="profile"&&<ProfilePage user={user} setUser={setUser} notify={showToast} isMobile={isMobile}/>}
        </div>
      </main>
      {logModal&&<QuickLogModal data={data} setData={setData} onClose={()=>setLogModal(false)} notify={showToast}/>}
      {planModal&&<PlanModal data={data} setData={setData} editPlan={editPlan} library={library} onClose={()=>{setPlanModal(false);setEditPlan(null);}} notify={showToast}/>}
      {weeklyReport&&<WeeklyReportModal report={weeklyReport} onClose={()=>setWeeklyReport(null)} data={data}/>}
      {checkinModalOpen&&<DailyCheckinModal checklist={checklist} onItemClick={onChecklistItemClick} onClose={()=>setCheckinModalOpen(false)}/>}
      {rescueModalOpen&&<RescueModal 
        progress={rescueScanProgress} 
        workouts={rescuedWorkouts} 
        plans={rescuedPlans} 
        weightHistory={rescuedWeight}
        log={rescueLog} 
        onClose={()=>setRescueModalOpen(false)} 
        onMerge={executeRescueMerge}
      />}

      {/* ── Active Workout Floating Preview ───────────────────────────────── */}
      {activeWorkout && view !== 'log' && (
        <div style={{
          position:"fixed",
          bottom:22,
          right:22,
          zIndex:2000,
          background:"#1A1A1F",
          border:"1px solid #FF6B35",
          borderRadius:18,
          padding: "16px 20px",
          display:"flex",
          alignItems:"center",
          gap:14,
          boxShadow:"0 16px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,107,53,0.1)",
          cursor:"pointer",
          backdropFilter:"blur(12px)",
        }} className="dropIn" onClick={()=>setView('log')}>
           <div style={{width:40,height:40,borderRadius:12,background:activeWorkout.running?"#FF6B3520":"#4442",display:"flex",alignItems:"center",justifyContent:"center",color:"#FF6B35"}}>
             {activeWorkout.running ? (
               <div style={{width:16,height:16,border:"3px solid #FF6B35",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
             ) : IC.log}
           </div>
           <div>
             <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
               <span style={{fontFamily:"'DM Sans',sans-serif",fontWeight:800,fontSize:18,color:"#FF6B35",letterSpacing:0.5}}>{fmtTimer(activeWorkout.timer)}</span>
               <span style={{fontSize:10,background:"#FF6B3520",color:"#FF6B35",padding:"1px 6px",borderRadius:6,fontWeight:800}}>{activeWorkout.running?"AKTIV":"PAUSE"}</span>
             </div>
             <div style={{fontSize:11,color:"#F0EDE8",fontWeight:700,maxWidth:140,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
               {activeEx ? activeEx.name : "Workout läuft..."}
             </div>
           </div>
           <div style={{width:32,height:32,borderRadius:"50%",background:"#2A2A30",display:"flex",alignItems:"center",justifyContent:"center",color:"#888",marginLeft:6}}>
             <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path d="M9 5l7 7-7 7"/></svg>
           </div>
        </div>
      )}
    </div>
  );
}
function Dashboard({data,user,onLog,onView,totalVol,thisWeek,todayNut,isMobile,checklist,onChecklistItemClick}){
  const cwDays = new Set(thisWeek.map(w => new Date(w.date).toDateString())).size;
  const cwSessions = thisWeek.length;
  const last=[...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const today=new Date(),tn=FULL_WEEKDAYS[today.getDay()===0?6:today.getDay()-1];
  const todayPlan=data.plans.find(p=>p.days.includes(tn));
  const calGoal=parseInt(user.calorieGoal)||2500,protGoal=parseInt(user.proteinGoal)||150;
  const tnC = parseInt(todayNut.calories)||0, tnP = parseFloat(todayNut.protein)||0, tnCa = parseFloat(todayNut.carbs)||0, tnF = parseFloat(todayNut.fat)||0;
  return(<div style={{
    ...s.page,
    padding: isMobile ? "10px 10px 80px" : s.page.padding
  }}>
    <div style={{position: "relative", zIndex: 1}}>
      <div style={{...s.hero, height: isMobile ? 220 : 300, borderRadius: isMobile ? 16 : 20, boxShadow: "0 10px 30px rgba(0,0,0,0.5)"}}>
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=800&q=80" alt="gym" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(120deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.3) 100%)"}}/>
        <div style={{position:"absolute",inset:0,padding: isMobile ? 24 : 40,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
          <h1 style={{fontFamily:"'DM Sans',sans-serif",fontSize: isMobile ? 28 : 40,fontWeight:800,margin:0,lineHeight:1.1,color:"#fff"}}>{user.firstName?`Bereit, ${user.firstName}? 🔥`:"Guten Tag 👋"}</h1>
          <div style={{display:"flex", flexDirection:"column", alignItems:"flex-start"}}>
            {todayPlan&&<div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.12)",backdropFilter:"blur(12px)",borderRadius:20,padding:"6px 14px",fontSize: isMobile ? 11 : 13,color:"#fff",marginBottom:18,width:"fit-content"}}><span style={{width:8,height:8,borderRadius:"50%",background:todayPlan.color,display:"inline-block"}}/> Heute: {todayPlan.name}</div>}
            <button style={{...s.primaryBtn, width: "fit-content", padding: isMobile ? "7px 14px" : "8px 16px", fontSize: isMobile ? 13 : 14}} onClick={onLog}>{IC.plus} Training starten</button>
          </div>
        </div>
      </div>
      <div className="glass-card" style={{marginBottom:18, marginTop:18}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
          <h2 style={s.secTitle}>Daily Check-in</h2>
          <span style={{fontSize:12, fontWeight:700, color: checklist.every(c=>c.done) ? "#06D6A0" : "#888"}}>
            {checklist.filter(c=>c.done).length}/{checklist.length}
          </span>
        </div>
        <div style={{display:"flex", flexDirection: isMobile ? "column" : "row", gap:10, alignItems: isMobile ? "stretch" : "flex-start"}}>
          <ChecklistRow item={checklist.find(c=>c.group==="weight")} onClick={onChecklistItemClick}/>
          <div style={{flex: isMobile ? "initial" : 1.6, minWidth:0, width: isMobile ? "100%" : "auto"}}>
            <ChecklistGroupHeader label="Mahlzeiten" items={checklist.filter(c=>c.group==="meal")}/>
            <div style={{display:"grid", gridTemplateColumns:"repeat(2, 1fr)", gap:6}}>
              {checklist.filter(c=>c.group==="meal").map(item=>(
                <ChecklistChip key={item.key} item={item} onClick={onChecklistItemClick}/>
              ))}
            </div>
          </div>
          <ChecklistRow item={checklist.find(c=>c.group==="training")} onClick={onChecklistItemClick}/>
        </div>
      </div>
      <div style={{...s.statsRow, gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : s.statsRow.gridTemplateColumns}}>
        {[[data.workouts.length,"Trainings",IC.dumbbell,"#FF6B35"],[cwDays,"Tage diese Woche",IC.fire,"#FFD166"],[`${cwSessions}`,"Einheiten",IC.trophy,"#00D9C0"],[`${Math.round((totalVol||0)/1000)}k kg`,"Volumen",IC.bolt,"#A78BFA"]].map(([v,l,ic,c],i)=>(
          <div key={i} className="glass-stat">
            <div style={{color:c,display:"flex",marginBottom:8, transform: isMobile ? "scale(0.9)" : "none"}}>{ic}</div>
            <div style={{...s.statV, fontSize: isMobile ? 20 : 24}}>{v}</div>
            <div style={{...s.statL, fontSize: isMobile ? 10 : 11, color: "rgba(255,255,255,0.5)"}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr",gap:18,marginBottom:28}}>
        <div className="glass-card">
          <h2 style={{...s.secTitle,marginBottom:14}}>Diese Woche</h2>
          <div style={s.weekGrid}>{WEEKDAYS.map((day,i)=>{
            const full=FULL_WEEKDAYS[i];
            const done=thisWeek.some(w=>{const d=new Date(w.date);return(d.getDay()===0?6:d.getDay()-1)===i;});
            const isToday=(today.getDay()===0?6:today.getDay()-1)===i;
            const hasPlan=data.plans.some(p=>p.days.includes(full));
            return(<div key={day} style={{
              ...s.dayCell,
              background: done ? "rgba(255, 107, 53, 0.12)" : "rgba(255, 255, 255, 0.05)",
              backdropFilter: "blur(8px)",
              WebkitBackdropFilter: "blur(8px)",
              borderColor: done?"#FF6B35":(isToday?"#FF6B35":"rgba(255, 255, 255, 0.08)"),
              borderWidth: isToday ? 2 : 1,
              boxShadow: "inset 0 1px 0 rgba(255,255,255,0.05)",
              padding: isMobile ? "8px 2px" : "10px 4px"
            }}><span style={{fontSize:9,fontWeight:600,color:done?"#fff":"rgba(255,255,255,0.4)"}}>{day}</span>{done&&<span style={{color:"#FF6B35",display:"flex", transform: "scale(0.8)"}}>{IC.check}</span>}{!done&&hasPlan&&<span style={{width:4,height:4,borderRadius:"50%",background:"rgba(255,255,255,0.2)"}}/>}</div>);
          })}</div>
        </div>
        <div className="glass-card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h2 style={s.secTitle}>Ernährung heute</h2></div>
          <div style={{display:"flex",justifyContent:"space-around",alignItems:"center", gap: isMobile ? 8 : 0, overflowX: isMobile ? "auto" : "visible", paddingBottom: isMobile ? 8 : 0}}>
            <DonutChart value={tnC} max={calGoal} color="#FF6B35" size={isMobile ? 56 : 68} label={`${tnC} kcal`}/>
            <DonutChart value={tnP} max={protGoal} color="#00D9C0" size={isMobile ? 56 : 68} label={`${Math.round(tnP)}g Prot`}/>
            <DonutChart value={tnCa} max={Math.round(calGoal*0.5/4)} color="#FFD166" size={isMobile ? 56 : 68} label={`${Math.round(tnCa)}g Carb`}/>
            <DonutChart value={tnF} max={Math.round(calGoal*0.3/9)} color="#A78BFA" size={isMobile ? 56 : 68} label={`${Math.round(tnF)}g Fett`}/>
          </div>
        </div>
      </div>
      {last&&(<div><h2 style={s.secTitle}>Letztes Training</h2><div className="glass-recent" onClick={()=>onView("history")}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:16,fontWeight:700}}>{last.name}</div>{last.hiitMode && <div style={{display:"flex",color:"#FFD166"}} className="hiit-glow">{IC.bolt}</div>}</div><div style={{display:"flex",gap:4,color:"rgba(255,255,255,0.5)",fontSize:12,alignItems:"center", flexWrap:"wrap"}}>{IC.clock} {last.duration} Min · {last.exercises.length} Übungen · {fmtDate(last.date)}</div>{last.note&&<div style={{marginTop:8,color:"rgba(255,255,255,0.7)",fontSize:12,fontStyle:"italic"}}>„{last.note}"</div>}</div><div style={{fontSize:20,color:"rgba(255,255,255,0.3)", marginLeft: 10}}>→</div></div></div>)}
    </div>
  </div>);}

const MEASUREMENT_TYPES = ["Bauchumfang (cm)", "Brustumfang (cm)", "Oberarm L (cm)", "Oberarm R (cm)", "Oberschenkel L (cm)", "Oberschenkel R (cm)", "Wade L (cm)", "Wade R (cm)"];

function ProgressPage({data,setData,user,notify,isMobile,autoOpenAdd}){
  const [showAddWeight,setShowAddWeight]=useState(!!autoOpenAdd);
  const [newWeight,setNewWeight]=useState(user.weight||"");
  const [weightDate,setWeightDate]=useState(todayStr());
  const [showUploadPhoto,setShowUploadPhoto]=useState(false);
  const [photoTag,setPhotoTag]=useState("Vorne");
  const [photoDate,setPhotoDate]=useState(todayStr());
  const [compareMode,setCompareMode]=useState(false);
  const [compareIds,setCompareIds]=useState([]);
  const [showAddMeasure,setShowAddMeasure]=useState(false);
  const [measureForm,setMeasureForm]=useState({date:todayStr(), values:{}});
  const [showHistory,setShowHistory]=useState(false);
  const [showMeasureDetails, setShowMeasureDetails] = useState(false);

  const weightHistory = data.weightHistory || [];
  const weightPoints = weightHistory.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(h=>h.value);
  const photos = data.photos || [];
  const measurements = data.measurements || [];
  
  const weightValues = weightHistory.map(h => h.value);
  const overallMax = weightValues.length ? Math.max(...weightValues) : "--";
  const overallMin = weightValues.length ? Math.min(...weightValues) : "--";

  const [activePhoto, setActivePhoto] = useState(null);

  const addWeight=()=>{
    const val=parseFloat(newWeight);
    if(isNaN(val)) return notify("Ungültiges Gewicht","error");
    const entry={date:weightDate, value:val};
    setData(d=>({...d, weightHistory:[...weightHistory.filter(h=>h.date!==weightDate), entry]}));
    notify("Gewicht gespeichert! ⚖️");
    setShowAddWeight(false);
  };

  const delWeight=(date)=>{
    setData(d=>({...d, weightHistory:d.weightHistory.filter(h=>h.date!==date)}));
    notify("Eintrag gelöscht");
  };

  const handlePhotoUpload=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    notify("Foto wird hochgeladen...");
    try {
      const url = await uploadToStorage(file, `${authUser.uid}/progress/${Date.now()}_${file.name}`);
      const newPhoto = { id: Date.now(), date: photoDate, url, tag: photoTag };
      setData(d=>({...d, photos:[newPhoto, ...(d.photos||[])]}));
      notify("Foto gespeichert! 📸");
      setShowUploadPhoto(false);
    } catch(err) {
      notify("Upload fehlgeschlagen","error");
    }
  };

  const delPhoto=(id)=>{
    setData(d=>({...d, photos:d.photos.filter(p=>p.id!==id)}));
    notify("Foto gelöscht");
  };

  const toggleCompare=(id)=>{
    if(compareIds.includes(id)) setCompareIds(curr=>curr.filter(x=>x!==id));
    else if(compareIds.length < 2) setCompareIds(curr=>[...curr, id]);
  };

  const saveMeasure=()=>{
    if(!measureForm.date) return notify("Datum fehlt","error");
    setData(d=>({...d, measurements:[{...measureForm, id:Date.now()}, ...(d.measurements||[])]}));
    notify("Maße gespeichert! 📏");
    setShowAddMeasure(false);
  };

  const delMeasure=(id)=>{
    setData(d=>({...d, measurements:d.measurements.filter(m=>m.id!==id)}));
    notify("Maße gelöscht");
  };

  return(<div style={{...s.page, padding: isMobile ? "10px 10px 80px" : s.page.padding, width: "100%", maxWidth: "100%", boxSizing: "border-box", minWidth: 0, overflowX: "hidden"}}>
    <div style={isMobile ? {display: "flex", flexDirection: "column", gap: 12, marginBottom: 20, width: "100%"} : s.pageHead}>
      <div><h1 style={s.pageTitle}>Fortschritt</h1><p style={s.pageSub}>Verfolge deine körperliche Entwicklung</p></div>
      <div style={isMobile ? {display: "flex", gap: 8, width: "100%", overflowX: "auto", paddingBottom: 6, msOverflowStyle: "none", scrollbarWidth: "none", WebkitOverflowScrolling: "touch"} : {display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center"}}>
        <button style={{...s.secBtn, flex: "0 0 auto", padding: isMobile ? "10px 14px" : s.secBtn.padding, display: "flex", justifyContent: "center", alignItems: "center", gap: 6, fontSize: isMobile ? 13 : 14}} onClick={()=>setShowHistory(true)}>
          {IC.history} Verlauf
        </button>
        <button style={{...s.secBtn, flex: "0 0 auto", padding: isMobile ? "10px 14px" : s.secBtn.padding, display: "flex", justifyContent: "center", alignItems: "center", gap: 6, fontSize: isMobile ? 13 : 14}} onClick={()=>setCompareMode(!compareMode)}>
          {compareMode ? IC.x : "Vergleichen"}
        </button>
        {!isMobile && <div style={{width: 1, height: 24, background: "rgba(255,255,255,0.08)", margin: "0 4px"}}/>}
        <button style={{...s.secBtn, flex: "0 0 auto", padding: isMobile ? "9px 13px" : s.secBtn.padding, display: "flex", justifyContent: "center", alignItems: "center", gap: 6, background: "rgba(167,139,250,0.15)", borderColor: "#A78BFA", color: "#A78BFA", textShadow: "0 0 10px rgba(167,139,250,0.5)", boxShadow: "0 0 15px rgba(167,139,250,0.3), inset 0 0 10px rgba(167,139,250,0.2)", fontSize: isMobile ? 13 : 14}} onClick={()=>setShowAddMeasure(true)}>
          {IC.ruler} Maße
        </button>
        <button style={{...s.primaryBtn, flex: "0 0 auto", padding: isMobile ? "10px 14px" : s.primaryBtn.padding, display: "flex", justifyContent: "center", alignItems: "center", gap: 6, fontSize: isMobile ? 13 : 14}} onClick={()=>setShowAddWeight(true)}>
          {IC.plus} Gewicht
        </button>
      </div>
    </div>

    {compareMode && (
      <div style={isMobile ? { ...s.card, width: "100%", minWidth: 0, padding: 16, marginBottom: 22, border: "1px solid #FF6B35", maxWidth: "100%", boxSizing: "border-box" } : { ...s.card, marginBottom: 22, border: "1px solid #FF6B35" }} className="dropIn">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={s.cardTitle}>Foto-Vergleich</h3>
          <div style={{fontSize:12,color:"#888"}}>Wähle 2 Fotos aus ({compareIds.length}/2)</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,minHeight:200}}>
          {compareIds.length < 2 ? (
            <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",justifyContent:"center",color:"#444",fontStyle:"italic"}}>Bitte wähle zwei Fotos aus der Galerie unten aus.</div>
          ) : (
            compareIds.map(id => {
              const p = photos.find(x=>x.id===id);
              return <div key={id} style={{position:"relative"}}>
                <img src={p.url} style={{width:"100%",height:300,objectFit:"cover",borderRadius:12}} onClick={() => setActivePhoto(p)}/>
                <div style={{position:"absolute",bottom:10,left:10,background:"rgba(0,0,0,0.7)",padding:"4px 8px",borderRadius:6,fontSize:11}}>{fmtDate(p.date)} ({p.tag})</div>
              </div>
            })
          )}
        </div>
      </div>
    )}

    <div style={isMobile ? { ...s.card, width: "100%", minWidth: 0, padding: 16, marginBottom: 22, maxWidth: "100%", boxSizing: "border-box", overflow: "hidden" } : { ...s.card, marginBottom: 22 }}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, paddingBottom:8, borderBottom:"1px solid #1E1E24", flexWrap: "wrap", gap: isMobile ? 12 : 0}}>
        <div style={{flex:1, minWidth: isMobile ? "30%" : "auto", textAlign: isMobile ? "left" : "left"}}>
          <div style={{fontSize:9, color:"#666", fontWeight:800, textTransform:"uppercase", letterSpacing:1}}>MAXIMUM</div>
          <div style={{fontSize: isMobile ? 14 : 16, fontWeight:800, color:"#EF476F"}}>{overallMax}<span style={{fontSize:10, marginLeft:4}}>kg</span></div>
        </div>
        <div style={{flex:1, minWidth: isMobile ? "30%" : "auto", textAlign: "center"}}>
          <div style={{fontSize:10, color:"#888", fontWeight:700}}>AKTUELLES GEWICHT</div>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize: isMobile ? 22 : 26,fontWeight:800,color:"#00D9C0"}}>{weightPoints.length?weightPoints[weightPoints.length-1].toFixed(1):"--"}<span style={{fontSize:13,color:"#666",fontWeight:400,marginLeft:4}}>kg</span></div>
        </div>
        <div style={{flex:1, minWidth: isMobile ? "30%" : "auto", textAlign: isMobile ? "right" : "right"}}>
          <div style={{fontSize:9, color:"#666", fontWeight:800, textTransform:"uppercase", letterSpacing:1}}>MINIMUM</div>
          <div style={{fontSize: isMobile ? 14 : 16, fontWeight:800, color:"#06D6A0"}}>{overallMin}<span style={{fontSize:10, marginLeft:4}}>kg</span></div>
        </div>
      </div>
      <LineChart points={weightPoints} color="#00D9C0" height={200}/>
      
      <div style={{marginTop:24,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:20}}>
          <div style={{fontSize:11,fontWeight:800,color:"#666",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Letzte Einträge</div>
          <div style={{display:"flex",gap:12,overflowX:"auto",width:"100%",paddingBottom:8,WebkitOverflowScrolling:"touch"}}>
            {weightHistory.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5).map(h=>(
              <div key={h.date} style={{background:"rgba(255,255,255,0.03)",padding:"10px 16px",borderRadius:12,border:"1px solid rgba(255,255,255,0.06)",minWidth:120,display:"flex",justifyContent:"space-between",alignItems:"center",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"}}>
                <div>
                  <div style={{fontSize:10,color:"#666"}}>{fmtShort(new Date(h.date))}</div>
                  <div style={{fontSize:15,fontWeight:800,color:"#F0EDE8"}}>{h.value}<span style={{fontSize:11,color:"#666",marginLeft:6}}>kg</span></div>
                </div>
                <button style={{background:"transparent",border:"none",color:"#444",padding:4,cursor:"pointer"}} onClick={()=>delWeight(h.date)}>{IC.trash}</button>
              </div>
            ))}
            {!weightHistory.length && <div style={{fontSize:12,color:"#444",textAlign:"center",padding:10,width:"100%"}}>Noch keine Einträge</div>}
          </div>
      </div>
    </div>
    <div style={isMobile ? { ...s.card, width: "100%", minWidth: 0, padding: 16, maxWidth: "100%", boxSizing: "border-box" } : s.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <h3 style={s.cardTitle}>Fotostrecke</h3>
        <button style={isMobile ? { ...s.primaryBtn, padding: "8px 12px", fontSize: 13 } : s.primaryBtn} onClick={()=>setShowUploadPhoto(true)}>{IC.camera} Foto hochladen</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:`repeat(auto-fill,minmax(${isMobile ? 110 : 160}px,1fr))`,gap:isMobile ? 10 : 14}}>
        {photos.map(p=>(
          <div key={p.id} style={{position:"relative",borderRadius:14,overflow:"hidden",aspectRatio:"3/4",border:compareIds.includes(p.id)?"3px solid #FF6B35":"1px solid rgba(255,255,255,0.08)", cursor: "pointer"}} onClick={() => compareMode ? toggleCompare(p.id) : setActivePhoto(p)}>
            <img src={p.url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <div style={{position:"absolute",inset:0,background:"linear-gradient(transparent,rgba(0,0,0,0.8))",display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:10}}>
              <div style={{fontSize:11,fontWeight:700}}>{fmtDate(p.date)}</div>
              <div style={{fontSize:9,color:"#FF6B35",fontWeight:800,textTransform:"uppercase"}}>{p.tag}</div>
            </div>
            {!compareMode && <button style={{position:"absolute",top:8,right:8,background:"rgba(239,71,111,0.2)",border:"none",color:"#EF476F",width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={(e)=>{e.stopPropagation();delPhoto(p.id)}}>{IC.trash}</button>}
            {compareMode && compareIds.includes(p.id) && <div style={{position:"absolute",top:8,right:8,background:"#FF6B35",color:"#000",width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900}}>{compareIds.indexOf(p.id)+1}</div>}
          </div>
        ))}
        {!photos.length && <div style={{gridColumn:"1/-1",padding:40,textAlign:"center",color:"#444",border:"2px dashed #1E1E24",borderRadius:14}}>Noch keine Fortschrittsfotos hochgeladen.</div>}
      </div>
    </div>

    {activePhoto && <PhotoDetailModal photo={activePhoto} onClose={() => setActivePhoto(null)} isMobile={isMobile} />}

    <div style={{display:"grid",gridTemplateColumns:"1fr",gap:18,marginBottom:22,marginTop:22}}>
      <div style={isMobile ? { ...s.card, width: "100%", minWidth: 0, padding: 16, maxWidth: "100%", boxSizing: "border-box" } : s.card}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18}}>
          <div style={{display:"flex", alignItems:"center", gap:12}}>
            <h3 style={s.cardTitle}>Aktuelle Körpermaße</h3>
            <button 
              onClick={() => setShowMeasureDetails(!showMeasureDetails)}
              style={{background:showMeasureDetails?"#FF6B3515":"#1E1E24", border:"none", color:showMeasureDetails?"#FF6B35":"#888", padding:"4px 8px", borderRadius:6, fontSize:10, fontWeight:800, cursor:"pointer"}}
            >
              {showMeasureDetails ? "AUSBLENDEN" : "ANZEIGEN"}
            </button>
          </div>
          {measurements.length > 0 && <div style={{fontSize:11, background:"#A78BFA15", color:"#A78BFA", padding:"4px 10px", borderRadius:6, fontWeight:700}}>Stand: {fmtDate(measurements[0].date)}</div>}
        </div>
        
        {showMeasureDetails && (
          measurements.length > 0 ? (
            <div style={{display:"grid",gridTemplateColumns:`repeat(auto-fill, minmax(${isMobile ? "110px" : "140px"}, 1fr))`,gap:12}} className="dropIn">
              {Object.entries(measurements[0].values).map(([k,v])=>(
                <div key={k} style={{background:"rgba(255,255,255,0.03)",padding:"12px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",gap:4}}>
                  <div style={{color:"#666",fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{k.replace(" (cm)","")}</div>
                  <div style={{fontWeight:800,fontSize:18,color:"#F0EDE8"}}>{v}<span style={{fontSize:12,color:"#666",fontWeight:400}}> cm</span></div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{padding:"40px 0",textAlign:"center",color:"#444",fontSize:13,border:"2px dashed #1E1E24",borderRadius:14}}>Noch keine Maße eingetragen</div>
          )
        )}
      </div>
    </div>

    {/* Modals */}
    {showAddWeight && (
      <Overlay onClick={()=>setShowAddWeight(false)}>
        <div style={{...s.modal, maxHeight:"88vh", overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
          <h2 style={s.modalTitle}>Gewicht loggen</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            <div style={s.fg}><label style={s.lbl}>Gewicht (kg)</label><input style={s.inp} type="number" step="0.1" value={newWeight} onChange={e=>setNewWeight(e.target.value)} autoFocus/></div>
            <div style={s.fg}><label style={s.lbl}>Datum</label><input style={s.inp} type="date" value={weightDate} onChange={e=>setWeightDate(e.target.value)}/></div>
          </div>
          <div style={{display:"flex",gap:11}}><button style={s.secBtn} onClick={()=>setShowAddWeight(false)}>Abbrechen</button><button style={{...s.primaryBtn,flex:1}} onClick={addWeight}>Speichern</button></div>
        </div>
      </Overlay>
    )}

    {showUploadPhoto && (
      <Overlay onClick={()=>setShowUploadPhoto(false)}>
        <div style={{...s.modal, maxHeight:"88vh", overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
          <h2 style={s.modalTitle}>Foto hochladen</h2>
          <div style={s.fg}><label style={s.lbl}>Ansicht</label><select style={s.inp} value={photoTag} onChange={e=>setPhotoTag(e.target.value)}>{["Vorne","Seite","Hinten","Bizeps","Beine","Waage"].map(t=>(<option key={t}>{t}</option>))}</select></div>
          <div style={s.fg}><label style={s.lbl}>Datum</label><input style={s.inp} type="date" value={photoDate} onChange={e=>setPhotoDate(e.target.value)}/></div>
          <div style={s.fg}><label style={s.lbl}>Bild auswählen</label><input type="file" accept="image/*" style={s.inp} onChange={handlePhotoUpload}/></div>
          <button style={{...s.secBtn,width:"100%",marginTop:10}} onClick={()=>setShowUploadPhoto(false)}>Abbrechen</button>
        </div>
      </Overlay>
    )}

    {showAddMeasure && (
      <Overlay onClick={()=>setShowAddMeasure(false)}>
        <div style={{...s.modal, maxWidth:450, maxHeight:"88vh", overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
          <h2 style={s.modalTitle}>Körpermaße</h2>
          <div style={s.fg}><label style={s.lbl}>Datum</label><input style={s.inp} type="date" value={measureForm.date} onChange={e=>setMeasureForm({...measureForm, date:e.target.value})}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            {MEASUREMENT_TYPES.map(m => (
              <div key={m} style={s.fg}>
                <label style={s.lbl}>{m}</label>
                <input style={s.inp} type="number" step="0.1" value={measureForm.values[m]||""} onChange={e=>setMeasureForm({...measureForm, values:{...measureForm.values, [m]:e.target.value}})} placeholder="0"/>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:11}}><button style={s.secBtn} onClick={()=>setShowAddMeasure(false)}>Abbrechen</button><button style={{...s.primaryBtn,flex:1}} onClick={saveMeasure}>Speichern</button></div>
        </div>
      </Overlay>
    )}

    {showHistory && (
      <Overlay onClick={()=>setShowHistory(false)}>
        <div style={{...s.modal, maxWidth:550, maxHeight:"85vh", display:"flex", flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h2 style={s.modalTitle}>{IC.history} Fortschritts-Historie</h2>
            <button style={{...s.secBtn, padding:8}} onClick={()=>setShowHistory(false)}>{IC.x}</button>
          </div>
          <div style={{overflowY:"auto", flex:1, paddingRight:5, marginTop: 10}}>
            {(() => {
              const combined = [
                ...weightHistory.map(h => ({type:'weight', date:h.date, value:h.value})),
                ...photos.map(p => ({type:'photo', date:p.date, value:p.url, tag:p.tag, id:p.id})),
                ...measurements.map(m => ({type:'measurement', date:m.date, values:m.values, id:m.id}))
              ].sort((a,b) => new Date(b.date) - new Date(a.date));

              if(!combined.length) return <div style={{textAlign:"center",padding:40,color:"#444"}}>Noch keine Einträge vorhanden</div>;

              return combined.map((item, idx) => (
                <div key={idx} style={{display:"flex", gap:16, marginBottom:20, borderLeft:"2px solid #1E1E24", paddingLeft:16, position:"relative"}}>
                  <div style={{position:"absolute", left:-6, top:0, width:10, height:10, borderRadius:"50%", background:"#FF6B35", border:"2px solid #0D0D0F"}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11, fontWeight:800, color:"#666", marginBottom:6}}>{fmtDate(item.date)}</div>
                    {item.type === 'weight' ? (
                      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(255,255,255,0.03)", padding:12, borderRadius:12, border:"1px solid rgba(255,255,255,0.06)"}}>
                        <div>
                          <div style={{fontSize:10, color:"#888", marginBottom:2}}>Gewichtseintrag</div>
                          <div style={{fontSize:16, fontWeight:800, color:"#00D9C0"}}>{item.value} kg</div>
                        </div>
                        <button style={{background:"transparent", border:"none", color:"#EF476F", padding:8, cursor:"pointer"}} onClick={()=>delWeight(item.date)}>{IC.trash}</button>
                      </div>
                    ) : item.type === 'photo' ? (
                      <div style={{display:"flex", gap:12, background:"rgba(255,255,255,0.03)", padding:10, borderRadius:12, alignItems:"center", border:"1px solid rgba(255,255,255,0.06)"}}>
                        <img src={item.value} style={{width:60, height:60, objectFit:"cover", borderRadius:8}}/>
                        <div style={{flex:1}}>
                          <div style={{fontSize:10, color:"#666", marginBottom:2}}>Foto ({item.tag})</div>
                          <div style={{fontSize:12, fontWeight:700}}>{item.tag}</div>
                        </div>

                        </div>
                        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(100px, 1fr))", gap:8}}>
                          {Object.entries(item.values).map(([k,v]) => (
                            <div key={k} style={{fontSize:11, color:"#F0EDE8"}}>
                              <span style={{color:"#666"}}>{k.split(' ')[0]}: </span>{v}cm
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              ));
            })()}
          </div>
        </div>
      </Overlay>
    )}
  </div>
  );
}

function Stats({data,prs,nutrition,user}){
  const [range,setRange]=useState(30);
  const safeW=Array.isArray(data?.workouts)?data.workouts:[];
  const cutoff=range==="all"?new Date(0):new Date(Date.now()-range*864e5);
  const filtered=safeW.filter(w=>{try{return new Date(w.date)>=cutoff;}catch{return false;}}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  
  const safeVol=w=>{try{return(w.exercises||[]).reduce((a,e)=>a+(e.sets||[]).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0),0);}catch{return 0;}};
  const totalW=filtered.length,totalD=filtered.reduce((a,w)=>a+(isFinite(w.duration)?+w.duration:0),0),totalVK=Math.round(filtered.reduce((a,w)=>a+safeVol(w),0)/1000),avgD=totalW?Math.round(totalD/totalW):0;
  
  // Consistency over selected range
  let consistency = 0;
  if (filtered.length > 0) {
    // Determine the timespan in days
    let days = range === "all" ? ((Date.now() - new Date(filtered[0].date).getTime()) / 86400000) : range;
    days = Math.max(1, days); // Prevent division by zero
    const weeksActive = Math.max(1, days / 7); // Calculate how many weeks that is
    consistency = (filtered.length / weeksActive).toFixed(1);
  }

  // Muscle Distribution
  const muscleCounts = {};
  filtered.forEach(w => {
    const plan = data.plans.find(p => p.id === w.planId);
    if (plan && plan.muscles) {
      plan.muscles.forEach(m => {
        muscleCounts[m] = (muscleCounts[m] || 0) + 1;
      });
    }
  });
  const totalWorkoutsInRange = filtered.length;
  const sortedMuscles = Object.entries(muscleCounts).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
  const maxMuscleCount = Math.max(...sortedMuscles.map(m=>m.count),1);

  return(<div style={s.page}>
    <div style={s.pageHead}>
      <div><h1 style={s.pageTitle}>Statistiken</h1><p style={s.pageSub}>Absolvierte Trainings im Überblick</p></div>
      <div style={{display:"flex",gap:8}}>
        {[7,30,90].map(d=><button key={d} style={{...s.secBtn,padding:"6px 13px",fontSize:12,...(range===d?{background:"rgba(255,107,53,0.15)",color:"#FF6B35",borderColor:"#FF6B35",textShadow:"0 0 10px rgba(255,107,53,0.5)",boxShadow:"0 0 10px rgba(255,107,53,0.3), inset 0 0 8px rgba(255,107,53,0.15)"}:{})}} onClick={()=>setRange(d)}>{d}T</button>)}
        <button style={{...s.secBtn,padding:"6px 13px",fontSize:12,...(range==="all"?{background:"rgba(255,107,53,0.15)",color:"#FF6B35",borderColor:"#FF6B35",textShadow:"0 0 10px rgba(255,107,53,0.5)",boxShadow:"0 0 10px rgba(255,107,53,0.3), inset 0 0 8px rgba(255,107,53,0.15)"}:{})}} onClick={()=>setRange("all")}>Gesamt</button>
      </div>
    </div>
    
    <div className="res-grid-4-2" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
      {[[totalW,"Trainings","#FF6B35"],[`${totalD}min`,"Gesamt-Zeit","#00D9C0"],[`${totalVK}k kg`,"Volumen","#A78BFA"],[`${avgD}min`,"Ø Dauer","#FFD166"]].map(([v,l,c],i)=>(
        <div key={i} style={{padding:"20px 10px",textAlign:"center",display:"flex",flexDirection:"column",justifyContent:"center", background: "linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 18, backdropFilter: "blur(24px) saturate(180%)", WebkitBackdropFilter: "blur(24px) saturate(180%)", boxShadow: "inset 0 1px 2px rgba(255,255,255,0.2), 0 8px 32px rgba(0,0,0,0.4)"}}><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:26,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:11,fontWeight:700,color:"#666",marginTop:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{l}</div></div>
      ))}
    </div>

    <div style={s.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:16}}>
        <div>
          <h3 style={{...s.cardTitle,marginBottom:6}}>Muskelgruppe</h3>
          <div style={{fontSize:11,color:"#666"}}>Basierend auf {totalWorkoutsInRange} Trainingseinheiten</div>
        </div>
        <div style={{fontSize:12,fontWeight:700,color:"#666"}}>Ø Einheiten / Woche: <span style={{color:"#A78BFA",fontSize:16}}>{consistency}</span></div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:15,marginTop:10}}>
        {sortedMuscles.length > 0 ? sortedMuscles.map(m=>(
          <div key={m.name}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:700,marginBottom:6}}>
              <span style={{color:"#F0EDE8"}}>{m.name}</span>
              <span style={{color:"#FF6B35",background:"#FF6B3515",padding:"2px 8px",borderRadius:6}}>{m.count}x</span>
            </div>
            <div style={{height:8,background:"#1A1A1F",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${(m.count/maxMuscleCount*100)}%`,background:"linear-gradient(90deg,#00D9C0,#00F2DC)",borderRadius:4,transition:"width 0.4s ease"}}/>
            </div>
          </div>
        )) : <div style={{padding:"40px 0",textAlign:"center",color:"#444",fontSize:13,border:"1px dashed #1E1E24",borderRadius:12}}>Keine Muskeldaten für diesen Zeitraum</div>}
      </div>
    </div>
  </div>
);
}
function Nutrition({nutrition,setNutrition,user,notify,favFoods,setFavFoods,isMobile,autoOpenAdd,presetMealType}){
  const [selDate,setSelDate]=useState(todayStr());
  const [showAdd,setShowAdd]=useState(!!autoOpenAdd);
  const [meal,setMeal]=useState({name:"",calories:"",protein:"",carbs:"",fat:"",mealType:presetMealType||"Frühstück",amount:100,baseCalories:0,baseProtein:0,baseCarbs:0,baseFat:0});
  const [search,setSearch]=useState("");
  const [apiResults,setApiResults]=useState([]);
  const [apiLoading,setApiLoading]=useState(false);
  const [searchMode,setSearchMode]=useState("quick");
  const [scanning,setScanning]=useState(false);
  const [manualBarcode,setManualBarcode]=useState("");
  const [waterAmount,setWaterAmount]=useState("");
  const [activeTab, setActiveTab] = useState("track");
  const [knowledgeSearch, setKnowledgeSearch] = useState("");

  const isFav = f => favFoods.some(x => x.name.toLowerCase() === f.name.toLowerCase());
  const toggleFav = f => {
    if (isFav(f)) setFavFoods(curr => curr.filter(x => x.name.toLowerCase() !== f.name.toLowerCase()));
    else setFavFoods(curr => [...curr, f]);
  };

  const scannerRef = useRef(null);
  const dayData=(nutrition && nutrition[selDate])||{calories:0,protein:0,carbs:0,fat:0,meals:[],waterLog:[]};
  const waterGoal=parseInt(user.waterGoal)||2500;
  const waterTotal=(dayData.waterLog||[]).reduce((a,w)=>a+w.ml,0);
  const addWater=ml=>{if(!ml||ml<=0)return;setNutrition(n=>{const d=n[selDate]||{calories:0,protein:0,carbs:0,fat:0,meals:[],waterLog:[]};return{...n,[selDate]:{...d,waterLog:[...(d.waterLog||[]),{id:Date.now(),ml,time:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}]}};});notify(`${ml} ml hinzugefügt! 💧`);};
  const delWater=id=>{setNutrition(n=>{const d=n[selDate];if(!d)return n;return{...n,[selDate]:{...d,waterLog:(d.waterLog||[]).filter(w=>w.id!==id)}};});};

  const lookupBarcode = async (code) => {
    setApiLoading(true);
    setScanning(false);
    if(scannerRef.current) {
      try { await scannerRef.current.stop(); } catch(e) {}
      scannerRef.current = null;
    }
    
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,nutriments,brands,quantity`, {
        headers: { 'User-Agent': 'FitForge - Web - 1.0' }
      });
      const data = await res.json();
      if(data.status === 1 && data.product) {
        const p = data.product;
        const n = (p && p.nutriments) || {};
        const baseCalories = Math.round(n["energy-kcal_100g"] || n["energy-kcal"] || 0);
        const baseProtein = Math.round((n.proteins_100g || 0) * 10) / 10;
        const baseCarbs = Math.round((n.carbohydrates_100g || 0) * 10) / 10;
        const baseFat = Math.round((n.fat_100g || 0) * 10) / 10;
        const found = {
          name: `${p.product_name || "Unbekannt"}${p.brands ? " (" + p.brands + ")" : ""}`,
          amount: 100,
          baseCalories, baseProtein, baseCarbs, baseFat,
          calories: baseCalories, protein: baseProtein, carbs: baseCarbs, fat: baseFat,
          mealType: "Sonstige"
        };
        setMeal(found);
        setManualBarcode("");
        setShowAdd(true);
        notify("Produkt gefunden! 🎯 Menge bei Bedarf anpassen.");
      } else {
        notify("Barcode nicht gefunden 🔍", "error");
      }
    } catch(e) {
      console.error(e);
      notify("Fehler bei der Abfrage", "error");
    }
    setApiLoading(false);
  };

  const startScanner = async () => {
    if(!window.Html5Qrcode) return notify("Scanner-Bibliothek lädt noch...", "error");
    setScanning(true);
    setTimeout(() => {
      try {
        const scanner = new window.Html5Qrcode("reader");
        scannerRef.current = scanner;
        const config = { fps: 10, qrbox: { width: 280, height: 140 }, aspectRatio: 1.5 };
        scanner.start({ facingMode: "environment" }, config, (text) => {
          lookupBarcode(text);
        }).catch(err => {
          console.error(err);
          setScanning(false);
          notify("Kamera-Fehler 📷", "error");
        });
      } catch(e) {
        setScanning(false);
        notify("Fehler beim Starten des Scanners", "error");
      }
    }, 100);
  };

  const stopScanner = async () => {
    if(scannerRef.current) {
      try { await scannerRef.current.stop(); } catch(e) {}
      scannerRef.current = null;
    }
    setScanning(false);
  };

  const searchOpenFoodFacts=async(query)=>{

        headers: { 'User-Agent': 'FitForge-HealthApp/1.0 (https://fitforge.app)' }
      });
      if(!res.ok) throw new Error("API_ERROR");
      const data=await res.json();
      const results=(data.products||[]).filter(p=>p.product_name && p.nutriments).map(p=>({
        name:`${p.product_name}${p.brands?" ("+p.brands+")":""}`,

        protein:Math.round((p.nutriments.proteins_100g||0)*10)/10,
        carbs:Math.round((p.nutriments.carbohydrates_100g||0)*10)/10,
        fat:Math.round((p.nutriments.fat_100g||0)*10)/10,
        quantity:p.quantity||"100g",
        imageUrl:p.image_url
      })).filter(p=>p.calories>0);
      setApiResults(results);
    }catch(e){
      console.error("OFF Search Error:", e);
      notify(e.message==="API_ERROR"?"OFF-Server gerade überlastet (429/503). Bitte kurz warten.":"Fehler bei der Suche", "error");
    }
    setApiLoading(false);
  };

  useEffect(()=>{
    if(searchMode==="api"&&search.length>=3){
      const t=setTimeout(()=>searchOpenFoodFacts(search),600);
      return()=>clearTimeout(t);
    }
  },[search,searchMode]);

  useEffect(() => {
    return () => { if(scannerRef.current) scannerRef.current.stop().catch(()=>{}); };
  }, []);

  const calGoal=user.calorieGoal||2500,protGoal=user.proteinGoal||150,carbGoal=Math.round(calGoal*0.5/4),fatGoal=Math.round(calGoal*0.3/9);
  const addMeal=()=>{if(!meal.name||!meal.calories)return notify("Name und Kalorien ausfüllen","error");const entry={...meal,id:Date.now(),calories:parseInt(meal.calories)||0,protein:parseFloat(meal.protein)||0,carbs:parseFloat(meal.carbs)||0,fat:parseFloat(meal.fat)||0};setNutrition(n=>{const d=n[selDate]||{calories:0,protein:0,carbs:0,fat:0,meals:[]};return{...n,[selDate]:{calories:d.calories+entry.calories,protein:d.protein+entry.protein,carbs:d.carbs+entry.carbs,fat:d.fat+entry.fat,meals:[...d.meals,entry]}};});notify(`${meal.name} hinzugefügt! ✅`);setMeal({name:"",calories:"",protein:"",carbs:"",fat:"",mealType:"Frühstück",amount:100,baseCalories:0,baseProtein:0,baseCarbs:0,baseFat:0});setShowAdd(false);};
  const quickAdd=food=>{setNutrition(n=>{const d=n[selDate]||{calories:0,protein:0,carbs:0,fat:0,meals:[]};return{...n,[selDate]:{calories:d.calories+food.calories,protein:d.protein+food.protein,carbs:d.carbs+food.carbs,fat:d.fat+food.fat,meals:[...d.meals,{...food,id:Date.now(),mealType:"Sonstige"}]}};});notify(`${food.name} hinzugefügt!`);};
  const delMeal=id=>{setNutrition(n=>{const d=n[selDate];if(!d)return n;const rm=d.meals.find(m=>m.id===id);if(!rm)return n;return{...n,[selDate]:{calories:Math.max(0,d.calories-rm.calories),protein:Math.max(0,d.protein-rm.protein),carbs:Math.max(0,d.carbs-rm.carbs),fat:Math.max(0,d.fat-rm.fat),meals:d.meals.filter(m=>m.id!==id)}};});notify("Eintrag gelöscht");};
  const mealGroups=["Frühstück","Mittagessen","Abendessen","Snack","Sonstige"];
  const filtered=COMMON_FOODS.filter(f=>f.name.toLowerCase().includes(search.toLowerCase()));

  const filteredKnowledge = NUTRITION_KNOWLEDGE.filter(k => 
    k.title.toLowerCase().includes(knowledgeSearch.toLowerCase()) || 
    k.cat.toLowerCase().includes(knowledgeSearch.toLowerCase()) ||
    k.text.toLowerCase().includes(knowledgeSearch.toLowerCase())
  );

  return (
    <div style={{...s.page, padding: isMobile ? "10px 10px 80px" : s.page.padding}}>

const formatPace = (kmh) => {
  if (!kmh || isNaN(kmh) || kmh <= 0.1) return "-:--";
  const minsPerKm = 60 / kmh;
  const m = Math.floor(minsPerKm);
  const s = Math.floor((minsPerKm - m) * 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
};

const calcDist = (lat1, lon1, lat2, lon2) => {
  const p = 0.017453292519943295; const c = Math.cos;
  const a = 0.5 - c((lat2 - lat1) * p)/2 + c(lat1 * p) * c(lat2 * p) * (1 - c((lon2 - lon1) * p))/2;
  return 12742 * Math.asin(Math.sqrt(a));
};

  }, [voiceVolume]);

  const requestWakeLock = async () => {
    if ('wakeLock' in navigator) {
      try {
        wakeLockRef.current = await navigator.wakeLock.request('screen');
        if (window.dbg) dbg('💡 Wake Lock aktiv', '#0f0');
      } catch (err) {
        if (window.dbg) dbg('❌ Wake Lock Fehler: ' + err.message, '#f55');
      }
    }
  };

  const releaseWakeLock = async () => {
    if (wakeLockRef.current) {
      try {
        await wakeLockRef.current.release();
        wakeLockRef.current = null;
        if (window.dbg) dbg('💤 Wake Lock deaktiviert', '#888');

        console.warn('Wake lock release error:', err);

    }
  };

  useEffect(() => {
    if (running) {
      if (!noSleepVideoRef.current) {
        const video = document.createElement('video');

        video.setAttribute('loop', '');

              <div style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:16, padding:"24px 12px", textAlign:"center", display: "flex", flexDirection: "column", justifyContent: "center"}}>

                <div style={{fontSize:26, color:"#4CC9F0", fontWeight:900}}>{curSets[0]?.km || "0.00"}<div style={{fontSize:13, marginTop: 4, color:"#4CC9F088"}}>km</div></div>
              </div>
              <div style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:16, padding:"24px 12px", textAlign:"center", display: "flex", flexDirection: "column", justifyContent: "center"}}>

              </div>
              <div style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:16, padding:"24px 12px", textAlign:"center", display: "flex", flexDirection: "column", justifyContent: "center"}}>
                <div style={{fontSize:11, color:"#666", fontWeight:800, textTransform:"uppercase", marginBottom:8}}>Live Pace</div>
                <div style={{fontSize:26, color:"#06D6A0", fontWeight:900}}>{formatPace(parseFloat(curSets[0]?.currentSpeed || 0))}<div style={{fontSize:13, marginTop: 4, color:"#06D6A088"}}>/km</div></div>

          {!hiitMode && !curExData.trackGPS && (
             <div style={{marginBottom:15,borderBottom:"1px solid #1E1E24",paddingBottom:10,display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:800,color:"#fff"}}>

          {curSets.length > 0 && !hiitMode && !curExData.trackGPS && (

            <div style={{flex: 1, display: "flex", gap: 10}}>
              {!hiitMode && (
                (() => {

                  const setsInViewArray = (sets[curEx] || []).slice(repeatRounds?(curRound-1)*tSetsNum : 0, repeatRounds?curRound*tSetsNum : (sets[curEx]||[]).length);
                  
                  const allDone = setsInViewArray.length > 0 && setsInViewArray.every(s => s.done);
                  const showFinishSet = !allDone && setsInViewArray.length > 0;

                          onClick={() => {

        </>}

        {hiitConfig && (

          </div>

        {showEndModal && ReactDOM.createPortal(
          <div style={{...s.overlay2, zIndex: 1000}} onClick={()=>setShowEndModal(false)}>
            <div style={{...s.modal, maxWidth:380, padding:25, borderRadius: 24, textAlign: "center", background:"rgba(16,16,22,0.97)",backdropFilter:"blur(32px) saturate(180%)",WebkitBackdropFilter:"blur(32px) saturate(180%)",border:"1px solid rgba(255,255,255,0.2)",boxShadow:"inset 0 1px 1px rgba(255,255,255,0.1), 0 32px 80px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.05)"}} onClick={e=>e.stopPropagation()}>
              <div style={{width: 64, height: 64, background: "#EF476F20", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", color: "#EF476F"}}><span style={{fontSize: 28}}>⏹</span></div>
              <h3 style={{...s.modalTitle, fontSize: 22, marginBottom: 10}}>Training beenden?</h3>
              <p style={{fontSize: 14, color: "#888", marginBottom: 25, lineHeight: 1.5}}>Möchtest du das aktuelle Training abbrechen oder vorzeitig mit den bisherigen Fortschritten speichern?</p>
              <div style={{display: "flex", flexDirection: "column", gap: 10}}>
                <button style={{...s.primaryBtn, background: "#06D6A015", border: "2px solid #06D6A0", color: "#06D6A0", fontSize: 13, padding: "10px", fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", gap: 8}} onClick={save}>Speichern & Beenden</button>
                <button style={{...s.primaryBtn, background: "#EF476F15", border: "2px solid #EF476F", color: "#EF476F", fontSize: 13, padding: "10px", fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", gap: 8}} onClick={()=>{setStep(1); setTimer(0); setRunning(false); setShowEndModal(false); setActiveWorkout(null); notify("Training verworfen", "info");}}>Abbrechen & Löschen</button>
                <button style={{...s.secBtn, background: "#F0EDE810", border: "2px solid #F0EDE855", color: "#F0EDE8", fontSize: 13, marginTop: 5, padding: "10px", borderRadius: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 6}} onClick={()=>setShowEndModal(false)}>Zurück zum Training</button>
              </div>

          </div>, document.body
        )}

      {step===3 && <div className="fadeIn">
        <div style={{background:"#0D0D0F",borderRadius:14,padding:20,textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:32,fontWeight:800,color:"#06D6A0",marginBottom:10}}>Geschafft! 🎉</div>
          <div style={{fontSize:14,color:"#888"}}>Dauer: {fmtTimer(timer)} | Übungen: {exercises.length}</div>

        <div style={{display: "flex", gap: 12}}><button style={{...s.primaryBtn, flex: 2}} onClick={save}>🎉 Training speichern</button><button style={{...s.primaryBtn, flex: 1, background: "#EF476F15", border: "2px solid #EF476F", color: "#EF476F"}} onClick={()=>{if(window.confirm("Möchtest du das Training wirklich verwerfen?")) {setStep(1); setTimer(0); setRunning(false); setActiveWorkout(null); notify("Training verworfen", "info");}}}>🗑️ Verwerfen</button></div>
