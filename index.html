<script>

  try {
    const firebaseConfig = {
      apiKey: "AIzaSyBHcrBR0fWYVDkdWWAoVfvMEaN0CeoB52M",
      authDomain: "mircos-app.firebaseapp.com",
      projectId: "mircos-app",
      storageBucket: "mircos-app.firebasestorage.app",
      messagingSenderId: "192709665118",
      appId: "1:192709665118:web:73e2bb1c9bc552bbbf2fcf"
    };

    firebase.initializeApp(firebaseConfig);
    const _auth = firebase.auth();
    const _db   = firebase.firestore();
    const _stor = firebase.storage();

    // Auth helpers
    window.firebaseAuth = _auth;
    window.firebaseCreateUser = (auth, email, pw) => _auth.createUserWithEmailAndPassword(email, pw);
    window.firebaseSignIn    = (auth, email, pw) => _auth.signInWithEmailAndPassword(email, pw);
    window.firebaseSignOut   = () => _auth.signOut();
    window.firebaseUpdateProfile = (user, data) => user.updateProfile(data);
    window.firebaseOnAuthStateChanged = (cb) => _auth.onAuthStateChanged(cb);

    // Firestore helpers
    window.firebaseDb  = _db;
    window.firebaseDoc = (db, ...path) => {
      let ref = _db;
      for(let i=0; i<path.length; i++){
        ref = i%2===0 ? ref.collection(path[i]) : ref.doc(path[i]);
      }
      return ref;
    };
    window.firebaseGetDoc = (ref) => ref.get().then(snap => ({
      exists: () => snap.exists === true,
      data:   () => snap.data() || {}
    }));
    window.firebaseSetDoc = (ref, data) => ref.set(data);
    window.firebaseOnSnapshot = (ref, cb, err) => ref.onSnapshot(cb, err);

    // Storage helpers
    window.firebaseStorage        = _stor;
    window.firebaseRef            = (stor, path) => _stor.ref(path);
    window.firebaseUploadBytes    = (ref, file) => ref.put(file);
    window.firebaseGetDownloadURL = (ref) => ref.getDownloadURL();
    window.firebaseDeleteObject   = (ref) => ref.delete();

    // Signal ready
    window.firebaseReady = true;
    window.dispatchEvent(new Event('firebaseReady'));
    if(window.dbg) dbg('✅ Firebase bereit!', '#0f0');
  } catch(e) {
    console.warn("Firebase init failed:", e.message);
    if(window.dbg) dbg('❌ Firebase Fehler: ' + e.message, '#f55');
    window.firebaseReady = false;
  }
</script>

<script>
  function toggleDebug() {
    const c = document.getElementById('fb-debug-container');
    const a = document.getElementById('debug-arrow');
    c.classList.toggle('collapsed');
    a.textContent = c.classList.contains('collapsed') ? '▲' : '▼';
  }
  const dbg = (msg, color) => {
    const d = document.getElementById('fb-debug');
    if(d){ 
      const line = document.createElement('div'); 
      line.style.color = color||'#0f0'; 
      line.style.paddingBottom = '2px';
      line.textContent = new Date().toLocaleTimeString() + ' » ' + msg; 
      d.appendChild(line); 
      if (!document.getElementById('fb-debug-container').classList.contains('collapsed')) {
        d.scrollTop=d.scrollHeight; 
      }
    }
    console.log(msg);
  };
  window.dbg = dbg;
  window.onerror = (msg,src,line,col,err) => {
    dbg('JS ERROR: '+msg+' ('+src+':'+line+':'+col+')', '#f55');
    if(err && err.stack) dbg('STACK: '+err.stack.split('\n').slice(0,3).join(' | '), '#f88');
    return false;
  };
  window.addEventListener('unhandledrejection', e => {
    dbg('PROMISE ERROR: '+(e.reason?.message||e.reason||'unbekannt'), '#f55');
    if(e.reason?.stack) dbg('STACK: '+e.reason.stack.split('\n').slice(0,3).join(' | '), '#f88');
  });
  dbg('Seite geladen - warte auf Firebase...');
</script>
<script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect, useRef } = React;

const MediaDisplay = ({src, style, className, onClick}) => {
  if (!src) return null;
  const isVideo = src.toLowerCase().includes("video") || src.toLowerCase().endsWith(".mp4") || src.toLowerCase().endsWith(".webm") || src.toLowerCase().endsWith(".mov") || src.startsWith("data:video");
  if (isVideo) {
    return (
      <video src={src} style={style} className={className} onClick={onClick} autoPlay muted loop playsInline />
    );
  }
  return <img src={src} style={style} className={className} onClick={onClick} loading="lazy" />;
};

// ── Firebase helpers (user-scoped) ────────────────────────────────────────────
const getUid = () => window.firebaseAuth?.currentUser?.uid || null;

const fbGet = async (key, fallback) => {
  try {
    const uid = getUid();
    if (window.firebaseDb && uid) {
      const snap = await window.firebaseGetDoc(window.firebaseDoc(window.firebaseDb, "fitforge", `${uid}_${key}`));
      if (snap.exists()) {
        const val = snap.data().value;
        localStorage.setItem(`ff_${uid}_${key}`, JSON.stringify(val));
        return val;
      }
    }
    // Only fallback to user-specific localStorage, NEVER to global ff_ keys
    const r = uid ? localStorage.getItem(`ff_${uid}_${key}`) : null;
    return r ? JSON.parse(r) : fallback;
  } catch (e) {
    const uid = getUid();
    const r = uid ? localStorage.getItem(`ff_${uid}_${key}`) : null;
    return r ? JSON.parse(r) : fallback;
  }
};

const fbSet = async (key, value) => {
  try {
    const uid = getUid();
    if (uid) localStorage.setItem(`ff_${uid}_${key}`, JSON.stringify(value));
    else localStorage.setItem("ff_" + key, JSON.stringify(value));

    if (window.firebaseDb && uid) {
      await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "fitforge", `${uid}_${key}`), { value });
    }
  } catch(e) { 
    console.error("fbSet error:", e);
    if(window.dbg) dbg(`❌ Cloud-Speicher Fehler: ${e.message}`, '#f55');
  }
};

// Firebase Storage upload – returns download URL (falls back to base64)
const uploadToStorage = async (file, path) => {
  try {
    const uid = getUid();
    if (!window.firebaseStorage || !uid) throw new Error("Storage not ready or not signed in");
    const fullPath = `fitforge/${path}`;
    const storageRef = window.firebaseRef(window.firebaseStorage, fullPath);
    await window.firebaseUploadBytes(storageRef, file);
    return await window.firebaseGetDownloadURL(storageRef);
  } catch(e) {
    console.warn("Storage upload fallback to base64:", e.message);
    return new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result);
      reader.readAsDataURL(file);
    });
  }
};

// Delete from Storage
const deleteFromStorage = async (path) => {
  try {
    const uid = getUid();
    if (!window.firebaseStorage || !uid) return;
    const storageRef = window.firebaseRef(window.firebaseStorage, `fitforge/${uid}/${path}`);
    await window.firebaseDeleteObject(storageRef);
  } catch(e) { console.warn("deleteFromStorage:", e.message); }
};

let audioCtx = null;
const playBeep = (freq, duration, vol=0.1) => {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) { console.warn("Beep failed", e); }
};

const speak = (text, vol = 1.0) => {
  if (!window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'de-DE';
    utterance.volume = vol;
    utterance.rate = 1.0;
    window.speechSynthesis.speak(utterance);
  } catch(e) { console.warn("Speech failed", e); }
};

// Background Timer Worker
const timerWorkerCode = `
  let timerId = null;
  self.onmessage = function(e) {
    if (e.data === 'start') {
      if (timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        self.postMessage('tick');
      }, 1000);
    } else if (e.data === 'stop') {
      if (timerId) clearInterval(timerId);
      timerId = null;
    }
  };
`;
const timerWorkerBlob = new Blob([timerWorkerCode], { type: 'application/javascript' });
const timerWorkerUrl = URL.createObjectURL(timerWorkerBlob);

function HiitTimer({duration, onFinish, isMobile, controlledTime, controlledActive}){
  const [internalTime, setInternalTime] = useState(duration);
  const [internalActive, setInternalActive] = useState(false);
  const itv = useRef();

  const timeLeft = controlledTime !== undefined ? controlledTime : internalTime;
  const active = controlledActive !== undefined ? controlledActive : internalActive;

  useEffect(() => {
    setInternalTime(duration);
  }, [duration]);

  useEffect(() => {
    if (controlledTime !== undefined) return; // Prop-driven, skip internal logic
    if(active && timeLeft > 0){
      itv.current = setInterval(() => {
        setInternalTime(t => {
          const next = t - 1;
          if(next === 0) { 
            playBeep(880, 0.6, 0.4);
            clearInterval(itv.current);
            setInternalActive(false);
            if(onFinish) onFinish();
            return 0;
          }
          if(next <= 3) playBeep(660, 0.15, 0.2);
          return next;
        });
      }, 1000);
    } else {
      clearInterval(itv.current);
    }
    return () => clearInterval(itv.current);
  }, [active, controlledTime]);

  const toggle = () => {
    if (controlledTime !== undefined) return; // Prop-driven
    if(!active) {
      if(timeLeft <= 0) setInternalTime(duration);
      playBeep(440, 0.2, 0.2);
      setInternalActive(true);
    } else {
      setInternalActive(false);
    }
  };

  return (
    <div className="hiit-glow" style={{background:"#111114", border:"2px solid #FFD166", borderRadius:24, padding: isMobile ? 16 : 24, display:"flex", flexDirection:"column", gap: isMobile ? 4 : 14, width:"100%", textAlign:"center", marginBottom: 12}}>
      <div style={{fontSize: 9, fontWeight: 900, color: "#FFD166", textTransform:"uppercase", letterSpacing: 2, opacity: 0.7}}>HIIT Interval</div>
      <div style={{display:"flex", justifyContent:"center", alignItems:"baseline", gap:6, margin: "0"}}>
        <div style={{fontFamily:"'DM Sans',sans-serif", fontSize: isMobile ? 54 : 64, fontWeight:800, color:"#FFD166", letterSpacing:-2, textShadow: "0 0 15px rgba(255, 209, 102, 0.3)", minWidth: isMobile ? "1.5em" : "auto"}}>
          {timeLeft}
        </div>
        <div style={{fontSize:14, fontWeight:800, color:"#FFD166", opacity: 0.5}}>SEK</div>
      </div>
      {controlledTime === undefined && (
        <div style={{display:"flex", gap:10}}>
          <button 
            style={{flex:1, height: 44, background: active ? "rgba(239, 71, 111, 0.1)" : "rgba(255, 209, 102, 0.1)", border: `2px solid ${active ? "#EF476F" : "#FFD166"}`, color: active ? "#EF476F" : "#FFD166", fontWeight:900, borderRadius:12, cursor:"pointer", fontSize: 13, transition: "0.2s"}}
            onClick={toggle}
          >
            {active ? "PAUSE" : "START"}
          </button>
        </div>
      )}
    </div>
  );
}

function genNotifs(data,user){const n=[],t=new Date(),ti=t.getDay()===0?6:t.getDay()-1,tn=FULL_WEEKDAYS[ti],tmn=FULL_WEEKDAYS[(ti+1)%7];data.plans.forEach(p=>{if(p.days.includes(tn))n.push({id:`today-${p.id}`,type:"training",title:"Training heute! 💪",body:`${p.name} steht heute an!`,read:false,ts:Date.now()-3e5});if(p.days.includes(tmn))n.push({id:`tmrw-${p.id}`,type:"reminder",title:"Training morgen 📅",body:`${p.name} steht morgen auf dem Plan!`,read:false,ts:Date.now()-36e5});});const last=[...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];if(last){const d=Math.floor((t-new Date(last.date))/864e5);if(d>=3)n.push({id:"rest",type:"warning",title:"Lange Pause 😴",body:`Letztes Training vor ${d} Tagen!`,read:false,ts:Date.now()-18e5});}if(data.workouts.length>=5)n.push({id:`mile-${data.workouts.length}`,type:"achievement",title:"Meilenstein 🏆",body:`${data.workouts.length} Trainings – weiter so!`,read:true,ts:Date.now()-864e5});return n;}
let _chartId=0;
function LineChart({points,color="#FF6B35",height=80}){
  const id=useRef(`lc${++_chartId}`).current;
  if(!points||points.length<2)return<div style={{color:"#555",fontSize:13,padding:"20px 0",textAlign:"center"}}>Noch nicht genug Daten</div>;
  const W=500,H=height,pad=12,padBottom=20;
  const vals=points.map(v=>isFinite(v)?v:0);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1,current=vals[vals.length-1];
  
  const yPad = rng * 0.2; // 20% headroom
  const effMin = mn - yPad;
  const effMax = mx + yPad;
  const effRng = effMax - effMin || 1;

  const xs=vals.map((_,i)=>pad+(i/(vals.length-1))*(W-pad*2));
  const ys=vals.map(v=>H-pad-6-((v-effMin)/effRng)*(H-pad*2-6));
  const d=xs.map((x,i)=>`${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area=`${d} L${xs[xs.length-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  return(
    <div style={{width:"100%",height:H,position:"relative", marginBottom: 10}}>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{overflow:"visible"}}>
        <defs>
          <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.4"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={area} fill={`url(#${id})`} />
        <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        
        {/* Value Labels & Dots */}
        {vals.map((v,i)=>(
          <g key={i}>
            <circle cx={xs[i]} cy={ys[i]} r="3" fill={color}/>
            <text x={xs[i]} y={ys[i]-8} textAnchor="middle" style={{fontSize:8, fill:"#888", fontWeight:700}}>{v.toFixed(1)}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}
function BarChart({bars,color="#FF6B35",height=90}){
  if(!bars||!bars.length)return null;
  const W=500,H=height,pad=4,gap=6;
  const mx=Math.max(...bars.map(b=>b.v),1);
  const bw=(W-pad*2-gap*(bars.length-1))/bars.length;
  return(
    <svg viewBox={`0 0 ${W} ${H+20}`} style={{width:"100%",height:H+20,display:"block"}}>
      {bars.map((b,i)=>{
        const bh=b.v>0?Math.max((b.v/mx)*(H-pad),4):0;
        const x=pad+i*(bw+gap),y=H-bh;
        return(<g key={i}><rect x={x} y={y} width={bw} height={bh} rx="4" fill={color} opacity="0.82"/><text x={x+bw/2} y={H+15} textAnchor="middle" fontSize="11" fill="#555">{b.l}</text></g>);
      })}
    </svg>
  );
}

const ls = (k, df) => { try { const r = localStorage.getItem("ff_" + k); const p = r ? JSON.parse(r) : null; return p !== null ? p : df; } catch { return df; } };

function FitForge(){
  const [view,setView]=useState("dashboard");
  const [data,setData]=useState(defaultData);
  const [user,setUser]=useState(defaultUser);
  const [prs,setPrs]=useState(defaultPRs);
  const [nutrition,setNutrition]=useState({});
  const [library,setLibrary]=useState(()=>ls("library", []));
  const [weekPlans,setWeekPlans]=useState({});
  const [favFoods,setFavFoods]=useState([]);
  
  const [authUser,setAuthUser]=useState(null);
  const [isMobile,setIsMobile]=useState(window.innerWidth<=1024);
  const [sidebarOpen,setSidebarOpen]=useState(window.innerWidth>1024);

  const [authLoading,setAuthLoading]=useState(true);
  const [loaded,setLoaded]=useState(false);
  const [animK,setAnimK]=useState(0);
  const [logModal,setLogModal]=useState(false);
  const [planModal,setPlanModal]=useState(false);
  const [editPlan,setEditPlan]=useState(null);
  const [selWO,setSelWO]=useState(null);
  const [notifs,setNotifs]=useState([]);
  const [profileOpen,setProfileOpen]=useState(false);
  const [notifOpen,setNotifOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [showLoadingUI, setShowLoadingUI] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [weeklyReport, setWeeklyReport] = useState(null);
  const [checkinModalOpen, setCheckinModalOpen] = useState(false);
  const [presetPlanId, setPresetPlanId] = useState(null);
  const [autoOpenAdd, setAutoOpenAdd] = useState(null);
  const [presetMealType, setPresetMealType] = useState(null);

  // ── Deep Rescue Scan State ──────────────────────────────────────────────
  const [rescueModalOpen, setRescueModalOpen] = useState(false);
  const [rescueScanProgress, setRescueScanProgress] = useState("idle"); // idle, scanning, done
  const [rescuedWorkouts, setRescuedWorkouts] = useState([]);
  const [rescuedPlans, setRescuedPlans] = useState([]);
  const [rescuedWeight, setRescuedWeight] = useState([]);
  const [rescueLog, setRescueLog] = useState([]);

  // ── Sync Safety State ───────────────────────────────────────────────────
  const loadedKeysRef = useRef({
    data: false,
    user: false,
    prs: false,
    nutrition: false,
    weekPlans: false,
    favFoods: false
  });

  const deserializeFirestoreValue = (val) => {
    if (!val || typeof val !== 'object') return val;
    if ('stringValue' in val) return val.stringValue;
    if ('integerValue' in val) return parseInt(val.integerValue, 10);
    if ('doubleValue' in val) return parseFloat(val.doubleValue);
    if ('booleanValue' in val) return val.booleanValue;
    if ('nullValue' in val) return null;
    if ('timestampValue' in val) return val.timestampValue;
    if ('arrayValue' in val) {
      const arr = val.arrayValue.values || [];
      return arr.map(item => deserializeFirestoreValue(item));
    }
    if ('mapValue' in val) {
      const fields = val.mapValue.fields || {};
      const res = {};
      for (const k in fields) {
        res[k] = deserializeFirestoreValue(fields[k]);
      }
      return res;
    }
    return val;
  };

  const extractWorkoutsFromAnyObject = (obj) => {
    const workouts = [];
    const plans = [];
    const weightHistory = [];
    const visited = new Set();

    const recurse = (val) => {
      if (!val || typeof val !== 'object') {
        if (typeof val === 'string' && val.length > 20) {
          const trimmed = val.trim();
          if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
            try {
              const parsed = JSON.parse(val);
              recurse(parsed);
            } catch(e) {}
          }
        }
        return;
      }
      if (visited.has(val)) return;
      visited.add(val);

      if (val.mapValue && val.mapValue.fields) {
        recurse(val.mapValue.fields);
        return;
      }
      if (val.arrayValue && val.arrayValue.values) {
        recurse(val.arrayValue.values);
        return;
      }
      if (val.stringValue) {
        recurse(val.stringValue);
        return;
      }

      // Check if workout
      if (val.id && val.date && (val.exercises || Array.isArray(val.exercises))) {
        const deserialized = deserializeFirestoreValue(val);
        if (deserialized && deserialized.id && deserialized.date) {
          workouts.push(deserialized);
        }
      }

      // Check if plan
      if (val.id && val.name && Array.isArray(val.exercises) && 'color' in val && !val.date) {
        const deserialized = deserializeFirestoreValue(val);
        if (deserialized && deserialized.id && deserialized.name) {
          plans.push(deserialized);
        }
      }

      // Check if weight
      if (val.date && ('weight' in val || 'weightValue' in val) && !val.exercises && !val.id) {
        const deserialized = deserializeFirestoreValue(val);
        if (deserialized && deserialized.date && deserialized.weight) {
          weightHistory.push(deserialized);
        }
      }

      if (Array.isArray(val)) {
        val.forEach(item => recurse(item));
      } else {
        for (const k in val) {
          if (k === 'workouts' && Array.isArray(val[k])) {
            val[k].forEach(item => {
              const deserialized = deserializeFirestoreValue(item);
              if (deserialized && deserialized.id && deserialized.date) {
                workouts.push(deserialized);
              } else {
                recurse(item);
              }
            });
          } else if (k === 'plans' && Array.isArray(val[k])) {
            val[k].forEach(item => {
              const deserialized = deserializeFirestoreValue(item);
              if (deserialized && deserialized.id && deserialized.name) {
                plans.push(deserialized);
              } else {
                recurse(item);
              }
            });
          } else if (k === 'weightHistory' && Array.isArray(val[k])) {
            val[k].forEach(item => {
              const deserialized = deserializeFirestoreValue(item);
              if (deserialized && deserialized.date && deserialized.weight) {
                weightHistory.push(deserialized);
              } else {
                recurse(item);
              }
            });
          } else {
            recurse(val[k]);
          }
        }
      }
    };

    recurse(obj);
    return { workouts, plans, weightHistory };
  };

  const addRescueLog = (msg) => {
    setRescueLog(prev => [...prev, `${new Date().toLocaleTimeString()}: ${msg}`]);
  };

  const performDeepRescueScan = async () => {
    setRescueScanProgress("scanning");
    setRescueLog([]);
    setRescuedWorkouts([]);
    setRescuedPlans([]);
    setRescuedWeight([]);
    addRescueLog("Starte Tiefensuche...");

    let allWorkouts = [];
    let allPlans = [];
    let allWeight = [];

    // 1. Scan LocalStorage
    addRescueLog("Durchsuche LocalStorage...");
    let lsCount = 0;
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key) continue;
        const val = localStorage.getItem(key);
        if (val) {
          try {
            const parsed = JSON.parse(val);
            const { workouts, plans, weightHistory } = extractWorkoutsFromAnyObject(parsed);
            if (workouts.length > 0) {
              allWorkouts = [...allWorkouts, ...workouts];
              lsCount += workouts.length;
            }
            if (plans.length > 0) allPlans = [...allPlans, ...plans];
            if (weightHistory.length > 0) allWeight = [...allWeight, ...weightHistory];
          } catch(e) {
            if (val.trim().startsWith('{') || val.trim().startsWith('[')) {
              try {
                const parsed = JSON.parse(val);
                const { workouts, plans, weightHistory } = extractWorkoutsFromAnyObject(parsed);
                if (workouts.length > 0) {
                  allWorkouts = [...allWorkouts, ...workouts];
                  lsCount += workouts.length;
                }
                if (plans.length > 0) allPlans = [...allPlans, ...plans];
                if (weightHistory.length > 0) allWeight = [...allWeight, ...weightHistory];
              } catch(e2) {}
            }
          }
        }
      }
      addRescueLog(`LocalStorage-Suche abgeschlossen. ${lsCount} Workouts gefunden.`);
    } catch(err) {
      addRescueLog(`Fehler beim LocalStorage-Scan: ${err.message}`);
    }

    // 2. Scan IndexedDB
    addRescueLog("Durchsuche IndexedDB-Datenbanken...");
    try {
      let dbNames = ["firestore/[default]/mircos-app/main"];
      if (window.indexedDB && window.indexedDB.databases) {
        const dbs = await window.indexedDB.databases();
        dbNames = dbs.map(d => d.name).filter(Boolean);
        if (!dbNames.includes("firestore/[default]/mircos-app/main")) {
          dbNames.push("firestore/[default]/mircos-app/main");
        }
      }

      for (const dbName of dbNames) {
        addRescueLog(`Öffne DB: ${dbName}...`);
        try {
          const db = await new Promise((resolve, reject) => {
            const req = window.indexedDB.open(dbName);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
            req.onblocked = () => reject(new Error("Blocked"));
          });

          const stores = Array.from(db.objectStoreNames);
          for (const storeName of stores) {
            addRescueLog(`Lese Store: ${storeName}...`);
            try {
              const tx = db.transaction(storeName, "readonly");
              const store = tx.objectStore(storeName);
              const records = await new Promise((resolve, reject) => {
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
              });

              let storeWoCount = 0;
              for (const record of records) {
                const { workouts, plans, weightHistory } = extractWorkoutsFromAnyObject(record);
                if (workouts.length > 0) {
                  allWorkouts = [...allWorkouts, ...workouts];
                  storeWoCount += workouts.length;
                }
                if (plans.length > 0) allPlans = [...allPlans, ...plans];
                if (weightHistory.length > 0) allWeight = [...allWeight, ...weightHistory];
              }
              if (storeWoCount > 0) {
                addRescueLog(`-> ${storeWoCount} Workouts in ${storeName} gefunden.`);
              }
            } catch(e) {
              addRescueLog(`Fehler beim Lesen von Store ${storeName}: ${e.message}`);
            }
          }
          db.close();
        } catch(e) {
          addRescueLog(`Konnte DB ${dbName} nicht öffnen/scannen: ${e.message}`);
        }
      }
    } catch(err) {
      addRescueLog(`Fehler beim IndexedDB-Scan: ${err.message}`);
    }

    addRescueLog("Filtere Duplikate...");
    const uniqueWorkouts = [];
    const woSeen = new Set();
    allWorkouts.forEach(w => {
      if (w && w.id && !woSeen.has(w.id)) {
        woSeen.add(w.id);
        uniqueWorkouts.push(w);
      }
    });
    uniqueWorkouts.sort((a, b) => new Date(a.date) - new Date(b.date));

    const uniquePlans = [];
    const planSeen = new Set();
    allPlans.forEach(p => {
      if (p && p.id && !planSeen.has(p.id)) {
        planSeen.add(p.id);
        uniquePlans.push(p);
      }
    });

    const uniqueWeight = [];
    const weightSeen = new Set();
    allWeight.forEach(wh => {
      if (wh && wh.date && !weightSeen.has(wh.date)) {
        weightSeen.add(wh.date);
        uniqueWeight.push(wh);
      }
    });
    uniqueWeight.sort((a, b) => new Date(a.date) - new Date(b.date));

    setRescuedWorkouts(uniqueWorkouts);
    setRescuedPlans(uniquePlans);
    setRescuedWeight(uniqueWeight);
    setRescueScanProgress("done");
    addRescueLog(`Suche abgeschlossen! ${uniqueWorkouts.length} Workouts, ${uniquePlans.length} Pläne, ${uniqueWeight.length} Gewichtseinträge gefunden.`);
  };

  const executeRescueMerge = () => {
    if (!authUser) return;
    try {
      let updatedData = { ...data };
      let restoredCount = 0;
      let restoredPlans = 0;
      let restoredWeights = 0;

      rescuedWorkouts.forEach(w => {
        const exists = updatedData.workouts.some(existing => existing.id === w.id);
        if (!exists) {
          updatedData.workouts.push(w);
          restoredCount++;
        }
      });
      if (restoredCount > 0) updatedData.workouts.sort((a,b) => new Date(a.date) - new Date(b.date));

      rescuedPlans.forEach(p => {
        const exists = updatedData.plans.some(existing => existing.id === p.id);
        if (!exists) {
          updatedData.plans.push(p);
          restoredPlans++;
        } else {
          const existingIdx = updatedData.plans.findIndex(e => e.id === p.id);
          if (existingIdx !== -1 && JSON.stringify(updatedData.plans[existingIdx]) !== JSON.stringify(p)) {
             updatedData.plans[existingIdx] = p;
             restoredPlans++;
          }
        }
      });

      rescuedWeight.forEach(wh => {
         const exists = (updatedData.weightHistory||[]).some(existing => existing.date === wh.date);
         if (!exists) {
            updatedData.weightHistory = updatedData.weightHistory || [];
            updatedData.weightHistory.push(wh);
            restoredWeights++;
         }
      });
      if (updatedData.weightHistory) updatedData.weightHistory.sort((a,b) => new Date(a.date) - new Date(b.date));

      if (restoredCount > 0 || restoredPlans > 0 || restoredWeights > 0) {
        setData(updatedData);
      }

      showToast(`Rettung abgeschlossen! ${restoredCount} Workouts, ${restoredPlans} Pläne & ${restoredWeights} Gewichte importiert.`);
      setRescueModalOpen(false);
    } catch (err) {
      showToast("Fehler bei Zusammenführung: " + err.message, "error");
    }
  };

  const mergeData = (local, remote) => {
    if (!local) return remote;
    if (!remote) return local;
    
    const mergedWorkouts = [...(local.workouts || [])];
    (remote.workouts || []).forEach(rw => {
      if (rw && rw.id) {
        const exists = mergedWorkouts.some(lw => lw.id === rw.id);
        if (!exists) {
          mergedWorkouts.push(rw);
        }
      }
    });
    mergedWorkouts.sort((a, b) => new Date(a.date) - new Date(b.date));

    const mergedPlans = [...(local.plans || [])];
    (remote.plans || []).forEach(rp => {
      if (rp && rp.id) {
        const exists = mergedPlans.some(lp => lp.id === rp.id);
        if (!exists) {
          mergedPlans.push(rp);
        } else {
          const localIdx = mergedPlans.findIndex(lp => lp.id === rp.id);
          const localPlan = mergedPlans[localIdx];
          if (rp.updatedAt > (localPlan.updatedAt || 0)) {
            mergedPlans[localIdx] = rp;
          }
        }
      }
    });

    const mergedWeightHistory = [...(local.weightHistory || [])];
    (remote.weightHistory || []).forEach(rw => {
      if (rw && rw.date) {
        const exists = mergedWeightHistory.some(lw => lw.date === rw.date);
        if (!exists) {
          mergedWeightHistory.push(rw);
        }
      }
    });
    mergedWeightHistory.sort((a, b) => new Date(a.date) - new Date(b.date));

    return {
      ...local,
      workouts: mergedWorkouts,
      plans: mergedPlans,
      weightHistory: mergedWeightHistory
    };
  };
  
  // ── Body Scroll Lock when any modal is open ─────────────────────────────
  useEffect(() => {
    const anyOpen = logModal || planModal || !!weeklyReport || rescueModalOpen;
    if (anyOpen) {
      document.body.classList.add('modal-open');
    } else {
      document.body.classList.remove('modal-open');
    }
    return () => document.body.classList.remove('modal-open');
  }, [logModal, planModal, weeklyReport, rescueModalOpen]);

  // ── Active Workout Global State ───────────────────────────────────────────
  const [activeWorkout, setActiveWorkout] = useState(() => ls("active_workout", null));
  // Sync active workout to local storage
  useEffect(() => {
    if (activeWorkout) localStorage.setItem("ff_active_workout", JSON.stringify(activeWorkout));
    else localStorage.removeItem("ff_active_workout");
  }, [activeWorkout]);

  // Global Timer Loop for the active workout
  useEffect(() => {
    let itv;
    if (activeWorkout && activeWorkout.running && activeWorkout.step === 2 && view !== "log") {
      const start = Date.now() - (activeWorkout.timer * 1000);

  const hasCachedData = data !== defaultData || library.length > 0 || Object.keys(prs).length > 2 || Object.keys(nutrition).length > 0;

              }

        setTimeout(attachAuth, 100);
      }
    };

    const onReady = () => attachAuth();

    // Safety timeout: if after 15 seconds still no snapshots, assume ready to write

      if (!cancelled && authLoading) {

      unsubs.forEach(fn => fn());

  }, []);

  // ── Sync to Firestore on local change (debounced) ────────────────────────

    if (!authUser || !loaded) return;
    
    // Safety guard: only upload if this key has finished its initial load from Firestore
    if (!loadedKeysRef.current[key]) return;

    const valStr = JSON.stringify(val);

    if (valStr === lastSyncRef.current[key]) return;

    // Safety check: Prevent overwriting richer cloud data with empty/smaller local data
    if (key === "data" && val && Array.isArray(val.workouts)) {
      try {
        const lastStr = lastSyncRef.current[key] || localStorage.getItem(`ff_${authUser.uid}_${key}`);
        if (lastStr) {
          const lastVal = JSON.parse(lastStr);
          if (lastVal && Array.isArray(lastVal.workouts) && lastVal.workouts.length > val.workouts.length) {
            // Local state has fewer workouts than what is in cloud/lastSync. Merge them instead of writing smaller dataset!
            console.warn(`Local data has fewer workouts (${val.workouts.length}) than last sync (${lastVal.workouts.length}). Merging...`);
            const merged = mergeData(val, lastVal);

          }
        }
      } catch(e) {}

  useEffect(() => {

              });

             (w.exercises||[]).forEach(ex => {

             });
