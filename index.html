  { id: 41, title: "Muskelkater-Mythen", cat: "Regeneration", text: "Muskelkater ist kein Indikator für Muskelwachstum, sondern oft nur für ungewohnte Bewegung.", icon: "🩹" },
  { id: 42, title: "Tiefkühl-Gemüse", cat: "Grundlagen", text: "Wird oft direkt nach der Ernte gefroren und hat daher meist mehr Vitamine als 'frisches' aus dem Laden.", icon: "🧊" },
  { id: 43, title: "Meal Prep Vorteile", cat: "Grundlagen", text: "Wer plant, sündigt seltener. Meal Prep spart Zeit, Geld und stellt deine Makros sicher.", icon: "🍱" },
  { id: 44, title: "Protein-Absorption", cat: "Grundlagen", text: "Dein Körper kann mehr als 30g Protein pro Mahlzeit nutzen. Er braucht nur länger zum Verdauen.", icon: "🔄" },
  { id: 45, title: "Cheat Meals Psychologie", cat: "Grundlagen", text: "Ein geplantes Cheat-Meal kann helfen, langfristig diszipliniert zu bleiben. Bleib aber bei 80/20.", icon: "🍔" },
  { id: 46, title: "Salz & Blutdruck", cat: "Gesundheit", text: "Für Athleten ist Salz wichtig (Elektrolyte), aber wer Bluthochdruck hat, sollte vorsichtiger sein.", icon: "📉" },
  { id: 47, title: "Zitronenwasser am Morgen", cat: "Grundlagen", text: "Guter Start zur Hydratation. Es 'verbrennt' aber kein Fett, wie oft behauptet wird.", icon: "🍋" },
  { id: 48, title: "Grüner Tee Extrakt", cat: "Supplements", text: "Kann den Stoffwechsel minimal erhöhen, ersetzt aber niemals das Kaloriendefizit.", icon: "🍵" },
  { id: 49, title: "Anabole Resistenz", cat: "Muskelaufbau", text: "Mit steigendem Alter braucht der Körper pro Mahlzeit mehr Protein (40g+), um den Aufbau zu triggern.", icon: "👴" },
  { id: 50, title: "Vegane Proteinquellen", cat: "Grundlagen", text: "Kombiniere Getreide und Hülsenfrüchte (z.B. Reis & Bohnen), um alle Aminosäuren zu erhalten.", icon: "🌱" },
  { id: 51, title: "BCAA Unfug?", cat: "Supplements", text: "BCAAs sind in Whey enthalten. Zusätzliche BCAAs bringen meist nur etwas bei Training im Fasten.", icon: "🧪" },
  { id: 52, title: "Sojaprotein-Mythen", cat: "Grundlagen", text: "Soja ist ein vollwertiges Protein. Die enthaltenen Phytoöstrogene schaden dem Mann in Maßen nicht.", icon: "🥛" },
  { id: 53, title: "Laktose-Sensitivität", cat: "Gesundheit", text: "Wer auf Milchprodukte mit Blähungen reagiert, sollte laktosefreie Alternativen testen.", icon: "🧀" },
  { id: 54, title: "Gluten-Check", cat: "Gesundheit", text: "Gluten ist für 95% der Menschen harmlos. Nur bei Zöliakie oder Entzündungen ein Problem.", icon: "🌾" },
  { id: 55, title: "Heißhunger-Prävention", cat: "Abnehmen", text: "Oft ein Zeichen von Schlafmangel. Schlaf reguliert Hungerhormone (Ghrelin & Leptin).", icon: "🍫" },
  { id: 60, title: "Mindful Eating", cat: "Abnehmen", text: "Langsam essen und kauen. Dein Gehirn merkt erst nach 20 Min, dass der Magen voll ist.", icon: "🧘" },
];

const CAT_COLORS={"Frühstück":"#FFD166","Mittagessen":"#FF6B35","Abendessen":"#A78BFA","Snack":"#00D9C0"};

function RecipesPage({notify, isMobile}){
  const [recipes,setRecipes]=useState(()=>{try{const r=localStorage.getItem("ff_recipes"); const p=r?JSON.parse(r):null; return p!==null?p:DEFAULT_RECIPES;}catch{return DEFAULT_RECIPES;}});
  const [selRecipe,setSelRecipe]=useState(null);
  const [shoppingList,setShoppingList]=useState([]);
  const [showShopping,setShowShopping]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState("");
  const [filterCat,setFilterCat]=useState("Alle");
  const [filterFav,setFilterFav]=useState(false);
  const [apiRecipes,setApiRecipes]=useState([]);
  const [apiLoading,setApiLoading]=useState(false);
  const [searchMode,setSearchMode]=useState("local");

  const searchOpenFoodRecipes=async(query)=>{
    if(!query||query.length<3)return;
    setApiLoading(true);
    try{
      const res=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?action=process&search_terms=${encodeURIComponent(query)}&sort_by=unique_scans_n&page_size=50&json=1`, {
        headers: { 'User-Agent': 'FitForge-HealthApp/1.0 (https://fitforge.app)' }
      });
      if(!res.ok) throw new Error("API_ERROR");
      const data=await res.json();
      const results=(data.products||[]).filter(p=>p.product_name && p.nutriments).map(p=>({
        id:"api_"+Date.now()+Math.random(),
        name:p.product_name+(p.brands?" ("+p.brands+")":""),
        kcal:Math.round(p.nutriments["energy-kcal_100g"] || p.nutriments["energy-kcal"] || (p.nutriments["energy-kj_100g"]/4.184) || 0),
        protein:Math.round((p.nutriments.proteins_100g||0)*10)/10,
        carbs:Math.round((p.nutriments.carbohydrates_100g||0)*10)/10,
        fat:Math.round((p.nutriments.fat_100g||0)*10)/10,
        time:15,category:"Sonstige",
        ingredients: (typeof p.ingredients_text === 'string' && p.ingredients_text.length > 5) 
          ? [{name:p.ingredients_text.substring(0,300),amount:p.quantity||"1 Einheit"}] 
          : [{name:"Nicht angegeben",amount:p.quantity||"1 Einheit"}],
        steps:["Produkt nach Belieben zubereiten."],
        tags:["Open Food Facts"],
        photo: p.image_url
      })).filter(p=>p.kcal>0);
      setApiRecipes(results);
    }catch(e){console.error("OFF Recipe Error:", e); notify("Fehler bei der Rezeptsuche", "error");}
    setApiLoading(false);
  };

  useEffect(()=>{
    if(searchMode==="api"&&search.length>=3){
      const t=setTimeout(()=>searchOpenFoodRecipes(search),600);
      return()=>clearTimeout(t);
    }
  },[search,searchMode]);
  
  const [checkedItems,setCheckedItems]=useState({});
  const [newRecipe,setNewRecipe]=useState({name:"",kcal:"",protein:"",carbs:"",fat:"",time:"",category:"Frühstück",ingredients:[{name:"",amount:""}],steps:[""],tags:""});

  useEffect(()=>localStorage.setItem("ff_recipes",JSON.stringify(recipes)),[recipes]);

  const cats=["Alle","Frühstück","Mittagessen","Abendessen","Snack"];
  const filtered=searchMode==="api"?apiRecipes:recipes.filter(r=>{
    const matchCat = filterCat==="Alle"||r.category===filterCat;
    const matchSearch = r.name.toLowerCase().includes(search.toLowerCase())||(Array.isArray(r.tags)&&r.tags.some(t=>t.toLowerCase().includes(search.toLowerCase())));
    const matchFav = !filterFav || r.favorite;
    return matchCat && matchSearch && matchFav;
  });

  const toggleFav=(id, e)=>{
    if(e) e.stopPropagation();
    setRecipes(prev=>prev.map(r=>r.id===id?{...r,favorite:!r.favorite}:r));
  };

  const addToShopping=(recipe,portions=1)=>{
    const r_ing = Array.isArray(recipe.ingredients)?recipe.ingredients:[];
    const items=r_ing.map(ing=>({id:Date.now()+Math.random(),name:ing.name||"Zutat",amount:ing.amount||"",recipe:recipe.name||"Rezept",checked:false,portions}));
    setShoppingList(l=>{
      const existing=[...l];
      items.forEach(item=>{
        const found=existing.findIndex(e=>e.name.toLowerCase()===item.name.toLowerCase());
        if(found>=0){existing[found]={...existing[found],amount:`${existing[found].amount} + ${item.amount}`};}
        else{existing.push(item);}
      });
      return existing;
    });
    setShowShopping(true);
    notify(`${recipe.name} zur Einkaufsliste hinzugefügt! 🛒`);
  };

  const toggleCheck=id=>setCheckedItems(c=>({...c,[id]:!c[id]}));
  const clearChecked=()=>setShoppingList(l=>l.filter(i=>!checkedItems[i.id]));

  const saveNewRecipe=()=>{
    if(!newRecipe.name)return notify("Name fehlt","error");
    const r={...newRecipe,id:Date.now(),kcal:parseInt(newRecipe.kcal)||0,protein:parseInt(newRecipe.protein)||0,carbs:parseInt(newRecipe.carbs)||0,fat:parseInt(newRecipe.fat)||0,time:parseInt(newRecipe.time)||0,tags:newRecipe.tags?newRecipe.tags.split(",").map(t=>t.trim()):[]};
    setRecipes(prev=>[...prev,r]);
    setShowAdd(false);
    notify("Rezept gespeichert! 🍽️");
  };

  // Detail view
  if(selRecipe){
    const r=selRecipe;
    return(
      <div style={{padding: isMobile ? "10px 10px 80px" : "28px 32px 56px", maxWidth:700, margin:"0 auto"}}>
        <button style={{background:"transparent",border:"none",color:"#888",cursor:"pointer",fontSize:13,padding: isMobile?"10px 0":"0 0 18px",display:"flex",alignItems:"center",gap:6,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>setSelRecipe(null)}>← Zurück</button>
      <div style={{background:"rgba(255,255,255,0.03)", border: isMobile?"none":"1px solid rgba(255,255,255,0.07)", borderRadius:18, overflow:"hidden", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)"}}>
          <div style={{background:`linear-gradient(135deg,${CAT_COLORS[r.category]||"#FF6B35"}22,rgba(10,10,15,0.7))`, padding: isMobile?"20px":"28px 28px 20px"}}>
            <div style={{display:"inline-flex", background:CAT_COLORS[r.category]||"#FF6B35", borderRadius:8, padding:"4px 12px", fontSize:10, fontWeight:700, color:"#000", marginBottom:12}}>{r.category}</div>
            <h1 style={{fontFamily:"'DM Sans',sans-serif", fontSize: isMobile?22:28, fontWeight:800, margin:"0 0 8px"}}>{r.name}</h1>
            <div style={{display:"flex", gap: isMobile?10:16, fontSize:12, color:"#666", flexWrap:"wrap"}}>
              <span>⏱ {r.time} Min</span>
              <span>🔥 {r.kcal} kcal</span>
              <span style={{color:"#00D9C0"}}>💪 {r.protein}g P</span>
            </div>
          </div>
          <div style={{padding: isMobile?"0 16px 20px":"0 28px 28px"}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20,marginTop:16}}>
              {(r.tags||[]).map((tag,i)=><span key={i} style={{fontSize:10,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6,padding:"2px 8px",color:"#888"}}>{tag}</span>)}
            </div>
            <h3 style={{fontFamily:"'DM Sans',sans-serif",fontSize:16,fontWeight:800,marginBottom:12}}>Zutaten</h3>
            <div style={{background:"rgba(255,255,255,0.02)",borderRadius:12,padding:"4px 0",marginBottom:20, border:"1px solid rgba(255,255,255,0.05)"}}>
              {(Array.isArray(r.ingredients)?r.ingredients:[]).map((ing,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",borderBottom:i<(r.ingredients?.length||0)-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                  <span style={{fontSize:13,fontWeight:600}}>{ing.name}</span>
                  <span style={{fontSize:12,color:"#666"}}>{ing.amount}</span>
                </div>
              ))}
            </div>
            <h3 style={{fontFamily:"'DM Sans',sans-serif",fontSize:16,fontWeight:800,marginBottom:12}}>Zubereitung</h3>
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:24}}>
              {(Array.isArray(r.steps)?r.steps:[]).map((step,i)=>(
                <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:"#FF6B35",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0,marginTop:1}}>{i+1}</div>
                  <div style={{fontSize:13,lineHeight:1.6,paddingTop:2}}>{step}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10, flexDirection: isMobile?"column":"row"}}>
              {Array.isArray(r.tags) && r.tags.some(t=>t.includes("Open Food Facts"))&&<button style={{flex:1,background:"#06D6A020",border:"1px solid #06D6A0",borderRadius:10,padding:"12px",color:"#06D6A0",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} onClick={()=>{setRecipes(prev=>[...prev,{...r,id:Date.now(),tags:["Gespeichert"]}]);notify("Zu Rezepten gespeichert! ✅");}}>
                💾 Speichern
              </button>}
              <button style={{flex:1,background:"#FF6B35",border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} onClick={()=>addToShopping(r)}>
                🛒 Zur Einkaufsliste
              </button>
              <button style={{background:"rgba(239,71,111,0.15)",border:"1px solid #EF476F",borderRadius:10,padding:"11px",color:"#EF476F",textShadow:"0 0 10px rgba(239,71,111,0.5)",boxShadow:"0 0 15px rgba(239,71,111,0.3), inset 0 0 10px rgba(239,71,111,0.2)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}} onClick={()=>{if(confirm("Rezept löschen?")) {setRecipes(prev=>prev.filter(x=>x.id!==r.id));setSelRecipe(null);notify("Rezept gelöscht");}}}>
                🗑 Löschen
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // Shopping list view
  if(showShopping){
    const grouped={};
    shoppingList.forEach(item=>{if(!grouped[item.recipe])grouped[item.recipe]=[];grouped[item.recipe].push(item);});
    return(
      <div style={{padding: isMobile ? "10px 10px 80px" : "28px 32px 56px", maxWidth:700, margin:"0 auto"}}>
        <button style={{background:"transparent",border:"none",color:"#888",cursor:"pointer",fontSize:13,padding: isMobile?"10px 0":"0 0 18px",display:"flex",alignItems:"center",gap:6,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>setShowShopping(false)}>← Zurück</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20, flexDirection: isMobile?"column":"row", gap:12}}>
          <div><h1 style={{fontFamily:"'DM Sans',sans-serif",fontSize:24,fontWeight:800,margin:0}}>Einkaufsliste</h1><p style={{color:"#666",fontSize:12,marginTop:4}}>{shoppingList.length} Artikel</p></div>
          <div style={{display:"flex",gap:8, width: isMobile?"100%":"auto"}}>
            {Object.keys(checkedItems).some(k=>checkedItems[k])&&<button style={{background:"#EF476F22",border:"1px solid #EF476F44",borderRadius:9,padding:"8px 12px",color:"#EF476F",cursor:"pointer",fontSize:12,flex:1}} onClick={clearChecked}>Erledigte</button>}
            <button style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,padding:"8px 12px",color:"#888",cursor:"pointer",fontSize:12,flex:1}} onClick={()=>setShoppingList([])}>Leeren</button>
          </div>
        </div>
        {Object.entries(grouped).map(([recipe,items])=>(
          <div key={recipe} style={{marginBottom:18}}>
            <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6, paddingLeft:4}}>{recipe}</div>
            <div style={{background:"rgba(255,255,255,0.02)",borderRadius:14,overflow:"hidden", border:"1px solid rgba(255,255,255,0.06)", backdropFilter:"blur(15px)", WebkitBackdropFilter:"blur(15px)"}}>
              {items.map((item,i)=>(
                <div key={item.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderBottom:i<items.length-1?"1px solid rgba(255,255,255,0.04)":"none",cursor:"pointer",opacity:checkedItems[item.id]?0.4:1}} onClick={()=>toggleCheck(item.id)}>
                  <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${checkedItems[item.id]?"#06D6A0":"rgba(255,255,255,0.15)"}`,background:checkedItems[item.id]?"#06D6A0":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {checkedItems[item.id]&&<svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="white" strokeWidth="4"><path d="M5 13l4 4L19 7"/></svg>}
                  </div>
                  <span style={{flex:1,fontSize:13,fontWeight:600,textDecoration:checkedItems[item.id]?"line-through":"none"}}>{item.name}</span>
                  <span style={{fontSize:12,color:"#666"}}>{item.amount}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
        {!shoppingList.length&&<div style={{textAlign:"center",padding:"50px 20px",color:"#444",background:"rgba(255,255,255,0.02)",borderRadius:16,border:"1px solid rgba(255,255,255,0.06)"}}><div style={{fontSize:36,marginBottom:12}}>🛒</div><div style={{fontSize:13}}>Deine Einkaufsliste ist leer.</div></div>}
      </div>
    );
  }

  return(
    <div style={{...s.page, padding: isMobile ? "10px 10px 80px" : s.page.padding, maxWidth:940, margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24, flexDirection: isMobile?"column":"row", gap:16}}>
        <div><h1 style={{fontFamily:"'DM Sans',sans-serif",fontSize: isMobile?26:32,fontWeight:800,margin:0,letterSpacing:"-0.5px"}}>Kochbuch</h1><p style={{color:"#666",fontSize:13,marginTop:4}}>{recipes.length} Rezepte gespeichert</p></div>
        <div style={{display:"flex",gap:8, width: isMobile?"100%":"auto"}}>
          <button style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding: isMobile?"10px":"10px 18px",color:"#aaa",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:7, flex:1, justifyContent:"center"}} onClick={()=>setShowShopping(true)}>
            🛒 {isMobile?"Liste":"Einkaufsliste"} {shoppingList.length>0&&<span style={{background:"#FF6B35",color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{shoppingList.length}</span>}
          </button>
          <button style={{background:"#FF6B35",border:"none",borderRadius:10,padding: isMobile?"10px":"10px 18px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer", flex:1}} onClick={()=>setShowAdd(o=>!o)}>
            + {isMobile?"Rezept":"Neues Rezept"}
          </button>
        </div>
      </div>

      {/* Search + Filter */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"nowrap", overflowX:"auto", paddingBottom:4, msOverflowStyle:"none", scrollbarWidth:"none"}}>
        <button style={{background:searchMode==="local"&&!filterFav?"#FF6B35":"rgba(255,255,255,0.04)",border:`1px solid ${searchMode==="local"&&!filterFav?"#FF6B35":"rgba(255,255,255,0.08)"}`,borderRadius:9,padding:"8px 14px",color:searchMode==="local"&&!filterFav?"#fff":"#888",cursor:"pointer",fontSize:12,fontWeight:600,flexShrink:0}} onClick={()=>{setSearchMode("local");setFilterFav(false);setApiRecipes([]);}}>Alle</button>
        <button style={{background:filterFav?"#FFD166":"rgba(255,255,255,0.04)",border:`1px solid ${filterFav?"#FFD166":"rgba(255,255,255,0.08)"}`,borderRadius:9,padding:"8px 14px",color:filterFav?"#000":"#888",cursor:"pointer",fontSize:12,fontWeight:600,flexShrink:0}} onClick={()=>{setSearchMode("local");setFilterFav(true);setApiRecipes([]);}}>⭐ Favoriten</button>
        <button style={{background:searchMode==="api"?"#FF6B35":"rgba(255,255,255,0.04)",border:`1px solid ${searchMode==="api"?"#FF6B35":"rgba(255,255,255,0.08)"}`,borderRadius:9,padding:"8px 14px",color:searchMode==="api"?"#fff":"#888",cursor:"pointer",fontSize:12,fontWeight:600,flexShrink:0}} onClick={()=>{setSearchMode("api");setFilterFav(false);setApiRecipes([]);}}>🌍 Community</button>
      </div>
      
      <div style={{display:"flex",gap:10,marginBottom:16,flexDirection: isMobile?"column":"row"}}>
        <input style={{...s.inp, flex:1, fontSize:13}} placeholder={searchMode==="api"?"Global suchen...":"Suche..."} value={search} onChange={e=>setSearch(e.target.value)}/>
        {searchMode==="local"&&<div style={{display:"flex",gap:6, overflowX:"auto", msOverflowStyle:"none", scrollbarWidth:"none", paddingBottom: isMobile?4:0}}>
          {cats.map(cat=><button key={cat} style={{background:filterCat===cat?(CAT_COLORS[cat]||"#FF6B35"):"rgba(255,255,255,0.04)",border:`1px solid ${filterCat===cat?(CAT_COLORS[cat]||"#FF6B35"):"rgba(255,255,255,0.08)"}`,borderRadius:9,padding:"8px 12px",color:filterCat===cat?"#000":"#888",cursor:"pointer",fontSize:11,fontWeight:600, flexShrink:0}} onClick={()=>setFilterCat(cat)}>{cat}</button>)}
        </div>}
      </div>

      {searchMode==="api"&&apiLoading&&<div style={{textAlign:"center",padding:"24px",color:"#888",fontSize:13}}>🔍 Durchsuche Datenbank...</div>}

      {/* Add recipe form */}
      {showAdd&&<div style={{...s.card, padding: isMobile?16:22, marginBottom:22}} className="fadeIn">
        <h3 style={{fontFamily:"'DM Sans',sans-serif",fontSize:17,fontWeight:800,margin:"0 0 16px"}}>Neues Rezept erstellen</h3>
        <div style={{display:"grid",gridTemplateColumns: isMobile?"1fr":"2fr 1fr 1fr",gap:11,marginBottom:11}}>
          <div><label style={s.lbl}>Name</label><input style={s.inp} value={newRecipe.name} onChange={e=>setNewRecipe(r=>({...r,name:e.target.value}))} placeholder="z.B. Protein Pancakes"/></div>
          <div><label style={s.lbl}>Kategorie</label><select style={s.inp} value={newRecipe.category} onChange={e=>setNewRecipe(r=>({...r,category:e.target.value}))}>{["Frühstück","Mittagessen","Abendessen","Snack"].map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label style={s.lbl}>Zeit (Min)</label><input type="number" style={s.inp} value={newRecipe.time} onChange={e=>setNewRecipe(r=>({...r,time:e.target.value}))} placeholder="20"/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns: isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:11,marginBottom:14}}>
          {[["Kalorien","kcal","#FF6B35"],["Protein (g)","protein","#00D9C0"],["Carbs (g)","carbs","#FFD166"],["Fett (g)","fat","#A78BFA"]].map(([label,key,color])=>(
            <div key={key}><label style={{...s.lbl, color}}>{label}</label><input type="number" style={s.inp} value={newRecipe[key]} onChange={e=>setNewRecipe(r=>({...r,[key]:e.target.value}))} placeholder="0"/></div>
          ))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button style={{...s.secBtn, flex:1}} onClick={()=>setShowAdd(false)}>Abbrechen</button>
          <button style={{...s.primaryBtn, flex:1}} onClick={saveNewRecipe}>Speichern</button>
        </div>
      </div>}

      {/* Recipe Grid */}
      <div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fill,minmax(270px,1fr))", gap:16}}>
        {filtered.map(r=>(
          <div key={r.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:18,overflow:"hidden",cursor:"pointer",backdropFilter:"blur(15px)",WebkitBackdropFilter:"blur(15px)"}} className="hoverCard" onClick={()=>setSelRecipe(r)}>
            <div style={{background:`linear-gradient(135deg,${CAT_COLORS[r.category]||"#FF6B35"}22,rgba(10,10,15,0.6))`,padding:18,position:"relative"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <span style={{background:CAT_COLORS[r.category]||"#FF6B35",borderRadius:7,padding:"3px 10px",fontSize:9,fontWeight:800,color:"#000"}}>{r.category}</span>
                <button style={{background:"transparent",border:"none",color:r.favorite?"#FFD166":"#444",cursor:"pointer",padding:0,fontSize:18, transition:"color 0.2s"}} onClick={(e)=>toggleFav(r.id, e)}>
                  {r.favorite?"★":"☆"}
                </button>
              </div>
              <h3 style={{fontFamily:"'DM Sans',sans-serif",fontSize:16,fontWeight:800,margin:"0 0 8px", color:"#F0EDE8"}}>{r.name}</h3>
              <div style={{display:"flex",gap:10,fontSize:11, color:"#888"}}>
                <span style={{color:"#FF6B35", fontWeight:700}}>🔥 {r.kcal} kcal</span>
                <span style={{color:"#00D9C0", fontWeight:700}}>💪 {r.protein}g P</span>
              </div>
            </div>
            <div style={{padding:"14px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:"#555"}}>⏱ {r.time} Min</span>
                <span style={{fontSize:11,color:"#555"}}>{r.ingredients?.length||0} Zutaten</span>
              </div>
            </div>
          </div>
        ))}
      </div>
      {!filtered.length&&<div style={{textAlign:"center",padding:"60px 20px",color:"#444",background:"rgba(255,255,255,0.02)",borderRadius:16,border:"1px solid rgba(255,255,255,0.06)",marginTop:16}}><div style={{fontSize:40,marginBottom:12}}>🥣</div><div style={{fontSize:13}}>Keine Rezepte gefunden.</div></div>}
    </div>
  );
}



// ─── Goals Page ───────────────────────────────────────────────────────────────
function GoalsPage({user,setUser,data,notify,isMobile}){
  const [goals,setGoals]=useState(()=>{try{const r=localStorage.getItem("ff_goals");return r?JSON.parse(r):[
    {id:1,title:"10kg abnehmen",category:"Gewicht",target:10,current:3,unit:"kg",deadline:"2025-06-01",color:"#FF6B35",icon:"⚖️",done:false},
    {id:2,title:"5x pro Woche trainieren",category:"Training",target:5,current:3,unit:"x/Woche",deadline:"2025-04-01",color:"#00D9C0",icon:"💪",done:false},
    {id:3,title:"100kg Bankdrücken",category:"Kraft",target:100,current:85,unit:"kg",deadline:"2025-12-01",color:"#A78BFA",icon:"🏋️",done:false},
  ];}catch{return[];}});
  const [showAdd,setShowAdd]=useState(false);
  const [newGoal,setNewGoal]=useState({title:"",category:"Training",target:"",current:"",unit:"",deadline:"",color:"#FF6B35",icon:"🎯"});
  const [editId,setEditId]=useState(null);

  const [rewards,setRewards]=useState(()=>{try{const r=localStorage.getItem("ff_rewards");return r?JSON.parse(r):[
    {id:1,title:"Neues Gym-Shirt",cost:5000,redeemed:false},
    {id:2,title:"Cheat Meal",cost:2000,redeemed:false}
  ];}catch{return[];}});
  const [showAddReward, setShowAddReward] = useState(false);
  const [newReward, setNewReward] = useState({title:"", cost:""});
  const [showLegend, setShowLegend] = useState(false);

  useEffect(()=>localStorage.setItem("ff_goals",JSON.stringify(goals)),[goals]);
  useEffect(()=>localStorage.setItem("ff_rewards",JSON.stringify(rewards)),[rewards]);

  const fp = user.forgePoints || 0;

  const saveReward = () => {
    if(!newReward.title || !newReward.cost) return notify("Titel und Kosten ausfüllen", "error");
    setRewards(r=>[...r,{...newReward, id:Date.now(), cost: parseInt(newReward.cost)||0, redeemed: false}]);
    setShowAddReward(false);
    setNewReward({title:"", cost:""});
    notify("Belohnung hinzugefügt! 🎁");
  };

  const redeemReward = (id, cost) => {
    if (fp < cost) return notify("Nicht genug Forge Points!", "error");
    setUser(u => ({...u, forgePoints: (u.forgePoints||0) - cost}));
    setRewards(r => r.map(x => x.id === id ? {...x, redeemed: true} : x));
    notify("Belohnung erfolgreich eingelöst! 🎉");
  };
  const deleteReward = id => {
    setRewards(r => r.filter(x => x.id !== id));
    notify("Belohnung gelöscht");
  };

  const saveGoal=()=>{
    if(!newGoal.title||!newGoal.target)return notify("Titel und Ziel ausfüllen","error");
    if(editId){
      setGoals(g=>g.map(x=>x.id===editId?{...x,...newGoal,target:parseFloat(newGoal.target),current:parseFloat(newGoal.current)||0}:x));
      notify("Ziel aktualisiert! ✅");
    } else {
      setGoals(g=>[...g,{...newGoal,id:Date.now(),target:parseFloat(newGoal.target),current:parseFloat(newGoal.current)||0,done:false}]);
      notify("Ziel hinzugefügt! 🎯");
    }
    setShowAdd(false);setEditId(null);
    setNewGoal({title:"",category:"Training",target:"",current:"",unit:"",deadline:"",color:"#FF6B35",icon:"🎯"});
  };

  const updateProgress=(id,val)=>setGoals(g=>g.map(x=>x.id===id?{...x,current:parseFloat(val)||0,done:parseFloat(val)>=x.target}:x));
  const delGoal=id=>{setGoals(g=>g.filter(x=>x.id!==id));notify("Ziel gelöscht");};
  const toggleDone=id=>setGoals(g=>g.map(x=>x.id===id?{...x,done:!x.done}:x));

  const ICONS=["🎯","💪","⚖️","🏋️","🏃","🥗","❤️","🧘","🚴","🏊","⚡","🔥"];
  const CATS=["Training","Gewicht","Kraft","Ausdauer","Ernährung","Gesundheit"];
  const COLORS=["#FF6B35","#00D9C0","#FFD166","#A78BFA","#EF476F","#06D6A0","#4361EE","#F72585"];

  const totalGoals=goals.length;
  const doneGoals=goals.filter(g=>g.done).length;
  const avgProgress=totalGoals?Math.round(goals.reduce((a,g)=>a+Math.min(g.current/g.target*100,100),0)/totalGoals):0;
  const totalWorkouts=data.workouts.length;
  const thisWeekW=data.workouts.filter(w=>new Date(w.date)>=new Date(Date.now()-7*864e5)).length;

  return(
    <div style={{...s.page, padding: isMobile ? "10px 10px 80px" : s.page.padding}}>
      <div style={s.pageHead}>
        <div><h1 style={s.pageTitle}>Meine Ziele</h1><p style={s.pageSub}>Verfolge deinen Fortschritt</p></div>
        <button style={s.primaryBtn} onClick={()=>{setShowAdd(o=>!o);setEditId(null);setNewGoal({title:"",category:"Training",target:"",current:"",unit:"",deadline:"",color:"#FF6B35",icon:"🎯"});}}>{IC.plus} {isMobile ? "" : "Neues Ziel"}</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)",gap:12,marginBottom:28}}>
        {[[`${doneGoals}/${totalGoals}`,"Erreicht","#FF6B35","🎯"],[`${avgProgress}%`,"Ø Fortschritt","#00D9C0","📈"],[totalWorkouts,"Trainings","#A78BFA","💪"],[thisWeekW,"Diese Woche","#FFD166","🔥"]].map(([v,l,c,ic],i)=>(
          <div key={i} style={{...s.statCard, padding: isMobile ? 12 : 18, textAlign:"center"}} className="statCard">
            <div style={{fontSize: isMobile ? 18 : 22,marginBottom:6}}>{ic}</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize: isMobile ? 20 : 24,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:10,color:"#666",marginTop:4}}>{l}</div>
          </div>
        ))}
      </div>

      {showAdd&&<div style={{...s.card, padding: isMobile ? 16 : 22, marginBottom:24}} className="fadeIn">
        <h3 style={{fontFamily:"'DM Sans',sans-serif",fontSize:18,fontWeight:800,margin:"0 0 16px"}}>{editId?"Ziel bearbeiten":"Neues Ziel"}</h3>
        <div style={{marginBottom:14}}>
          <label style={s.lbl}>Icon</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {ICONS.map(ic=><button key={ic} style={{width:38,height:38,borderRadius:9,background:newGoal.icon===ic?"#FF6B3530":"rgba(255,255,255,0.04)",border:`1px solid ${newGoal.icon===ic?"#FF6B35":"rgba(255,255,255,0.08)"}`,cursor:"pointer",fontSize:18}} onClick={()=>setNewGoal(g=>({...g,icon:ic}))}>{ic}</button>)}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "2fr 1fr",gap:11,marginBottom:11}}>
          <div><label style={s.lbl}>Titel</label><input style={s.inp} value={newGoal.title} onChange={e=>setNewGoal(g=>({...g,title:e.target.value}))} placeholder="z.B. 10kg abnehmen"/></div>
          <div><label style={s.lbl}>Kategorie</label><select style={s.inp} value={newGoal.category} onChange={e=>setNewGoal(g=>({...g,category:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)",gap:11,marginBottom:11}}>
          <div><label style={s.lbl}>Zielwert</label><input type="number" style={s.inp} value={newGoal.target} onChange={e=>setNewGoal(g=>({...g,target:e.target.value}))} placeholder="100"/></div>
          <div><label style={s.lbl}>Aktuell</label><input type="number" style={s.inp} value={newGoal.current} onChange={e=>setNewGoal(g=>({...g,current:e.target.value}))} placeholder="0"/></div>
          <div><label style={s.lbl}>Einheit</label><input style={s.inp} value={newGoal.unit} onChange={e=>setNewGoal(g=>({...g,unit:e.target.value}))} placeholder="kg"/></div>
          <div><label style={s.lbl}>Deadline</label><input type="date" style={s.inp} value={newGoal.deadline} onChange={e=>setNewGoal(g=>({...g,deadline:e.target.value}))}/></div>
        </div>
        <div style={{marginBottom:16}}>
          <label style={s.lbl}>Farbe</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{COLORS.map(c=><div key={c} onClick={()=>setNewGoal(g=>({...g,color:c}))} style={{width:24,height:24,borderRadius:"50%",background:c,cursor:"pointer",outline:newGoal.color===c?`3px solid ${c}`:"none",outlineOffset:2}} className="colorSwatch"/>)}</div>
        </div>
        <div style={{display:"flex",gap:11}}>
          <button style={s.secBtn} onClick={()=>{setShowAdd(false);setEditId(null);}}>Abbrechen</button>
          <button style={s.primaryBtn} onClick={saveGoal}>Speichern</button>
        </div>
      </div>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
        {goals.map(goal=>{
          const pct=Math.min(goal.current/goal.target*100,100);
          const daysLeft=goal.deadline?Math.ceil((new Date(goal.deadline)-new Date())/864e5):null;
          return(
            <div key={goal.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${goal.done?"#06D6A0":"rgba(255,255,255,0.06)"}`,borderRadius:16,padding:20,position:"relative",opacity:goal.done?0.8:1,backdropFilter:"blur(15px)",WebkitBackdropFilter:"blur(15px)"}} className="statCard">
              {goal.done&&<div style={{position:"absolute",top:14,right:14,background:"#06D6A020",border:"1px solid #06D6A0",borderRadius:8,padding:"3px 10px",fontSize:10,color:"#06D6A0",fontWeight:700}}>✓ Erreicht</div>}
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <div style={{width:40,height:40,borderRadius:10,background:goal.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{goal.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:800,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{goal.title}</div>
                  <div style={{fontSize:11,color:"#888"}}>{goal.category}</div>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:700,color:goal.color}}>{goal.current} {goal.unit}</span>
                  <span style={{fontSize:11,color:"#666"}}>Ziel: {goal.target} {goal.unit}</span>
                </div>
                <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:goal.color,borderRadius:3,transition:"width 0.5s"}}/>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <input type="number" style={s.setInp} value={goal.current} onChange={e=>updateProgress(goal.id,e.target.value)} placeholder="Aktuell"/>
                {daysLeft!==null&&<span style={{fontSize:10,color:daysLeft<7?"#EF476F":"#666"}}>
                  {daysLeft>0?`⏳ ${daysLeft}T`:daysLeft===0?"🎯 Heute!":"❌ Aus"}
                </span>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="action-btn-success" style={{flex:1,background:"transparent",border:`1px solid ${goal.done?"rgba(255,255,255,0.06)":"#06D6A030"}`,borderRadius:8,padding:"6px",color:goal.done?"#555":"#06D6A0",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif"}} onClick={()=>toggleDone(goal.id)}>
                  {goal.done?"↩ Reset":"✓ Done"}
                </button>
                <button className="action-btn-edit" style={{background:"transparent",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"6px 10px",color:"#555",cursor:"pointer",fontSize:11}} onClick={()=>{setEditId(goal.id);setNewGoal({...goal,target:String(goal.target),current:String(goal.current)});setShowAdd(true);}}>{IC.edit}</button>
                <button className="action-btn-danger" style={{background:"transparent",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"6px 10px",color:"#555",cursor:"pointer",fontSize:11}} onClick={()=>delGoal(goal.id)}>{IC.trash}</button>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:40, marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <h2 style={{fontFamily:"'DM Sans',sans-serif",fontSize:24,fontWeight:800}}>Forge Points Shop</h2>
            <p style={s.pageSub}>Löse deine gesammelten Punkte ein</p>
          </div>
          <div style={{display:"flex", alignItems:"center", gap:12}}>
            <button style={{width:28, height:28, borderRadius:"50%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.2)", color:"#fff", fontSize:13, fontWeight:900, cursor:"pointer", display:"flex", justifyContent:"center", alignItems:"center"}} onClick={()=>setShowLegend(true)}>i</button>
            <div style={{background:"linear-gradient(135deg, #FFD166, #FF9F1C)",color:"#000",padding:"8px 16px",borderRadius:12,fontWeight:900,fontSize:18,boxShadow:"0 4px 15px rgba(255,159,28,0.3)"}}>
              🪙 {fp} FP
            </div>
          </div>
        </div>

        <button style={{...s.primaryBtn, marginBottom: 16}} onClick={()=>setShowAddReward(!showAddReward)}>{IC.plus} Neue Belohnung</button>

        {showAddReward && <div style={{...s.card, padding: isMobile ? 16 : 22, marginBottom:24}} className="fadeIn">
          <h3 style={{fontFamily:"'DM Sans',sans-serif",fontSize:18,fontWeight:800,margin:"0 0 16px"}}>Belohnung erstellen</h3>
          <div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "2fr 1fr",gap:11,marginBottom:11}}>
            <div><label style={s.lbl}>Titel (z.B. Neues Shirt)</label><input style={s.inp} value={newReward.title} onChange={e=>setNewReward(r=>({...r,title:e.target.value}))}/></div>
            <div><label style={s.lbl}>Kosten (FP)</label><input type="number" style={s.inp} value={newReward.cost} onChange={e=>setNewReward(r=>({...r,cost:e.target.value}))}/></div>
          </div>
          <div style={{display:"flex",gap:11}}>
            <button style={s.secBtn} onClick={()=>setShowAddReward(false)}>Abbrechen</button>
            <button style={s.primaryBtn} onClick={saveReward}>Speichern</button>
          </div>
        </div>}

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
          {rewards.map(r => {
            const pct = Math.min((fp / r.cost) * 100, 100);
            return (
              <div key={r.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${r.redeemed?"#06D6A0":"rgba(255,255,255,0.06)"}`,borderRadius:16,padding:20,opacity:r.redeemed?0.6:1,position:"relative"}} className="statCard">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:16,fontWeight:800}}>{r.title}</div>
                  <div style={{fontSize:13,fontWeight:800,color:"#FFD166"}}>🪙 {r.cost}</div>
                </div>
                {!r.redeemed ? (
                  <>
                    <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden",marginBottom:12}}>
                      <div style={{height:"100%",width:`${pct}%`,background:"#FFD166",borderRadius:3,transition:"width 0.5s"}}/>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button className="action-btn-primary" style={{flex:1,background:fp>=r.cost?"#FFD166":"#333",color:fp>=r.cost?"#000":"#888",border:"none",borderRadius:8,padding:"8px",fontWeight:700,cursor:fp>=r.cost?"pointer":"not-allowed"}} onClick={() => fp>=r.cost && redeemReward(r.id, r.cost)}>
                        {fp>=r.cost ? "Einlösen" : "Sparen..."}
                      </button>
                      <button className="action-btn-danger" style={{background:"transparent",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"8px",color:"#555",cursor:"pointer"}} onClick={()=>deleteReward(r.id)}>{IC.trash}</button>
                    </div>
                  </>
                ) : (
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{color:"#06D6A0",fontWeight:700,fontSize:13}}>✓ Eingelöst</div>
                    <button className="action-btn-danger" style={{background:"transparent",border:"none",color:"#555",cursor:"pointer"}} onClick={()=>deleteReward(r.id)}>{IC.trash}</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {showLegend && (
        <div style={s.overlay2} onClick={()=>setShowLegend(false)}>
          <div style={{...s.modal, padding:24, maxWidth:400}} onClick={e=>e.stopPropagation()} className="dropIn">
            <h2 style={{...s.modalTitle, marginBottom:16, display:"flex", alignItems:"center", gap:8}}>
              🪙 FP Legende
            </h2>
            <p style={{fontSize:13, color:"#ccc", marginBottom:20, lineHeight:1.5}}>
              So werden deine <b>Forge Points</b> berechnet, damit das System für alle Sportarten fair bleibt:
            </p>
            <div style={{display:"flex", flexDirection:"column", gap:16, marginBottom:24}}>
              <div style={{background:"rgba(255,255,255,0.05)", padding:16, borderRadius:12}}>
                <div style={{fontWeight:800, color:"#F0EDE8", marginBottom:8}}>🏋️ Basis & Kraft</div>
                <div style={{fontSize:13, color:"#aaa", display:"grid", gridTemplateColumns:"1fr auto", gap:4}}>
                  <span>Trainings-Abschluss</span><span style={{color:"#FFD166", fontWeight:700}}>+100</span>
                  <span>Pro Übung</span><span style={{color:"#FFD166", fontWeight:700}}>+20</span>
                  <span>Pro Satz</span><span style={{color:"#FFD166", fontWeight:700}}>+10</span>
                  <span>Pro 100kg Volumen</span><span style={{color:"#FFD166", fontWeight:700}}>+1</span>
                </div>
              </div>
              <div style={{background:"rgba(255,255,255,0.05)", padding:16, borderRadius:12}}>
                <div style={{fontWeight:800, color:"#F0EDE8", marginBottom:8}}>🏃 Cardio & Ausdauer</div>
                <div style={{fontSize:13, color:"#aaa", display:"grid", gridTemplateColumns:"1fr auto", gap:4}}>
                  <span>Pro gelaufenem km</span><span style={{color:"#FFD166", fontWeight:700}}>+20</span>
                  <span>Pro aktiver Minute</span><span style={{color:"#FFD166", fontWeight:700}}>+2</span>
                </div>
              </div>
              <div style={{background:"rgba(255,107,53,0.1)", padding:16, borderRadius:12, border:"1px solid rgba(255,107,53,0.2)"}}>
                <div style={{fontWeight:800, color:"#FF6B35", marginBottom:8}}>🔥 Bonus</div>
                <div style={{fontSize:13, color:"#aaa", display:"grid", gridTemplateColumns:"1fr auto", gap:4}}>
                  <span>Neuer Rekord (PR)</span><span style={{color:"#FF6B35", fontWeight:900}}>+150</span>
                </div>
              </div>
            </div>
            <button style={{...s.primaryBtn, width:"100%"}} onClick={()=>setShowLegend(false)}>Verstanden</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── BIBLIOTHEK ───────────────────────────────────────────────────────────────
const MUSCLE_GROUPS=["Arme","Rücken","Brust","Schultern","Bauch","Oberschenkel","Unterschenkel","Gesäß"];
const TRAINING_TYPES=["Krafttraining","Entspannung","Cardio","HIIT","Mobility / Beweglichkeit","Stretching / Dehnen"];
const MUSCLE_COLORS={Arme:"#FF6B35",Rücken:"#A78BFA",Brust:"#00D9C0",Schultern:"#4361EE",Bauch:"#EF476F",Oberschenkel:"#FFD166",Unterschenkel:"#06D6A0",Gesäß:"#F72585"};
const TYPE_COLORS={Krafttraining:"#3B82F6",Entspannung:"#10B981",Cardio:"#F59E0B",HIIT:"#EF476F","Mobility / Beweglichkeit":"#CBFF8C","Stretching / Dehnen":"#FF9F1C"};

function LibraryPage({library,setLibrary,notify}){
  const [filterMuscle,setFilterMuscle]=useState([]);
  const [filterType,setFilterType]=useState([]);
  const [search,setSearch]=useState("");
  const [showForm,setShowForm]=useState(false);
  const [editEx,setEditEx]=useState(null);
  const [detailEx,setDetailEx]=useState(null);
  const [showFilters, setShowFilters] = useState(false);

  const filtered=library.filter(ex=>{
    const matchSearch=!search||ex.name.toLowerCase().includes(search.toLowerCase());
    const matchMuscle=!filterMuscle.length||filterMuscle.some(m=>ex.muscles?.includes(m));
    const matchType=!filterType.length||filterType.some(t=>ex.types?.includes(t));
    return matchSearch&&matchMuscle&&matchType;
  });

  const [equipModalEx, setEquipModalEx] = useState(null);
  const [descModalEx, setDescModalEx] = useState(null);

  const delEx=id=>{setLibrary(l=>l.filter(e=>e.id!==id));notify("Übung gelöscht");};
  const saveEx=ex=>{
    if(editEx){setLibrary(l=>l.map(e=>e.id===editEx.id?{...editEx,...ex}:e));notify("Übung aktualisiert ✏️");}
    else{setLibrary(l=>[...l,{...ex,id:Date.now()}]);notify("Übung gespeichert! 💪");}
    setShowForm(false);setEditEx(null);
  };

  const toggleArr=(arr,setArr,val)=>setArr(a=>a.includes(val)?a.filter(x=>x!==val):[...a,val]);

  return(
    <div style={s.page}>
      <div style={s.pageHead}>
        <div><h1 style={s.pageTitle}>Bibliothek</h1><p style={s.pageSub}>{library.length} Übungen gespeichert</p></div>
        <button style={s.primaryBtn} onClick={()=>{setEditEx(null);setShowForm(true);}}>{IC.plus} Übung erstellen</button>
      </div>

      {/* Search + Filter */}
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:20,marginBottom:22,backdropFilter:"blur(15px)",WebkitBackdropFilter:"blur(15px)"}}>
        <div style={{display:"flex",gap:10,marginBottom:18}}>
          <div style={{position:"relative",flex:1}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#666",display:"flex"}}>{IC.search}</span>
            <input style={{...s.inp,paddingLeft:36}} placeholder="Übung suchen..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <button 
            style={{...s.iconCircle, width:40, height:40, borderRadius:11, ...(showFilters?s.iconOn:{})}} 
            onClick={()=>setShowFilters(!showFilters)}
            title="Filter ein/ausblenden"
          >
            {IC.filter}
          </button>
          {(filterMuscle.length||filterType.length)>0&&<button style={{...s.secBtn,padding:"10px 14px",fontSize:11, borderRadius:9}} onClick={()=>{setFilterMuscle([]);setFilterType([]);}}>✕ Reset</button>}
        </div>

        {showFilters && (
          <div className="dropIn" style={{background:"rgba(255,255,255,0.02)", padding:16, borderRadius:14, border:"1px solid rgba(255,255,255,0.06)", marginBottom:5}}>
            <div style={{marginBottom:18}}>
              <div style={{fontSize:11,fontWeight:700,color:"#666",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>Muskelgruppe</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {MUSCLE_GROUPS.map(m=>(
                  <button key={m} onClick={()=>toggleArr(filterMuscle,setFilterMuscle,m)} style={{background:filterMuscle.includes(m)?MUSCLE_COLORS[m]+"30":"rgba(255,255,255,0.04)",border:`1px solid ${filterMuscle.includes(m)?MUSCLE_COLORS[m]:"rgba(255,255,255,0.08)"}`,borderRadius:20,padding:"6px 14px",color:filterMuscle.includes(m)?MUSCLE_COLORS[m]:"#888",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s"}}>{m}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:"#666",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>Trainingsart</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {TRAINING_TYPES.map(t=>(
                  <button key={t} onClick={()=>toggleArr(filterType,setFilterType,t)} style={{background:filterType.includes(t)?TYPE_COLORS[t]+"30":"rgba(255,255,255,0.04)",border:`1px solid ${filterType.includes(t)?TYPE_COLORS[t]:"rgba(255,255,255,0.08)"}`,borderRadius:20,padding:"6px 14px",color:filterType.includes(t)?TYPE_COLORS[t]:"#888",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s"}}>{t}</button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Exercises Grid */}
      {!filtered.length ? (
        <div style={{textAlign:"center",padding:"80px 20px",color:"#555",border:"2px dashed #1E1E24",borderRadius:18}}>
          <div style={{fontSize:48,marginBottom:16}}>🏋️</div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:8,color:"#888"}}>{library.length?'Keine Übungen gefunden':'Noch keine Übungen'}</div>
          <div style={{fontSize:13}}>{library.length?'Filter anpassen':'Erstelle deine erste Übung über den Button oben!'}</div>
        </div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
          {filtered.map(ex => (
            <LibraryCard key={ex.id} ex={ex} setDetailEx={setDetailEx} setEditEx={setEditEx} setShowForm={setShowForm} delEx={delEx} setEquipModalEx={setEquipModalEx} setDescModalEx={setDescModalEx} />
          ))}
        </div>
      )}

      {/* Equipment Picker Modal */}
      {equipModalEx && (
        <EquipmentPickerModal 
          exercise={equipModalEx} 
          onSave={(items) => {
            setLibrary(l => l.map(e => e.id === equipModalEx.id ? { ...e, equipment: items } : e));
            setEquipModalEx(null);
            notify("Geräte aktualisiert! ⚙️");
          }} 
          onClose={() => setEquipModalEx(null)} 
        />
      )}

      {/* Exercise Form Modal */}
      {showForm && <ExerciseFormModal exercise={editEx} onSave={saveEx} onClose={()=>{setShowForm(false);setEditEx(null);}}/>}

      {/* Detail Modal */}
      {detailEx && <ExerciseDetailModal exercise={detailEx} onClose={()=>setDetailEx(null)} onEdit={()=>{setEditEx(detailEx);setDetailEx(null);setShowForm(true);}} onDelete={()=>{delEx(detailEx.id);setDetailEx(null);}}/>}

      {/* Description Edit Modal */}
      {descModalEx && (
        <DescriptionEditModal 
          exercise={descModalEx} 
          onSave={(desc) => {
            setLibrary(l => l.map(e => e.id === descModalEx.id ? { ...e, description: desc } : e));
            setDescModalEx(null);
            notify("Beschreibung aktualisiert! 📝");
          }} 
          onClose={() => setDescModalEx(null)} 
        />
      )}
    </div>
  );
}

// Helper component to keep the code clean
function LibraryCard({ex, setDetailEx, setEditEx, setShowForm, delEx, setEquipModalEx, setDescModalEx}) {
  return (
    <div style={{background:"linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:16,overflow:"hidden",transition:"transform 0.2s,box-shadow 0.2s",cursor:"pointer", display:"flex", flexDirection:"column", height:"100%", backdropFilter:"blur(24px) saturate(180%)", WebkitBackdropFilter:"blur(24px) saturate(180%)", boxShadow: "inset 0 1px 2px rgba(255,255,255,0.2), 0 8px 32px rgba(0,0,0,0.4)"}} className="planCard" onClick={()=>setDetailEx(ex)}>
      <div style={{height:120,background:"rgba(255,255,255,0.02)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden", flexShrink:0}}>
        {ex.thumbnail?(
          <MediaDisplay src={ex.thumbnail} style={{width:"100%",height:"100%",objectFit:"contain"}}/>
        ):(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,color:"#2A2A30"}}>
            <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1"><path d="M6.5 6.5h11M6.5 17.5h11"/><rect x="2" y="5" width="3" height="14" rx="1.5"/><rect x="19" y="5" width="3" height="14" rx="1.5"/><path d="M5 12h14"/></svg>
          </div>
        )}
        <div style={{position:"absolute",top:8,right:8,background:"#FF6B35",borderRadius:"50%",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",cursor:"pointer",boxShadow:"0 4px 12px rgba(255,107,53,0.3)"}} onClick={e=>{e.stopPropagation();setDescModalEx(ex);}}>
          <span style={{fontSize:13,fontWeight:900,fontFamily:"'DM Sans',sans-serif"}}>i</span>
        </div>
      </div>
      <div style={{padding:"14px 16px", flex: 1, display: "flex", flexDirection: "column"}}>
        <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:800,fontSize:15,marginBottom:12}}>{ex.name}</div>
        
        {/* Row 1: Muskelgruppen Label */}
        <div style={{fontSize:9,fontWeight:700,color:"#666",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5}}>Muskelgruppen</div>
        {/* Row 2: Muskelgruppen Tags */}
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
          {(ex.muscles||[]).length > 0 
            ? ex.muscles.map(m=><span key={m} style={{fontSize:9,background:MUSCLE_COLORS[m]+"15",color:MUSCLE_COLORS[m],borderRadius:7,padding:"2px 8px",fontWeight:800}}>{m}</span>)
            : <span style={{fontSize:9,color:"#444",fontStyle:"italic"}}>Keine angegeben</span>
          }
        </div>

        {/* Row 3: Trainingsart Label */}
        <div style={{fontSize:9,fontWeight:700,color:"#666",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5}}>Trainingsart</div>
        {/* Row 4: Trainingsart Tags */}
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:14}}>
          {(ex.types||[]).length > 0
            ? ex.types.map(t=><span key={t} style={{fontSize:9,background:TYPE_COLORS[t]+"15",color:TYPE_COLORS[t],borderRadius:7,padding:"2px 8px",fontWeight:800}}>{t}</span>)
            : <span style={{fontSize:9,color:"#444",fontStyle:"italic"}}>Keine angegeben</span>
          }
        </div>

        <div style={{display:"flex",justifyContent:"flex-end",gap:10,borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:12, marginTop: "auto"}}>
          <button 
            style={{
              width: 32, height: 32,
              display: "flex", alignItems: "center", justifyContent: "center",
              color: ex.equipment?.length ? "#FFB703" : "#666",
              filter: ex.equipment?.length ? "drop-shadow(0 0 6px rgba(255,183,3,0.4))" : "none",
              background: ex.equipment?.length ? "rgba(255,183,3,0.12)" : "rgba(255,255,255,0.03)",
              border: ex.equipment?.length ? "1px solid rgba(255,183,3,0.3)" : "1px solid rgba(255,255,255,0.05)",
              borderRadius: 8,
              cursor: "pointer",
              transition: "all 0.2s"
            }} 
            className="iconBtn" 
            onClick={e=>{e.stopPropagation();setEquipModalEx(ex);}}
          >
            {IC.dumbbell}
          </button>
          <button 
            style={{
              width: 32, height: 32,
              display: "flex", alignItems: "center", justifyContent: "center",
              color: ex.hiitTimer?.enabled ? "#FF6B35" : "#666",
              filter: ex.hiitTimer?.enabled ? "drop-shadow(0 0 6px rgba(255,107,53,0.5))" : "none",
              background: ex.hiitTimer?.enabled ? "rgba(255,107,53,0.12)" : "rgba(255,255,255,0.03)",
              border: ex.hiitTimer?.enabled ? "1px solid rgba(255,107,53,0.3)" : "1px solid rgba(255,255,255,0.05)",
              borderRadius: 8,
              cursor: "pointer",
              transition: "all 0.2s"
            }} 
            className="iconBtn" 
            onClick={e=>{e.stopPropagation();setEditEx(ex);setShowForm(true);}}
            title="HIIT Timer konfigurieren"
          >
            {IC.timer}
          </button>
          <button 
            style={{
              width: 32, height: 32,
              display: "flex", alignItems: "center", justifyContent: "center",
              color: "#666",
              background: "rgba(255,255,255,0.03)",
              border: "1px solid rgba(255,255,255,0.05)",
              borderRadius: 8,
              cursor: "pointer",
              transition: "all 0.2s"
            }} 
            className="iconBtn" 
            onClick={e=>{e.stopPropagation();setEditEx(ex);setShowForm(true);}}
          >
            {IC.edit}
          </button>
          <button 
            style={{
              width: 32, height: 32,
              display: "flex", alignItems: "center", justifyContent: "center",
              color: "#EF476F88",
              background: "rgba(239,71,111,0.05)",
              border: "1px solid rgba(239,71,111,0.1)",
              borderRadius: 8,
              cursor: "pointer",
              transition: "all 0.2s"
            }} 
            className="iconBtn" 
            onClick={e=>{e.stopPropagation();delEx(ex.id);}}
          >
            {IC.trash}
          </button>
        </div>
      </div>
    </div>
  );
}


function ExerciseFormModal({exercise,onSave,onClose}){
  const [name,setName]=useState(exercise?.name||"");
  const [desc,setDesc]=useState(exercise?.description||"");
  const [sets,setSets]=useState(exercise?.sets||"");
  const [reps,setReps]=useState(exercise?.reps||"");
  const [weight,setWeight]=useState(exercise?.weight||"");
  const [kcal,setKcal]=useState(exercise?.kcal||"");
  const [km,setKm]=useState(exercise?.km||"");
  const [incline,setIncline]=useState(exercise?.incline||"");
  const [tempo,setTempo]=useState(exercise?.tempo||"");
  const [trackSets,setTrackSets]=useState(exercise?.trackSets??true);
  const [trackReps,setTrackReps]=useState(exercise?.trackReps??true);
  const [trackWeight,setTrackWeight]=useState(exercise?.trackWeight??true);
  const [trackKcal,setTrackKcal]=useState(exercise?.trackKcal??false);
  const [trackKm,setTrackKm]=useState(exercise?.trackKm??false);
  const [trackIncline,setTrackIncline]=useState(exercise?.trackIncline??false);
  const [trackTempo,setTrackTempo]=useState(exercise?.trackTempo??false);

  const [muscles,setMuscles]=useState(exercise?.muscles||[]);
  const [types,setTypes]=useState(exercise?.types||[]);
  const [equipment,setEquipment]=useState(exercise?.equipment||[]);
  const [trackGPS,setTrackGPS]=useState(exercise?.trackGPS||false);

  const [hiitEnabled, setHiitEnabled] = useState(exercise?.hiitTimer?.enabled || false);
  const [hiitDuration, setHiitDuration] = useState(exercise?.hiitTimer?.duration || 30);
  const [thumbnail,setThumbnail]=useState(exercise?.thumbnail||null);
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef();

  const toggleArr=(arr,setArr,val)=>setArr(a=>a.includes(val)?a.filter(x=>x!==val):[...a,val]);

  const handleImg=async(file)=>{
    if(!file)return;
    setUploading(true);
    try{
      // Try Firebase Storage first
      const url=await uploadToStorage(file,`exercises/${Date.now()}_${file.name}`);
      setThumbnail(url);
      setUploading(false);
    }catch{
      // Fallback: base64
      if (file.type.includes("video")) {
        readFile(file).then(d=>{ setThumbnail(d); setUploading(false); });
      } else {
        const reader=new FileReader();
        reader.onload=async(e)=>{
          const img=new Image();
          img.onload=()=>{
            const canvas=document.createElement("canvas");
            const MAX=300;
            let w=img.width,h=img.height;
            if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
            canvas.width=w;canvas.height=h;
            canvas.getContext("2d").drawImage(img,0,0,w,h);
            setThumbnail(canvas.toDataURL("image/jpeg",0.75));
            setUploading(false);
          };
          img.src=e.target.result;
        };
        reader.readAsDataURL(file);
      }
    }
  };

  const save=()=>{
    if(!name.trim())return;
    onSave({name:name.trim(),description:desc,sets,reps,weight,kcal,km,incline,tempo,trackSets,trackReps,trackWeight,trackKcal,trackKm,trackIncline,trackTempo,trackGPS,muscles,types,equipment,thumbnail, hiitTimer: { enabled: hiitEnabled, duration: parseInt(hiitDuration) || 30 }});

  };


  return ReactDOM.createPortal(
    <div style={s.overlay2} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...s.modal,maxWidth:520,maxHeight:"88vh",overflowY:"auto",background:"rgba(16,16,22,0.97)",backdropFilter:"blur(32px) saturate(180%)",WebkitBackdropFilter:"blur(32px) saturate(180%)",border:"1px solid rgba(255,255,255,0.2)",boxShadow:"inset 0 1px 1px rgba(255,255,255,0.1), 0 32px 80px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.05)"}}>
        <h2 style={s.modalTitle}>{exercise?"Übung bearbeiten":"Neue Übung"}</h2>

        <div style={s.fg}><label style={s.lbl}>Name *</label><input style={s.inp} value={name} onChange={e=>setName(e.target.value)} placeholder="z. B. Bankdrücken"/></div>
        
        {/* New Field Grid */}
        {/* Tracking Configuration */}
        <div style={{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10,paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.07)"}}>Angezeigte Felder (Tracken)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:9,marginBottom:14}}>
          {[
            ["Sets",trackSets,setTrackSets,"#00D9C0"],
            ["Reps",trackReps,setTrackReps,"#FF6B35"],
            ["Weight",trackWeight,setTrackWeight,"#A78BFA"],
            ["kcal",trackKcal,setTrackKcal,"#FF6B6B"],
            ["km",trackKm,setTrackKm,"#4CC9F0"],
            ["Incline",trackIncline,setTrackIncline,"#FFD166"],
            ["km/h",trackTempo,setTrackTempo,"#EF476F"],
            ["GPS Track",trackGPS,setTrackGPS,"#06D6A0"]
          ].map(([label,val,set,color])=>(


            <div key={label} onClick={()=>set(!val)} style={{background:val?color+"15":"rgba(255,255,255,0.04)",border:`1px solid ${val?color:"rgba(255,255,255,0.08)"}`,borderRadius:9,padding:"8px 4px",textAlign:"center",cursor:"pointer",transition:"all 0.2s"}}>
              <div style={{fontSize:9,fontWeight:700,color:val?color:"#666",marginBottom:4}}>{label}</div>
              <div style={{width:16,height:16,borderRadius:4,border:`1px solid ${val?color:"#333"}`,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",background:val?color:"transparent"}}>
                {val&&<svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="#fff" strokeWidth="4"><path d="M5 13l4 4L19 7"/></svg>}
              </div>
            </div>
          ))}
        </div>

        {/* Value Inputs (only visible if tracked or always for defaults) */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(60px, 1fr))",gap:9,marginBottom:14}}>
          <div style={{...s.fg,opacity:trackSets?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#00D9C0"}}>Sätze</label><input style={{...s.inp,padding:"8px"}} type="number" value={sets} onChange={e=>setSets(e.target.value)} placeholder="0" disabled={!trackSets}/></div>
          <div style={{...s.fg,opacity:trackReps?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#FF6B35"}}>Wdh</label><input style={{...s.inp,padding:"8px"}} type="number" value={reps} onChange={e=>setReps(e.target.value)} placeholder="0" disabled={!trackReps}/></div>
          <div style={{...s.fg,opacity:trackWeight?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#A78BFA"}}>kg</label><input style={{...s.inp,padding:"8px"}} type="number" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="0" disabled={!trackWeight}/></div>
          <div style={{...s.fg,opacity:trackKcal?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#FF6B6B"}}>kcal</label><input style={{...s.inp,padding:"8px"}} type="number" value={kcal} onChange={e=>setKcal(e.target.value)} placeholder="0" disabled={!trackKcal}/></div>
          <div style={{...s.fg,opacity:trackKm?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#4CC9F0"}}>km</label><input style={{...s.inp,padding:"8px"}} type="number" value={km} onChange={e=>setKm(e.target.value)} placeholder="0" disabled={!trackKm}/></div>
          <div style={{...s.fg,opacity:trackIncline?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#FFD166"}}>Steig.</label><input style={{...s.inp,padding:"8px"}} type="text" value={incline} onChange={e=>setIncline(e.target.value)} placeholder="%" disabled={!trackIncline}/></div>
          <div style={{...s.fg,opacity:trackTempo?1:0.3}}><label style={{...s.lbl,fontSize:10,color:"#EF476F"}}>km/h</label><input style={{...s.inp,padding:"8px"}} type="text" value={tempo} onChange={e=>setTempo(e.target.value)} placeholder="km/h" disabled={!trackTempo}/></div>

        </div>

        {/* HIIT Timer Config */}
        <div style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"12px 16px", marginBottom:18}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: hiitEnabled ? 12 : 0}}>
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <div style={{color: hiitEnabled ? "#FF6B35" : "#444", filter: hiitEnabled ? "drop-shadow(0 0 5px rgba(255,107,53,0.4))" : "none"}}>{IC.timer}</div>
              <div>
                <div style={{fontWeight:700, fontSize:13, color: hiitEnabled ? "#F0EDE8" : "#888"}}>HIIT Timer</div>
                <div style={{fontSize:10, color:"#555"}}>Automatischer Countdown für Sätze</div>
              </div>
            </div>
            <div style={{...s.toggle, ...(hiitEnabled?s.toggleOn:{})}} onClick={()=>setHiitEnabled(!hiitEnabled)}>
              <div style={{...s.thumb, ...(hiitEnabled?s.thumbOn:{})}}/>
            </div>
          </div>
          {hiitEnabled && (
            <div style={{display:"flex", alignItems:"center", gap:12, paddingTop:10, borderTop:"1px solid rgba(255,255,255,0.05)"}} className="fadeIn">

// ─── WOCHENPLAN ───────────────────────────────────────────────────────────────
const WP_DAY_NAMES=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const WP_DAY_SHORT=["Mo","Di","Mi","Do","Fr","Sa","So"];
const MEAL_PRESETS=["Frühstück","Mittagessen","Abendessen","Snack","Pre-Workout","Post-Workout"];
const ENTRY_TYPES={
  training:{color:"#3B82F6",bg:"#1e3a5f",label:"Training",icon:"🏋️"},
  meal:    {color:"#22C55E",bg:"#14532d",label:"Mahlzeit", icon:"🥗"},
  rest:    {color:"#6B7280",bg:"#1f2937",label:"Ruhetag",  icon:"💤"},
  other:   {color:"#F59E0B",bg:"#451a03",label:"Sonstiges",icon:"📌"},
};

function getMonday(d){const date=new Date(d);const day=date.getDay();const diff=date.getDate()-day+(day===0?-6:1);date.setDate(diff);date.setHours(0,0,0,0);return date;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtShort(d){return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"});}
function uid(){return Math.random().toString(36).slice(2,9);}

function WochenplanPage({weekPlans,setWeekPlans,data,user,library,notify}){
  const [currentMonday,setCurrentMonday]=useState(()=>getMonday(new Date()));
  const [showEntryForm,setShowEntryForm]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [entryDay,setEntryDay]=useState(0);
  const [showTemplates,setShowTemplates]=useState(false);
  const [saveName,setSaveName]=useState("");
  const [showSaveModal,setShowSaveModal]=useState(false);
  const [templates,setTemplates]=useState(()=>{try{return JSON.parse(localStorage.getItem("ff_wptemplates")||"[]");}catch{return [];}});
  
  const [viewMode, setViewMode] = useState(() => window.innerWidth <= 768 ? 1 : 7);
  const [dayOffset, setDayOffset]=useState(0);

  const switchToMode = (m) => {
    setViewMode(m);
    if (m === 7) { setDayOffset(0); return; }
    
    const now = new Date();
    const monday = getMonday(now);
    const isThisWeek = weekKey === monday.toISOString().split("T")[0];
    
    if (!isThisWeek) { setDayOffset(0); return; }
    
    const todayIdx = (now.getDay() + 6) % 7; 
    if (m === 1) {
      setDayOffset(todayIdx);
    } else if (m === 3) {
      setDayOffset(Math.min(todayIdx, 4));
    }
  };

  useEffect(()=>localStorage.setItem("ff_wptemplates",JSON.stringify(templates)),[templates]);

  const [magicModal, setMagicModal] = useState(false);
  window.showMagicModal = () => setMagicModal(true);

  const weekKey=currentMonday.toISOString().split("T")[0];
  const weekData=weekPlans[weekKey]||{entries:{}};// entries: {dayIndex: [entry,...]}

  const setWeekData=updater=>{
    setWeekPlans(wp=>{
      const cur=wp[weekKey]||{entries:{}};
      const next=typeof updater==="function"?updater(cur):{...cur,...updater};
      return{...wp,[weekKey]:next};
    });
  };

  const getDayEntries=dayIdx=>(weekData.entries[dayIdx]||[]).slice().sort((a,b)=>a.startTime.localeCompare(b.startTime));

  const addEntry=(dayIdx,entry)=>{
    setWeekData(w=>({...w,entries:{...w.entries,[dayIdx]:[...(w.entries[dayIdx]||[]),{...entry,id:uid()}]}}));
    notify("Eintrag hinzugefügt! ✅");
  };

  const updateEntry=(dayIdx,entryId,updated)=>{
    setWeekData(w=>({...w,entries:{...w.entries,[dayIdx]:(w.entries[dayIdx]||[]).map(e=>e.id===entryId?{...e,...updated}:e)}}));
    notify("Eintrag aktualisiert ✏️");
  };

  const deleteEntry=(dayIdx,entryId)=>{
    setWeekData(w=>({...w,entries:{...w.entries,[dayIdx]:(w.entries[dayIdx]||[]).filter(e=>e.id!==entryId)}}));
    notify("Eintrag gelöscht");
  };

  const prevWeek=()=>setCurrentMonday(d=>addDays(d,-7));
  const nextWeek=()=>setCurrentMonday(d=>addDays(d,7));
  const goToday = () => {
    const now = new Date();
    setCurrentMonday(getMonday(now));
    const todayIdx = (now.getDay() + 6) % 7;
    if (viewMode === 1) setDayOffset(todayIdx);
    else if (viewMode === 3) setDayOffset(Math.min(todayIdx, 4));
    else setDayOffset(0);
  };

  const isCurrentWeek=getMonday(new Date()).toISOString().split("T")[0]===weekKey;

  const saveTemplate=()=>{
    if(!saveName.trim())return;
    const tmpl={id:uid(),name:saveName.trim(),entries:weekData.entries,savedAt:Date.now(),favorite:false};
    setTemplates(t=>[...t,tmpl]);
    setShowSaveModal(false);setSaveName("");
    notify(`Woche als Vorlage „${saveName}" gespeichert! 💾`);
  };

  const loadTemplate=(tmpl)=>{
    setWeekData(w=>({...w,entries:{...tmpl.entries}}));
    setShowTemplates(false);
    notify(`Vorlage „${tmpl.name}" geladen! 📅`);
  };

  const loadTemplateNextWeek=(tmpl)=>{
    const nextWeekKey=addDays(getMonday(new Date()),7).toISOString().split("T")[0];
    setWeekPlans(wp=>({...wp,[nextWeekKey]:{...(wp[nextWeekKey]||{entries:{}}),entries:{...tmpl.entries}}}));
    setShowTemplates(false);
    notify(`Vorlage „${tmpl.name}" für nächste Woche übernommen! 📅`);
  };

  const toggleTemplateFavorite=id=>{setTemplates(t=>t.map(x=>x.id===id?{...x,favorite:!x.favorite}:x));};

  const deleteTemplate=id=>{setTemplates(t=>t.filter(x=>x.id!==id));};

  const today=new Date();
  
  const exportToICal = () => {
    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//FitForge//NONSGML v1.0//EN',
      'CALSCALE:GREGORIAN',
      'METHOD:PUBLISH'
    ];

    Object.entries(weekData.entries).forEach(([dayIdx, entries]) => {
      const dayDate = addDays(currentMonday, parseInt(dayIdx));
      const year = dayDate.getFullYear();
      const month = String(dayDate.getMonth() + 1).padStart(2, '0');
      const day = String(dayDate.getDate()).padStart(2, '0');
      const dateTag = `${year}${month}${day}`;

      entries.forEach(e => {
        const start = (e.startTime || "08:00").replace(':', '');
        let endH = parseInt((e.startTime || "08:00").split(':')[0]) + 1;
        let endM = (e.startTime || "08:00").split(':')[1] || "00";
        const end = String(endH).padStart(2, '0') + endM;
        
        ics.push('BEGIN:VEVENT');
        ics.push(`DTSTART:${dateTag}T${start}00`);
        ics.push(`DTEND:${dateTag}T${end}00`);
        
        let summary = "FitForge: " + (e.type === 'training' ? 'Workout' : (e.title || e.mealName || e.type));
        if (e.type === 'training') {
          const plan = data.plans.find(p => String(p.id) === String(e.planId));
          if (plan) {
            summary = `💪 Training: ${plan.name}`;
            ics.push(`URL:${window.location.origin}${window.location.pathname}?openPlan=${plan.id}`);
          }
        } else if (e.type === 'meal') {
          summary = `🥗 Mahlzeit: ${e.mealPreset}${e.mealName ? ' (' + e.mealName + ')' : ''}`;
        }

        ics.push(`SUMMARY:${summary}`);
        ics.push(`DESCRIPTION:${e.notes || ''}`);
        ics.push('END:VEVENT');
      });
    });

    ics.push('END:VCALENDAR');
    const blob = new Blob([ics.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.setAttribute('download', `FitForge_${weekKey}.ics`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    notify("Wochenplan als Kalender-Datei (.ics) exportiert! 📅");
  };

  return(
    <div style={{padding:"28px 24px 56px",maxWidth:1100,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div>
            <h1 style={s.pageTitle}>Wochenplan</h1>
            <div style={{display:"flex", alignItems:"center", gap:8, color:"#666", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:1}}>
              {fmtShort(currentMonday)} – {fmtShort(addDays(currentMonday,6))}
              {isCurrentWeek && <span style={{color:"#FF6B35"}}>●</span>}
            </div>
          </div>
          
          <div style={{display:"flex", background:"rgba(255, 255, 255, 0.04)", padding:4, borderRadius:12, border:"1px solid rgba(255, 255, 255, 0.08)", backdropFilter:"blur(10px)", WebkitBackdropFilter:"blur(10px)"}}>
            {[1,3,7].map(m => (
              <button 
                key={m} 
                onClick={()=>switchToMode(m)}
                style={{
                  border:"none", padding:"6px 12px", borderRadius:9, cursor:"pointer", fontSize:11, fontWeight:800,
                  background:viewMode===m?"#FF6B35":"transparent",
                  color:viewMode===m?"#000":"#888",
                  transition:"all 0.2s"
                }}
              >
                {m}T
              </button>
            ))}
          </div>
        </div>

        <div style={{display:"flex", alignItems:"center", gap:14}}>
          <div style={{display:"flex", gap:8}}>
            <button onClick={prevWeek} style={{...s.secBtn, padding:8, borderRadius:10}} title="Vorherige Woche">{IC.chevLeft}</button>
            {!isCurrentWeek && (
              <button 
                onClick={goToday} 
                style={{...s.secBtn, padding:"6px 14px", fontSize:13, display:"flex", alignItems:"center", gap:8, justifyContent:"center"}}
              >
                <span style={{display:"flex", alignItems:"center"}}>{IC.calendar}</span>
                <span>Heute</span>
              </button>
            )}
            <button onClick={nextWeek} style={{...s.secBtn, padding:8, borderRadius:10}} title="Nächste Woche">{IC.chevRight}</button>
          </div>
          <div style={{width:1, height:24, background:"rgba(255, 255, 255, 0.08)"}} />
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button style={{...s.secBtn,padding:"9px 13px",fontSize:13,display:"flex",alignItems:"center",gap:6,background:"rgba(6,214,160,0.1)",borderColor:"rgba(6,214,160,0.3)",color:"#06D6A0"}} onClick={exportToICal}>📅 iCal</button>
            <button style={{...s.secBtn,padding:"9px 13px",fontSize:13,display:"flex",alignItems:"center",gap:6}} onClick={()=>setShowTemplates(true)}>📋 Vorlagen</button>
            <button style={{...s.primaryBtn,padding:"9px 13px",fontSize:13,display:"flex",alignItems:"center",gap:6}} onClick={()=>setShowSaveModal(true)}>{IC.plus} Speichern</button>
          </div>
        </div>
      </div>

      {/* Day Slider Navigation for 1T or 3T */}
      {viewMode < 7 && (
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18, background:"rgba(255, 255, 255, 0.04)", padding:"8px 16px", borderRadius:16, border:"1px solid rgba(255, 255, 255, 0.08)", backdropFilter:"blur(10px)", WebkitBackdropFilter:"blur(10px)"}}>
          <button 
            disabled={dayOffset <= 0}
            onClick={()=>setDayOffset(Math.max(0, dayOffset-1))}
            style={{background:"transparent", border:"none", color:dayOffset<=0?"#333":"#FF6B35", cursor:dayOffset<=0?"default":"pointer", display:"flex", padding:10}}
          >
            {IC.chevLeft}
          </button>
          
          <div style={{textAlign:"center"}}>
            <span style={{fontSize:13, fontWeight:900, color:"#F0EDE8", fontFamily:"'DM Sans',sans-serif"}}>
              {viewMode === 1 ? WP_DAY_NAMES[dayOffset] : `${WP_DAY_NAMES[dayOffset]} – ${WP_DAY_NAMES[Math.min(6, dayOffset + 2)]}`}
            </span>
            <div style={{fontSize:10, color:"#666", fontWeight:700, marginTop:2}}>
               Innerhalb der Woche wechseln
            </div>
          </div>

          <button

                    <div key={entry.id} style={{background:meta.bg,border:`1px solid ${meta.color}40`,borderRadius:9,padding:"7px 9px",cursor:"pointer",transition:"all 0.15s", textDecoration: isPast ? "line-through" : "none"}}
                      onClick={()=>{setEntryDay(dayIdx);setEditEntry(entry);setShowEntryForm(true);}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:4}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                            <span style={{fontSize:12}}>{meta.icon}</span>
                            <span style={{fontSize:10,fontWeight:700,color:meta.color,textTransform:"uppercase",letterSpacing:"0.3px"}}>{meta.label}</span>
                          </div>
                          <div style={{fontSize:12,fontWeight:700,color:"#F0EDE8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
