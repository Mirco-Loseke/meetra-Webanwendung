function RouteMap({ path }) {
  const mRef = useRef(null);
  useEffect(() => {
    if (mRef.current && path && path.length > 0) {
      if (!window.L) return;
      const map = window.L.map(mRef.current, { zoomControl: false, dragging: false, scrollWheelZoom: false }).setView(path[0], 14);
      window.L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
      
      const group = window.L.featureGroup().addTo(map);
      if (path.length >= 2) {
        for (let i = 1; i < path.length; i++) {
          const p1 = path[i-1];
          const p2 = path[i];
          const speed = p2.speed || 0;
          let color = '#06D6A0';
          if (speed < 4) color = '#EF476F';
          else if (speed < 8) color = '#FFD166';
          else if (speed < 15) color = '#06D6A0';
          else color = '#A78BFA';
          window.L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], {color, weight: 4, opacity: 0.9}).addTo(group);
        }
      } else if (path.length === 1) {
        window.L.circleMarker([path[0].lat, path[0].lng], {radius: 6, color: '#06D6A0', fillColor: '#06D6A0', fillOpacity: 0.8}).addTo(group);
      }
      
      const bounds = group.getBounds();
      if (bounds.isValid()) map.fitBounds(bounds, { padding: [10,10] });
      return () => map.remove();
    }
  }, [path]);
  return <div ref={mRef} style={{width: "100%", height: 160, borderRadius: 12, marginTop: 12, background: "#111", border: "1px solid #1A1A1F"}}></div>;
}

function GpsAnalytics({ path, targetPace }) {
  if (!path || path.length < 2 || !path[0].t) return null;

  // 1. Calculate stats (splits, maxSpeed, standingMs, elevationGain, elevationLoss)
  let splits = [];
  let currentSplitDist = 0;
  let currentSplitIndex = 1;
  let currentSplitStartTime = path[0].t;
  let maxSpeed = 0;
  let standingMs = 0;
  let elevationGain = 0;
  let elevationLoss = 0;

  for (let i = 1; i < path.length; i++) {
    const p1 = path[i-1];
    const p2 = path[i];
    const d = calcDist(p1.lat, p1.lng, p2.lat, p2.lng);
    const dtMs = p2.t - p1.t;
    if (dtMs <= 0) continue;
    
    currentSplitDist += d;
    if (p2.speed < 2) standingMs += dtMs;
    if (p2.speed > maxSpeed) maxSpeed = p2.speed;

    // Elevation accumulation (with jitter filter)
    if (p1.alt !== undefined && p2.alt !== undefined) {
      const diff = p2.alt - p1.alt;
      if (Math.abs(diff) > 1.2) {
        if (diff > 0) elevationGain += diff;
        else elevationLoss += Math.abs(diff);
      }
    }

    if (currentSplitDist >= 1.0) {
       const splitTimeMs = p2.t - currentSplitStartTime;
       const splitSpeedKmh = 1 / (splitTimeMs / 3600000);
       splits.push({ km: currentSplitIndex, timeMs: splitTimeMs, speed: splitSpeedKmh });
       
       currentSplitIndex++;
       currentSplitDist -= 1.0;
       currentSplitStartTime = p2.t;
    }
  }

  // Sample speed curve points
  const pointsToSample = 40;
  const step = Math.max(1, Math.floor(path.length / pointsToSample));
  const curvePoints = [];
  const elevPoints = [];
  for (let i = 0; i < path.length; i += step) {
    curvePoints.push(path[i].speed || 0);
    elevPoints.push(path[i].alt || 0);
  }
  const maxCurveSpeed = Math.max(...curvePoints, 1);
  
  const minElev = Math.min(...elevPoints);
  const maxElev = Math.max(...elevPoints);
  const elevDiff = maxElev - minElev || 1;

  // Generate SVG path for elevation profile
  const svgWidth = 300;
  const svgHeight = 45;
  const svgPoints = elevPoints.map((el, idx) => {
    const x = (idx / (elevPoints.length - 1)) * svgWidth;
    const y = svgHeight - 5 - ((el - minElev) / elevDiff) * (svgHeight - 10);
    return `${x},${y}`;
  });
  const pathData = svgPoints.length > 0 ? `M 0,${svgHeight} L ${svgPoints.join(' L ')} L ${svgWidth},${svgHeight} Z` : '';
  const strokeData = svgPoints.length > 0 ? `M ${svgPoints.join(' L ')}` : '';

  // 2. Pace Target comparison (Ghost Runner)
  const totalRunMs = path[path.length - 1].t - path[0].t;
  let totalRunDist = 0;
  for (let i = 1; i < path.length; i++) {
    totalRunDist += calcDist(path[i-1].lat, path[i-1].lng, path[i].lat, path[i].lng);
  }
  const avgKmh = totalRunDist > 0 ? (totalRunDist / (totalRunMs / 3600000)) : 0;
  const initialTargetPaceStr = (() => {
    if (targetPace) return targetPace;
    if (avgKmh <= 0.1) return "06:00";
    const minsPerKm = 60 / avgKmh;
    const m = Math.floor(minsPerKm);
    const s = Math.floor((minsPerKm - m) * 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  })();

  const [targetPaceStr, setTargetPaceStr] = React.useState(initialTargetPaceStr);

  const parsePaceToSecs = (str) => {
    if (!str || !str.includes(':')) return 360;
    const parts = str.split(':');
    const mins = parseInt(parts[0]) || 0;
    const secs = parseInt(parts[1]) || 0;
    return mins * 60 + secs;
  };

  return (
    <div style={{marginTop: 15, background: "#0D0D0F", padding: 15, borderRadius: 14, border: "1px solid #1A1A1F"}}>
      <h4 style={{margin: "0 0 10px", fontSize: 13, color: "#fff"}}>📊 KI-Laufanalyse</h4>
      
      {/* Speed Graph */}
      <div style={{fontSize: 9, color: "#666", fontWeight: 800, textTransform: "uppercase", marginBottom: 5}}>Geschwindigkeitsprofil (km/h)</div>
      <div style={{height: 60, display: "flex", alignItems: "flex-end", gap: 2, marginBottom: 15, background: "#111115", borderRadius: 8, padding: "5px 5px 0", border: "1px solid #1A1A1F"}}>
        {curvePoints.map((sp, i) => (
           <div key={i} style={{flex: 1, backgroundColor: "#06D6A0", opacity: 0.8, borderRadius: "2px 2px 0 0", height: `${Math.max(5, (sp / maxCurveSpeed) * 100)}%`}}></div>
        ))}
      </div>

      {/* Elevation Graph */}
      <div style={{fontSize: 9, color: "#666", fontWeight: 800, textTransform: "uppercase", marginBottom: 5}}>Höhenprofil ({Math.round(minElev)}m - {Math.round(maxElev)}m)</div>
      <div style={{position: "relative", width: "100%", height: 50, marginBottom: 20}}>
        <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} width="100%" height="100%" preserveAspectRatio="none" style={{display: "block", background: "#111115", borderRadius: 8, border: "1px solid #1A1A1F"}}>
          <defs>
            <linearGradient id="elevGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#4CC9F0" stopOpacity="0.4" />
              <stop offset="100%" stopColor="#4CC9F0" stopOpacity="0.0" />
            </linearGradient>
          </defs>
          {pathData && <path d={pathData} fill="url(#elevGrad)" />}
          {strokeData && <path d={strokeData} fill="none" stroke="#4CC9F0" strokeWidth="1.5" />}
        </svg>
      </div>

      {/* Stats Cards */}
      <div style={{display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap"}}>
        <div style={{flex: 1, minWidth: 90, background: "#1A1A1F", padding: 10, borderRadius: 10}}>
           <div style={{fontSize: 9, color: "#888", textTransform: "uppercase"}}>Max Tempo</div>
           <div style={{fontSize: 14, fontWeight: "bold", color: "#FFD166"}}>{maxSpeed.toFixed(1)} <span style={{fontSize: 10}}>km/h</span></div>
        </div>
        <div style={{flex: 1, minWidth: 90, background: "#1A1A1F", padding: 10, borderRadius: 10}}>
           <div style={{fontSize: 9, color: "#888", textTransform: "uppercase"}}>Standzeit</div>
           <div style={{fontSize: 14, fontWeight: "bold", color: "#EF476F"}}>{Math.round(standingMs/1000)}s</div>
        </div>
        <div style={{flex: 1, minWidth: 90, background: "#1A1A1F", padding: 10, borderRadius: 10}}>
           <div style={{fontSize: 9, color: "#888", textTransform: "uppercase"}}>Höhenmeter</div>
           <div style={{fontSize: 14, fontWeight: "bold", color: "#4CC9F0"}}>
             ▲ {Math.round(elevationGain)}m <span style={{color: "#888", fontSize: 10, fontWeight: "normal"}}>| ▼ {Math.round(elevationLoss)}m</span>
           </div>
        </div>
      </div>

      {/* Target Pace Control */}
      {splits.length > 0 && (
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8}}>
          <span style={{fontSize: 10, color: "#aaa", fontWeight: 800, textTransform: "uppercase"}}>Runden-Details</span>
          <div style={{display: "flex", alignItems: "center", gap: 4, background: "#1A1A1F", padding: "3px 8px", borderRadius: 8, border: "1px solid #2A2A30"}}>
            <span style={{fontSize: 9, color: "#888"}}>Ziel-Pace:</span>
            <input 
              type="text" 
              value={targetPaceStr} 
              onChange={e => setTargetPaceStr(e.target.value)} 
              placeholder="06:00"
              style={{width: 45, background: "transparent", border: "none", color: "#A78BFA", fontSize: 10, padding: 0, fontWeight: "bold", textAlign: "center", outline: "none"}}
            />
            <span style={{fontSize: 9, color: "#888"}}>/km</span>
          </div>
        </div>
      )}

      {/* Splits Table */}
      {splits.length > 0 && (
        <div style={{background: "#1A1A1F", borderRadius: 10, overflow: "hidden"}}>
          <div style={{display: "flex", padding: "8px 12px", background: "#222", fontSize: 9, color: "#888", fontWeight: "bold"}}>
             <div style={{width: 50}}>RUNDE</div>
             <div style={{flex: 1}}>PACE</div>
             <div style={{width: 60, textAlign: "center"}}>ZIEL-DIFF</div>
             <div style={{width: 60, textAlign: "right"}}>Ø KM/H</div>
          </div>
          {splits.map((sp, i) => {
             const actualSecs = sp.timeMs / 1000;
             const targetSecs = parsePaceToSecs(targetPaceStr);
             const diff = actualSecs - targetSecs;
             const diffFormatted = diff < 0 
               ? `-${Math.abs(Math.round(diff))}s` 
               : (diff > 0 ? `+${Math.round(diff)}s` : `0s`);
             const diffColor = diff < 0 ? "#06D6A0" : (diff > 0 ? "#EF476F" : "#888");

             return (
                <div key={i} style={{display: "flex", padding: "8px 12px", fontSize: 12, borderTop: "1px solid #2A2A30", color: "#ddd", alignItems: "center"}}>
                  <div style={{width: 50, fontWeight: "bold", color: "#06D6A0"}}>km {sp.km}</div>
                  <div style={{flex: 1}}>{formatPace(sp.speed)} <span style={{fontSize:10, color:"#666"}}>/km</span></div>
                  <div style={{width: 60, color: diffColor, fontWeight: "bold", fontSize: 11, textAlign: "center"}}>{diffFormatted}</div>
                  <div style={{width: 60, textAlign: "right"}}>{sp.speed.toFixed(1)}</div>
                </div>
             );
          })}
        </div>
      )}
    </div>
  );
}


function History({data,setData,selWO,setSelWO,notify,library,setWeeklyReport,isMobile}){

  const sorted=[...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const del=id=>{setData(d=>({...d,workouts:d.workouts.filter(w=>w.id!==id)}));setSelWO(null);notify("Training gelöscht");};
  const [compMode, setCompMode] = useState(false);
  const [compSel, setCompSel] = useState([]);
  const [showComp, setShowComp] = useState(false);
  
  const getWeekNumber = (d) => {
    const t = new Date(d.getTime());
    t.setHours(0, 0, 0, 0);
    t.setUTCDate(t.getUTCDate() + 4 - (t.getUTCDay() || 7));
    const s = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
    return Math.ceil((((t - s) / 864e5) + 1) / 7);
  };
  
  const getWeekRange = (d) => {
    const t = new Date(d.getTime());
    const day = t.getDay() || 7;
    const mon = new Date(t.getTime());
    mon.setDate(t.getDate() - day + 1);
    const sun = new Date(t.getTime());
    sun.setDate(t.getDate() - day + 7);
    return `${mon.toLocaleDateString("de-DE", {day:"2-digit", month:"2-digit"})} - ${sun.toLocaleDateString("de-DE", {day:"2-digit", month:"2-digit"})}`;
  };

  const grouped = sorted.reduce((acc, w) => {
    const d = new Date(w.date);
    const wn = getWeekNumber(d);
    const yr = d.getFullYear();
    const key = `${yr}-W${wn}`;
    if (!acc[key]) acc[key] = { wn, yr, dateRange: getWeekRange(d), workouts: [] };
    acc[key].workouts.push(w);
    return acc;
  }, {});

  if(selWO){
    const w=data.workouts.find(x=>x.id===selWO);
    if(!w){setSelWO(null);return null;}
    const plan=data.plans.find(p=>p.id===w.planId);
    const vol = (w.exercises||[]).reduce((a,e) => {
      if (e.isHiit) return a; 
      return a + (e.sets||[]).reduce((b,s) => b + (s.done !== false ? (parseFloat(s.weight)||0) * (parseInt(s.reps)||0) : 0), 0);
    }, 0);
    const wKcal = (w.exercises||[]).reduce((a,e) => a + (e.sets||[]).reduce((b,s) => b + (parseFloat(s.kcal)||0), 0), 0);
    const wKm = (w.exercises||[]).reduce((a,e) => a + (e.sets||[]).reduce((b,s) => b + (parseFloat(s.km)||0), 0), 0);

    return(
      <div style={selWO?{...s.page,paddingTop:20}:{...s.page}} className="fadeIn">
        <button style={{...s.backBtn, marginBottom:12}} onClick={()=>setSelWO(null)}>← Zurück</button>
        <div style={{...s.wDetail, borderTop: `6px solid ${plan?.color || "rgba(255,255,255,0.1)"}`, position: "relative", marginTop:0}}>
          {plan && <div style={{position:"absolute", top:0, left:20, background:plan.color, padding:"4px 12px", borderRadius:"0 0 10px 10px", fontSize:10, fontWeight:900, color:"#000", textTransform:"uppercase"}}>{plan.name}</div>}
          {w.photo&&<img src={w.photo} alt="w" style={{width:"100%",height:210,objectFit:"cover",borderRadius:13,marginBottom:18}}/>}
          <div style={{display:"flex",justifyContent:"flex-end",gap:8,alignItems:"flex-start",marginBottom:10, flexWrap: "wrap"}}>
            {vol > 0 && <div style={{fontSize:11,fontWeight:800,color:"#A78BFA",background:"#A78BFA15",padding:"4px 10px",borderRadius:8}}>{vol}kg Volumen</div>}
            {wKcal > 0 && <div style={{fontSize:11,fontWeight:800,color:"#FF6B6B",background:"#FF6B6B15",padding:"4px 10px",borderRadius:8}}>{wKcal} kcal</div>}
            {wKm > 0 && <div style={{fontSize:11,fontWeight:800,color:"#4CC9F0",background:"#4CC9F015",padding:"4px 10px",borderRadius:8}}>{wKm.toFixed(1)} km</div>}
          </div>


          <div style={{color:"#888",fontSize:13,display:"flex",gap:10,alignItems:"center",marginBottom:18}}>
            <span>📅 {new Date(w.date).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}</span>
          </div>
          
          <div style={{display:"flex",background:"rgba(255,255,255,0.03)",borderRadius:16,overflow:"hidden",marginBottom:26,border:"1px solid rgba(255,255,255,0.07)"}}>
            {[
              [`${w.duration} min`, "Dauer", "#FF6B35"],
              [(w.exercises||[]).length, "Übungen", "#00D9C0"],
              [w.hiitMode ? "HIIT" : "Klassik", "Modus", "#FFD166"],
              [`${w.startTime||"--:--"} - ${w.endTime||"--:--"}`, "Zeit", "#F0EDE8"]
            ].map(([v,l,c],i)=>(
              <div key={i} style={{flex:1,padding:isMobile?10:14,textAlign:"center",borderRight:i<3?"1px solid rgba(255,255,255,0.06)":"none"}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:isMobile?14:18,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:"#666",marginTop:4}}>{l}</div>
              </div>
            ))}
          </div>
          
          {w.note&&<div style={{color:"#aaa",fontStyle:"italic",fontSize:14,marginBottom:22,padding:16,background:"rgba(255,255,255,0.03)",borderRadius:14,border:"1px solid rgba(255,255,255,0.07)"}}>„{w.note}"</div>}
          
          {w.earnedPoints && (
            <div style={{background:"linear-gradient(135deg, rgba(255,209,102,0.1) 0%, rgba(255,159,28,0.1) 100%)", borderRadius:16, border:"1px solid rgba(255,209,102,0.2)", padding:20, marginBottom:26}}>
              <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:12}}>
                <div style={{fontSize:24}}>🪙</div>
                <div>
                  <div style={{fontSize:18, fontWeight:900, color:"#FFD166", fontFamily:"'DM Sans',sans-serif"}}>+ {w.earnedPoints} Forge Points</div>
                  <div style={{fontSize:12, color:"#aaa"}}>Verdient in diesem Workout</div>
                </div>
              </div>
              {w.ptsBreakdown && (
                <div style={{display:"grid", gridTemplateColumns:isMobile?"1fr":"repeat(2, 1fr)", gap:8, fontSize:13}}>
                  <div style={{display:"flex", justifyContent:"space-between", background:"rgba(0,0,0,0.2)", padding:"8px 12px", borderRadius:8}}>
                    <span style={{color:"#888"}}>Workout Basis</span>
                    <span style={{fontWeight:700, color:"#F0EDE8"}}>+ {w.ptsBreakdown.workout}</span>
                  </div>
                  <div style={{display:"flex", justifyContent:"space-between", background:"rgba(0,0,0,0.2)", padding:"8px 12px", borderRadius:8}}>
                    <span style={{color:"#888"}}>Übungen beendet</span>
                    <span style={{fontWeight:700, color:"#F0EDE8"}}>+ {w.ptsBreakdown.exercises}</span>
                  </div>
                  <div style={{display:"flex", justifyContent:"space-between", background:"rgba(0,0,0,0.2)", padding:"8px 12px", borderRadius:8}}>
                    <span style={{color:"#888"}}>Sätze absolviert</span>
                    <span style={{fontWeight:700, color:"#F0EDE8"}}>+ {w.ptsBreakdown.sets}</span>
                  </div>
                  {w.ptsBreakdown.volume > 0 && (
                    <div style={{display:"flex", justifyContent:"space-between", background:"rgba(0,0,0,0.2)", padding:"8px 12px", borderRadius:8}}>
                      <span style={{color:"#888"}}>Volumen (Gewicht)</span>
                      <span style={{fontWeight:700, color:"#F0EDE8"}}>+ {w.ptsBreakdown.volume}</span>
                    </div>
                  )}
                  {w.ptsBreakdown.distance > 0 && (
                    <div style={{display:"flex", justifyContent:"space-between", background:"rgba(0,0,0,0.2)", padding:"8px 12px", borderRadius:8}}>
                      <span style={{color:"#888"}}>Distanz</span>
                      <span style={{fontWeight:700, color:"#F0EDE8"}}>+ {w.ptsBreakdown.distance}</span>
                    </div>
                  )}
                  {w.ptsBreakdown.duration > 0 && (
                    <div style={{display:"flex", justifyContent:"space-between", background:"rgba(0,0,0,0.2)", padding:"8px 12px", borderRadius:8}}>
                      <span style={{color:"#888"}}>Aktive Zeit</span>
                      <span style={{fontWeight:700, color:"#F0EDE8"}}>+ {w.ptsBreakdown.duration}</span>
                    </div>
                  )}
                  {w.ptsBreakdown.prs > 0 && (
                    <div style={{display:"flex", justifyContent:"space-between", background:"rgba(255,107,53,0.1)", border:"1px solid rgba(255,107,53,0.2)", padding:"8px 12px", borderRadius:8}}>
                      <span style={{color:"#FF6B35", fontWeight:700}}>Neu aufgestellte Rekorde (PR)</span>
                      <span style={{fontWeight:900, color:"#FF6B35"}}>+ {w.ptsBreakdown.prs}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
          
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {(w.exercises||[]).map((ex,i)=>{
              if (ex.isHiit) {
                return (
                  <div key={i} style={{...s.exBlock,background:"rgba(255,209,102,0.04)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"1px solid #FFD16644",padding:18}} className="hiit-glow">
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:10,fontWeight:900,color:"#FFD166",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>⚡ HIIT Interval</div>
                        <div style={{fontWeight:800,fontSize:17,color:"#fff"}}>{ex.name}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:22,fontWeight:800,color:"#FFD166"}}>{ex.duration}s</div>
                        <div style={{fontSize:10,color:"#666",fontWeight:700}}>GEHALTEN</div>
                      </div>
                    </div>
                  </div>
                );
              }

              const eVol = (ex.sets||[]).reduce((a,s)=>a+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0);
              const eKcal = (ex.sets||[]).reduce((a,s)=>a+(parseFloat(s.kcal)||0),0);
              const eKm = (ex.sets||[]).reduce((a,s)=>a+(parseFloat(s.km)||0),0);
              
              const libEx = library?.find(l => l.name === ex.name);
              const tr = libEx ? libEx.trackReps !== false : (ex.sets||[]).some(s => parseInt(s.reps) > 0);
              const tw = libEx ? libEx.trackWeight !== false : (ex.sets||[]).some(s => parseFloat(s.weight) > 0);
              const tk = libEx ? libEx.trackKcal : (ex.sets||[]).some(s => parseFloat(s.kcal) > 0);
              const tm = libEx ? libEx.trackKm : (ex.sets||[]).some(s => parseFloat(s.km) > 0);
              const ti = libEx ? libEx.trackIncline : (ex.sets||[]).some(s => s.incline);
              const tt = libEx ? libEx.trackTempo : (ex.sets||[]).some(s => s.tempo);

              let gtc = "40px";
              if(tr) gtc += " 1fr";
              if(tw) gtc += " 1fr";
              if(tk) gtc += " 1fr";
              if(tm) gtc += " 1fr";
              if(ti) gtc += " 1fr";
              if(tt) gtc += " 1fr";

              return(
                <div key={i} style={{...s.exBlock,background:"rgba(255,255,255,0.03)",backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,0.07)",padding:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <div style={{fontWeight:800,fontSize:16}}>{ex.name}</div>
                    <div style={{display:"flex",gap:6}}>
                      {eVol > 0 && <div style={{fontSize:10,fontWeight:700,color:"#A78BFA",background:"#A78BFA15",padding:"3px 8px",borderRadius:6}}>{eVol}kg</div>}
                      {eKcal > 0 && <div style={{fontSize:10,fontWeight:700,color:"#FF6B6B",background:"#FF6B6B15",padding:"3px 8px",borderRadius:6}}>{eKcal} kcal</div>}
                      {eKm > 0 && <div style={{fontSize:10,fontWeight:700,color:"#4CC9F0",background:"#4CC9F015",padding:"3px 8px",borderRadius:6}}>{eKm.toFixed(1)} km</div>}
                    </div>
                  </div>
                  <div style={{...s.setsH,color:"#555",gridTemplateColumns:gtc,marginBottom:8}}>
                    <span>Satz</span>
                    {tr && <span style={{textAlign:"center"}}>Wdh</span>}
                    {tw && <span style={{textAlign:"center"}}>kg</span>}
                    {tk && <span style={{textAlign:"center"}}>kcal</span>}
                    {tm && <span style={{textAlign:"center"}}>km</span>}
                    {ti && <span style={{textAlign:"center"}}>%</span>}
                    {tt && <span style={{textAlign:"center"}}>km/h</span>}

                  </div>
                  {(ex.sets||[]).map((set,si)=>(
                    <div key={si} style={{...s.setRow,gridTemplateColumns:gtc,marginBottom:6}}>
                      <span style={{...s.setN,width:26,height:26}}>{si+1}</span>
                      {tr && <span style={{background:"rgba(255,107,53,0.08)",border:"1px solid rgba(255,107,53,0.15)",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#FF6B35",fontWeight:700}}>{set.reps || 0}</span>}
                      {tw && <span style={{background:"rgba(167,139,250,0.08)",border:"1px solid rgba(167,139,250,0.15)",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#A78BFA",fontWeight:700}}>{set.weight || 0}</span>}
                      {tk && <span style={{background:"rgba(255,107,107,0.08)",border:"1px solid rgba(255,107,107,0.15)",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#FF6B6B",fontWeight:700}}>{set.kcal || 0}</span>}
                      {tm && <span style={{background:"rgba(76,201,240,0.08)",border:"1px solid rgba(76,201,240,0.15)",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#4CC9F0",fontWeight:700}}>{set.km || 0}</span>}
                      {ti && <span style={{background:"rgba(255,209,102,0.08)",border:"1px solid rgba(255,209,102,0.15)",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#FFD166",fontWeight:700}}>{set.incline || "-"}</span>}
                      {tt && <span style={{background:"rgba(239,71,111,0.08)",border:"1px solid rgba(239,71,111,0.15)",borderRadius:9,padding:"8px",fontSize:12,textAlign:"center",color:"#EF476F",fontWeight:700}}>{set.tempo || "-"}</span>}
                    </div>
                  ))}
                  {ex.sets && ex.sets[0] && ex.sets[0].routePath && ex.sets[0].routePath.length > 0 && (
                    <>
                      <RouteMap path={ex.sets[0].routePath} />
                      <GpsAnalytics path={ex.sets[0].routePath} targetPace={ex.targetPace} />
                    </>
                  )}
                  {ex.sets && ex.sets[0] && ex.targetPace && (!ex.sets[0].routePath || ex.sets[0].routePath.length === 0) && (() => {
                    const actualPaceStr = formatPace(parseFloat(ex.sets[0].tempo || 0));
                    if (actualPaceStr === "-:--") return null;
                    
                    const parsePace = (str) => {
                      if (!str || !str.includes(':')) return 0;
                      const parts = str.split(':');
                      return (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
                    };
                    
                    const targetSecs = parsePace(ex.targetPace);
                    const actualSecs = parsePace(actualPaceStr);
                    const diff = actualSecs - targetSecs;
                    
                    const diffFormatted = diff < 0 
                      ? `-${Math.abs(Math.round(diff))}s (Schneller)` 
                      : (diff > 0 ? `+${Math.round(diff)}s (Langsamer)` : `Punktlandung! 🎉`);
                    const diffColor = diff < 0 ? "#06D6A0" : (diff > 0 ? "#EF476F" : "#FFD166");
                    
                    return (
                      <div style={{marginTop: 15, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 12}}>
                        <div style={{fontSize: 10, fontWeight: 800, color: "#666", textTransform: "uppercase", marginBottom: 6}}>Pace Soll-Ist-Vergleich</div>
                        <div style={{display: "flex", justifyContent: "space-between", alignItems: "center"}}>
                          <div>
                            <div style={{fontSize: 11, color: "#888"}}>Ziel-Pace: <span style={{color: "#fff", fontWeight: "bold"}}>{ex.targetPace} /km</span></div>
                            <div style={{fontSize: 11, color: "#888", marginTop: 2}}>Ist-Pace: <span style={{color: "#fff", fontWeight: "bold"}}>{actualPaceStr} /km</span></div>
                          </div>
                          <div style={{textAlign: "right"}}>
                            <div style={{fontSize: 12, fontWeight: 900, color: diffColor}}>{diffFormatted}</div>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              );

            })}
          </div>
          
          <button style={{display:"flex",alignItems:"center",gap:8,background:"rgba(239,71,111,0.15)",color:"#EF476F",border:"1px solid #EF476F",borderRadius:12,padding:"11px 15px",marginTop:30,width:"100%",justifyContent:"center",fontSize:14,fontWeight:600,textShadow:"0 0 10px rgba(239,71,111,0.5)",boxShadow:"0 0 15px rgba(239,71,111,0.3), inset 0 0 10px rgba(239,71,111,0.2)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}} onClick={()=>del(w.id)}>
            {IC.trash} Training aus Verlauf löschen
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{...s.page, padding: isMobile ? "10px 10px 80px" : s.page.padding, position: "relative"}}>
      <div style={{...s.pageHead, display: "flex", justifyContent: "space-between", alignItems: "flex-start"}}>
        <div><h1 style={{...s.pageTitle, fontSize: isMobile ? 26 : 32}}>Verlauf</h1><p style={s.pageSub}>{data.workouts.length} abgeschlossene Trainings</p></div>
        <div style={{display: "flex", gap: 10, alignItems: "center"}}>
           {!compMode ? (
             <button style={{...s.secBtn, background: "rgba(255,209,102,0.15)", borderColor: "#FFD166", color: "#FFD166", textShadow: "0 0 10px rgba(255,209,102,0.5)", boxShadow: "0 0 15px rgba(255,209,102,0.3), inset 0 0 10px rgba(255,209,102,0.2)", padding: "7px 13px", borderRadius: 10, display: "flex", gap: 6, alignItems: "center"}} onClick={() => setCompMode(true)}>
               {IC.plans} Wochenvergleich
             </button>
           ) : (
             <button style={{...s.secBtn, background: "rgba(239,71,111,0.15)", borderColor: "#EF476F", color: "#EF476F", textShadow: "0 0 10px rgba(239,71,111,0.5)", boxShadow: "0 0 15px rgba(239,71,111,0.3), inset 0 0 10px rgba(239,71,111,0.2)", padding: "7px 13px", borderRadius: 10, display: "flex", gap: 6, alignItems: "center"}} onClick={() => { setCompMode(false); setCompSel([]); }}>
               {IC.x} Vergleich beenden
             </button>
           )}
        </div>
      </div>

      {compMode && (
        <div style={{background: "#FFD16615", border: "1px solid #FFD16633", padding: 14, borderRadius: 16, marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 10, zIndex: 10, backdropFilter: "blur(10px)"}}>
          <div style={{fontSize: 13, fontWeight: 800, color: "#FFD166"}}>Wähle 2 Wochen zum Vergleich ({compSel.length}/2)</div>
          <button 
            disabled={compSel.length !== 2} 
            style={{...s.primaryBtn, background: compSel.length === 2 ? "#FFD166" : "#222", color: "#000", padding: "6px 16px", borderRadius: 8, fontSize: 12, opacity: compSel.length === 2 ? 1 : 0.5}}
            onClick={() => setShowComp(true)}
          >Vergleichen</button>
        </div>
      )}
      {!sorted.length&&<div style={{textAlign:"center",padding:"80px 20px",color:"#555",border:"2px dashed rgba(255,255,255,0.08)",borderRadius:18,background:"rgba(255,255,255,0.02)"}}>Noch keine Trainings aufgezeichnet.</div>}
      <div style={{display:"flex",flexDirection:"column",gap: isMobile ? 28 : 36}}>
        {Object.values(grouped).map((group, gi) => (
          <div key={gi} style={{background:"linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 60%), rgba(18,18,24,0.5)", backdropFilter:"blur(30px) saturate(200%)", WebkitBackdropFilter:"blur(30px) saturate(200%)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:22, padding: isMobile ? 16 : 20, boxShadow:"inset 0 1px 1px rgba(255,255,255,0.07), 0 12px 48px rgba(0,0,0,0.5)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingLeft:4,marginBottom:18, borderBottom:"1px solid rgba(255,255,255,0.06)", paddingBottom:12}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                {compMode && (
                  <input 
                    type="checkbox" 
                    checked={compSel.includes(gi)}
                    disabled={!compSel.includes(gi) && compSel.length >= 2}
                    onChange={(e) => {
                      if (e.target.checked) setCompSel([...compSel, gi]);
                      else setCompSel(compSel.filter(id => id !== gi));

function WeeklyReportMinimal({workouts, isMobile}) {
  const totalD = workouts.reduce((a,w)=>a+(parseInt(w.duration)||0),0);
  const getVol = w => (w.exercises||[]).reduce((a,e) => e.isHiit ? a : a + (e.sets||[]).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0), 0);
  const getKcal = w => (w.exercises||[]).reduce((a,e) => a + (e.sets||[]).reduce((b,s)=>b+(parseFloat(s.kcal)||0),0), 0);
  const getKm = w => (w.exercises||[]).reduce((a,e) => a + (e.sets||[]).reduce((b,s)=>b+(parseFloat(s.km)||0),0), 0);
  
  const totalVol = workouts.reduce((a,w)=>a+getVol(w),0);
  const totalKcal = workouts.reduce((a,w)=>a+getKcal(w),0);
  const totalKm = workouts.reduce((a,w)=>a+getKm(w),0);
  const totalSets = workouts.reduce((a,w)=>a+(w.exercises||[]).reduce((b,e)=>b+(e.isHiit ? 1 : (e.sets||[]).length),0),0);


  const muscleDistribution = {};
  workouts.forEach(w => {
    (w.exercises||[]).forEach(e => {
        // Find in library to get muscles if not stored
        const libEx = (window._lib||[]).find(l => l.name === e.name);
        (libEx?.muscles || []).forEach(m => muscleDistribution[m] = (muscleDistribution[m]||0) + 1);
    });
  });

  return (
    <div>
      <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20}}>
        <div style={{background: "rgba(255,255,255,0.04)", padding: 12, borderRadius: 14, textAlign: "center", border: "1px solid rgba(255,255,255,0.08)"}}>
          <div style={{fontSize: 18, fontWeight: 900, color: "#06D6A0"}}>{totalD} min</div>
          <div style={{fontSize: 9, color: "#666", textTransform: "uppercase", marginTop: 4}}>Dauer</div>
        </div>
        <div style={{background: "rgba(255,255,255,0.04)", padding: 12, borderRadius: 14, textAlign: "center", border: "1px solid rgba(255,255,255,0.08)"}}>
          <div style={{fontSize: 18, fontWeight: 900, color: "#A78BFA"}}>{Math.round(totalVol/1000)}t</div>
          <div style={{fontSize: 9, color: "#666", textTransform:"uppercase", marginTop: 4}}>Volumen</div>
        </div>
        {totalKcal > 0 && (
          <div style={{background: "rgba(255,255,255,0.04)", padding: 12, borderRadius: 14, textAlign: "center", border: "1px solid #FF6B6B33"}}>
            <div style={{fontSize: 18, fontWeight: 900, color: "#FF6B6B"}}>{totalKcal}</div>
            <div style={{fontSize: 9, color: "#666", textTransform: "uppercase", marginTop: 4}}>Kcal</div>
          </div>
        )}
        {totalKm > 0 && (
          <div style={{background: "rgba(255,255,255,0.04)", padding: 12, borderRadius: 14, textAlign: "center", border: "1px solid #4CC9F033"}}>
            <div style={{fontSize: 18, fontWeight: 900, color: "#4CC9F0"}}>{totalKm.toFixed(1)}km</div>
            <div style={{fontSize: 9, color: "#666", textTransform: "uppercase", marginTop: 4}}>Distanz</div>
          </div>
        )}
        <div style={{background: "rgba(255,255,255,0.04)", padding: 12, borderRadius: 14, textAlign: "center", border: "1px solid rgba(255,255,255,0.08)"}}>
          <div style={{fontSize: 18, fontWeight: 900, color: "#FF6B35"}}>{totalSets}</div>
          <div style={{fontSize: 9, color: "#666", textTransform: "uppercase", marginTop: 4}}>Sätze</div>
        </div>
        <div style={{background: "rgba(255,255,255,0.04)", padding: 12, borderRadius: 14, textAlign: "center", border: "1px solid rgba(255,255,255,0.08)"}}>
          <div style={{fontSize: 18, fontWeight: 900, color: "#FFD166"}}>{workouts.length}</div>
          <div style={{fontSize: 9, color: "#666", textTransform: "uppercase", marginTop: 4}}>Workouts</div>
        </div>
      </div>


      <h4 style={{fontSize: 11, fontWeight: 900, color: "#444", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12, borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 15}}>Muskelfokus</h4>
      <div style={{display: "flex", flexDirection: "column", gap: 8}}>
        {Object.entries(muscleDistribution).sort((a,b)=>b[1]-a[1]).slice(0, 5).map(([m, count]) => (
          <div key={m} style={{display: "flex", alignItems: "center", gap: 10}}>
            <div style={{fontSize: 11, fontWeight: 800, color: "#aaa", width: 80}}>{m}</div>
            <div style={{flex: 1, height: 6, background: "rgba(255,255,255,0.06)", borderRadius: 3, overflow: "hidden"}}>
               <div style={{height: "100%", background: MUSCLE_COLORS[m] || "#FF6B35", width: `${Math.min(100, (count/workouts.length)*100)}%`}} />
            </div>
          </div>
        ))}
        {Object.keys(muscleDistribution).length === 0 && <div style={{fontSize: 11, color: "#444"}}>Kein Fokus ermittelbar</div>}
      </div>

      <h4 style={{fontSize: 11, fontWeight: 900, color: "#444", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12, marginTop: 25}}>Trainingsverlauf</h4>
      <div style={{display: "flex", flexDirection: "column", gap: 6}}>
        {workouts.map((w, wi) => (
          <div key={wi} style={{fontSize: 11, background: "#080808", padding: "8px 12px", borderRadius: 8, display: "flex", justifyContent: "space-between", alignItems: "center"}}>
            <div style={{fontWeight: 700}}>{w.name}</div>
            <div style={{color: "#666"}}>{new Date(w.date).toLocaleDateString("de-DE", {weekday: 'short'})}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
function PRPage({prs,setPrs,notify}){
  const [exName,setExName]=useState(""),  [w,setW]=useState(""), [r,setR]=useState(""), [date,setDate]=useState(todayStr());
  const entries=Object.entries(prs).sort((a,b)=>a[0].localeCompare(b[0]));
  const save=()=>{if(!exName.trim()||!w||!r)return notify("Alle Felder ausfüllen","error");const key=exName.toLowerCase().trim();setPrs(p=>({...p,[key]:{name:exName.trim(),weight:parseFloat(w),reps:parseInt(r),date}}));notify(`PR für ${exName} gespeichert! 🏆`);setExName("");setW("");setR("");};
  const del=key=>{setPrs(p=>{const n={...p};delete n[key];return n;});notify("PR gelöscht");};
  return(<div style={s.page}><div style={s.pageHead}><div><h1 style={s.pageTitle}>Bestleistungen</h1><p style={s.pageSub}>Deine persönlichen Rekorde</p></div></div>
    <div style={{...s.card,marginBottom:26}}><h3 style={{...s.cardTitle,marginBottom:14}}>Neuen PR eintragen</h3><div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:11,alignItems:"end"}}><div style={s.fg}><label style={s.lbl}>Übung</label><input style={s.inp} value={exName} onChange={e=>setExName(e.target.value)} placeholder="Bankdrücken" onKeyDown={e=>e.key==="Enter"&&save()}/></div><div style={s.fg}><label style={s.lbl}>Gewicht (kg)</label><input style={s.inp} type="number" value={w} onChange={e=>setW(e.target.value)} placeholder="100"/></div><div style={s.fg}><label style={s.lbl}>Wdh.</label><input style={s.inp} type="number" value={r} onChange={e=>setR(e.target.value)} placeholder="5"/></div><div style={s.fg}><label style={s.lbl}>Datum</label><input style={s.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/></div></div><button style={{...s.primaryBtn,marginTop:7}} onClick={save}>{IC.star} PR speichern</button></div>
    {!entries.length&&<div style={{textAlign:"center",padding:"50px 18px",color:"#555",background:"rgba(255,255,255,0.02)",borderRadius:14,border:"1px solid rgba(255,255,255,0.06)"}}><div style={{fontSize:36,marginBottom:10}}>🏆</div>Noch keine Bestleistungen.</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:14}}>{entries.map(([key,pr])=>(<div key={key} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:18,position:"relative",backdropFilter:"blur(15px)",WebkitBackdropFilter:"blur(15px)"}} className="statCard"><div style={{fontSize:24,marginBottom:7}}>🏆</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:800,marginBottom:5}}>{pr.name||key}</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:26,fontWeight:800,color:"#FFD166"}}>{pr.weight}<span style={{fontSize:13,color:"#888",fontWeight:400}}>kg</span></div><div style={{color:"#888",fontSize:12,marginTop:3}}>{pr.reps} Wdh.</div><div style={{color:"#555",fontSize:10,marginTop:3}}>{pr.date&&fmtDate(pr.date)}</div><button className="cardIconBtn" style={{...s.cardIconBtn,position:"absolute",top:11,right:11, color:"#EF476F", filter:"drop-shadow(0 0 6px rgba(239,71,111,0.8))"}} onClick={()=>del(key)}>{IC.trash}</button></div>))}</div>
  </div>);}
function PlanModal({data,setData,editPlan,onClose,notify,library=[]}){
  const isEdit=!!editPlan;
  const [form,setForm]=useState(isEdit?{...editPlan,exercises:editPlan.exercises.map(e=>typeof e==="string"?{name:e,photo:null}:e)}:{name:"",color:"#FF6B35",days:[],exercises:[]});
  const [exInput,setExInput]=useState("");
  const [showLibPicker,setShowLibPicker]=useState(false);
  const [libSearch,setLibSearch]=useState("");
  const [libFilterM,setLibFilterM]=useState([]);
  const [libFilterT,setLibFilterT]=useState([]);
  const fileRefs=useRef({});
  const toggleDay=day=>setForm(f=>({...f,days:f.days.includes(day)?f.days.filter(d=>d!==day):[...f.days,day]}));
  const addEx=()=>{if(!exInput.trim())return;setForm(f=>({...f,exercises:[...f.exercises,{name:exInput.trim(),photo:null}]}));setExInput("");};
  const addFromLib=libEx=>{
    if(form.exercises.find(e=>e.libId===libEx.id))return notify("Übung bereits im Plan","error");
    setForm(f=>({...f,exercises:[...f.exercises,{
      name:libEx.name,
      photo:libEx.thumbnail||null,
      libId:libEx.id,
      muscles:libEx.muscles,
      types:libEx.types,
      sets:libEx.sets||"",
      reps:libEx.reps||"",
      weight:libEx.weight||"",
      incline:libEx.incline||"",
      tempo:libEx.tempo||"",
      trackSets:libEx.trackSets??true,
      trackReps:libEx.trackReps??true,
      trackWeight:libEx.trackWeight??true,
      trackIncline:libEx.trackIncline??false,
      trackTempo:libEx.trackTempo??false
    }]}));
    notify(`${libEx.name} hinzugefügt! 💪`);
  };
  const setExPhoto=async(idx,file)=>{
    if(!file)return;
    const url = await uploadToStorage(file, `plans/${Date.now()}_${file.name}`);
    setForm(f=>{
      const e=[...f.exercises];
      e[idx]={...e[idx],photo:url};
      return{...f,exercises:e};
    });
  };
  const save=()=>{if(!form.name)return notify("Bitte Namen eingeben","error");if(isEdit)setData(d=>({...d,plans:d.plans.map(p=>p.id===form.id?form:p)}));else setData(d=>({...d,plans:[...d.plans,{id:Date.now(),...form}]}));notify(isEdit?"Plan aktualisiert! ✅":"Plan erstellt! 🎉");onClose();};

  const libFiltered=(library||[]).filter(ex=>{
    const ms=!libFilterM.length||libFilterM.some(m=>ex.muscles?.includes(m));
    const ts=!libFilterT.length||libFilterT.some(t=>ex.types?.includes(t));
    const ss=!libSearch||ex.name.toLowerCase().includes(libSearch.toLowerCase());
    return ms&&ts&&ss;
  });

  return(<>
    <div style={s.overlay2} onClick={onClose}><div style={{...s.modal,maxWidth:560,maxHeight:"88vh",overflowY:"auto",background:"rgba(16,16,22,0.97)",backdropFilter:"blur(32px) saturate(180%)",WebkitBackdropFilter:"blur(32px) saturate(180%)",border:"1px solid rgba(255,255,255,0.2)",boxShadow:"inset 0 1px 1px rgba(255,255,255,0.1), 0 32px 80px rgba(0,0,0,0.85)"}} onClick={e=>e.stopPropagation()} className="dropIn">
    <h2 style={s.modalTitle}>{isEdit?"Plan bearbeiten":"Neuer Trainingsplan"}</h2>

    <div style={s.fg}><label style={s.lbl}>Trainingstage</label><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{FULL_WEEKDAYS.map((day,i)=><button key={day} onClick={()=>toggleDay(day)} style={{...s.dayToggle,...(form.days.includes(day)?{background:form.color,color:"#fff",borderColor:form.color}:{})}}>{WEEKDAYS[i]}</button>)}</div></div>

              {(ex.trackReps !== false) && <div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:9,color:"#666"}}>Wdh</span><input type="number" style={{width:32,background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:4,padding:"2px",color:"#FF6B35",fontSize:10,textAlign:"center",outline:"none"}} value={ex.reps||""} onChange={e=>setForm(f=>{const exs=[...f.exercises];exs[idx]={...exs[idx],reps:e.target.value};return{...f,exercises:exs};})}/></div>}
              {(ex.trackWeight !== false) && <div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:9,color:"#666"}}>kg</span><input type="number" style={{width:38,background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:4,padding:"2px",color:"#A78BFA",fontSize:10,textAlign:"center",outline:"none"}} value={ex.weight||""} onChange={e=>setForm(f=>{const exs=[...f.exercises];exs[idx]={...exs[idx],weight:e.target.value};return{...f,exercises:exs};})}/></div>}
              {ex.trackKcal === true && <div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:9,color:"#666"}}>kcal</span><input type="number" style={{width:38,background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:4,padding:"2px",color:"#FF6B6B",fontSize:10,textAlign:"center",outline:"none"}} value={ex.kcal||""} onChange={e=>setForm(f=>{const exs=[...f.exercises];exs[idx]={...exs[idx],kcal:e.target.value};return{...f,exercises:exs};})}/></div>}
              {ex.trackKm === true && <div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:9,color:"#666"}}>km</span><input type="number" style={{width:38,background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:4,padding:"2px",color:"#4CC9F0",fontSize:10,textAlign:"center",outline:"none"}} value={ex.km||""} onChange={e=>setForm(f=>{const exs=[...f.exercises];exs[idx]={...exs[idx],km:e.target.value};return{...f,exercises:exs};})}/></div>}
              {ex.trackIncline === true && <div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:9,color:"#666"}}>%</span><input type="text" style={{width:32,background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:4,padding:"2px",color:"#FFD166",fontSize:10,textAlign:"center",outline:"none"}} value={ex.incline||""} onChange={e=>setForm(f=>{const exs=[...f.exercises];exs[idx]={...exs[idx],incline:e.target.value};return{...f,exercises:exs};})}/></div>}
              {ex.trackTempo === true && <div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:9,color:"#666"}}>T</span><input type="text" style={{width:32,background:"#1A1A1F",border:"1px solid #2A2A30",borderRadius:4,padding:"2px",color:"#EF476F",fontSize:10,textAlign:"center",outline:"none"}} value={ex.tempo||""} onChange={e=>setForm(f=>{const exs=[...f.exercises];exs[idx]={...exs[idx],tempo:e.target.value};return{...f,exercises:exs};})}/></div>}
            </div>
            </div>
          </div>
        ))}</div>
      </div>
      <div style={{display:"flex",gap:11,marginTop:18}}><button style={s.secBtn} onClick={onClose}>Abbrechen</button><button style={{...s.primaryBtn,flex:1}} onClick={save}>{isEdit?"Speichern":"Plan erstellen"}</button></div>
    </div></div>
  {showLibPicker&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",backdropFilter:"blur(6px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:18}} onClick={()=>setShowLibPicker(false)}>
    <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:18,padding:24,width:"100%",maxWidth:520,maxHeight:"80vh",display:"flex",flexDirection:"column",gap:12,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h3 style={{fontFamily:"'DM Sans',sans-serif",fontSize:17,fontWeight:800,margin:0}}>📚 Übung aus Bibliothek</h3>
        <button style={{background:"transparent",border:"none",color:"#666",cursor:"pointer",display:"flex"}} onClick={()=>setShowLibPicker(false)}>{IC.x}</button>
      </div>
      <input style={s.inp} placeholder="Suchen..." value={libSearch} onChange={e=>setLibSearch(e.target.value)}/>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {MUSCLE_GROUPS.map(m=><button key={m} onClick={()=>setLibFilterM(a=>a.includes(m)?a.filter(x=>x!==m):[...a,m])} style={{background:libFilterM.includes(m)?MUSCLE_COLORS[m]+"22":"rgba(255,255,255,0.04)",border:`1px solid ${libFilterM.includes(m)?MUSCLE_COLORS[m]:"rgba(255,255,255,0.08)"}`,borderRadius:16,padding:"3px 10px",color:libFilterM.includes(m)?MUSCLE_COLORS[m]:"#666",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>{m}</button>)}
      </div>
      <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:7}}>
        {!libFiltered.length&&<div style={{textAlign:"center",padding:"30px",color:"#555",fontSize:13}}>Keine Übungen gefunden</div>}
        {libFiltered.map(ex=>{
          const already=!!form.exercises.find(e=>e.libId===ex.id);
          return(
            <div key={ex.id} style={{display:"flex",alignItems:"center",gap:11,background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 13px",border:`1px solid ${already?"#FF6B3540":"rgba(255,255,255,0.06)"}`}}>
              {ex.thumbnail?<img src={ex.thumbnail} style={{width:40,height:40,borderRadius:7,objectFit:"cover",flexShrink:0}}/>:<div style={{width:40,height:40,borderRadius:7,background:"rgba(255,255,255,0.04)",display:"flex",alignItems:"center",justifyContent:"center",color:"#333",flexShrink:0}}>{IC.muscle}</div>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13}}>{ex.name}</div>
                <div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>
                  {(ex.muscles||[]).map(m=><span key={m} style={{fontSize:9,background:MUSCLE_COLORS[m]+"20",color:MUSCLE_COLORS[m],borderRadius:8,padding:"1px 6px",fontWeight:700}}>{m}</span>)}

            </div>
          );
        })}
      </div>
      <button style={{...s.secBtn,width:"100%"}} onClick={()=>setShowLibPicker(false)}>Schließen</button>
    </div>
  </div>}
  </>);
}
function QuickLogModal({data,setData,onClose,notify}){const [name,setName]=useState(""), [dur,setDur]=useState("");const save=()=>{if(!name)return notify("Name fehlt","error");setData(d=>({...d,workouts:[{id:Date.now(),planId:null,name,date:todayStr(),duration:parseInt(dur)||0,note:"",photo:null,exercises:[]},...d.workouts]}));notify("Gestartet! 🚀");onClose();};return(<div style={s.overlay2} onClick={onClose}><div style={s.modal} onClick={e=>e.stopPropagation()} className="dropIn"><h2 style={s.modalTitle}>Schnell-Log</h2><div style={s.fg}><label style={s.lbl}>Name</label><input style={s.inp} value={name} onChange={e=>setName(e.target.value)} placeholder="Training Name" autoFocus/></div><div style={s.fg}><label style={s.lbl}>Dauer (Min)</label><input style={s.inp} type="number" value={dur} onChange={e=>setDur(e.target.value)} placeholder="60"/></div><div style={{display:"flex",gap:11,marginTop:18}}><button style={s.secBtn} onClick={onClose}>Abbrechen</button><button style={{...s.primaryBtn,flex:1}} onClick={save}>Speichern</button></div></div></div>);}

function WeeklyReportModal({report, onClose, data}) {
  const workouts = report.workouts;
  const totalW = workouts.length;
  const totalD = workouts.reduce((a,w)=>a+(parseInt(w.duration)||0),0);
  
  const getVol = w => (w.exercises||[]).reduce((a,e) => {
    if (e.isHiit) return a;
    return a + (e.sets||[]).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0);
  }, 0);
  const totalVol = workouts.reduce((a,w)=>a+getVol(w),0);
  const totalKcal = workouts.reduce((a,w)=>(w.exercises||[]).reduce((b,e)=>b+(e.sets||[]).reduce((c,s)=>c+(parseFloat(s.kcal)||0),0),a),0);
  const totalKm = workouts.reduce((a,w)=>(w.exercises||[]).reduce((b,e)=>b+(e.sets||[]).reduce((c,s)=>c+(parseFloat(s.km)||0),0),a),0);
  const totalHiitSec = workouts.reduce((a,w)=>(w.exercises||[]).reduce((b,e)=>b+(e.isHiit?(e.duration||0):0),a),0);
  
  const muscleDistribution = {};
  const planCounts = {};
  const daysTrained = [];
  const WDS = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
  
  workouts.forEach(w => {
    const d = new Date(w.date);
    const dayName = WDS[d.getDay()];
    if(!daysTrained.includes(dayName)) daysTrained.push(dayName);
    
    planCounts[w.name] = (planCounts[w.name]||0) + 1;

    const plan = data.plans.find(p => p.id === w.planId);
    if(plan && plan.muscles) {
      plan.muscles.forEach(m => muscleDistribution[m] = (muscleDistribution[m]||0) + 1);
    }
  });
  
  const sortedMuscles = Object.entries(muscleDistribution).sort((a,b)=>b[1]-a[1]);
  const maxMuscle = Math.max(...Object.values(muscleDistribution), 1);

  const exportImage = () => {
    const el = document.getElementById("report-area");
    if(!window.html2canvas) return alert("Export-Bibliothek wird geladen...");
    html2canvas(el, {
      backgroundColor: "#0D0D0F",
      scale: 2,
      useCORS: true
    }).then(canvas => {
      const link = document.createElement("a");
      link.download = `FitForge_Bericht_KW${report.wn}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  };

  return (
    <div style={s.overlay2} onClick={onClose}>
      <div style={{...s.modal, maxWidth:500, padding:0, background:"#0D0D0F", border:"1px solid #1E1E24", overflow:"hidden"}} onClick={e=>e.stopPropagation()} className="dropIn">
        <div id="report-area" style={{padding:24, background:"#0D0D0F"}}>
          <div style={{display:"flex", flexDirection:"column", alignItems:"center", textAlign:"center", marginBottom:30}}>
            <div style={{color:"#FF6B35", marginBottom:6, transform:"scale(1.5)"}}>{IC.bolt}</div>
            <div style={{fontFamily:"'DM Sans',sans-serif", fontSize:22, fontWeight:900, color:"#FF6B35", letterSpacing:1, marginBottom:16}}>FITFORGE</div>
            <h2 style={{...s.modalTitle, margin:0, fontSize:24}}>Wochenbericht KW {report.wn}</h2>
            <div style={{fontSize:13, color:"#666", marginTop:4}}>{report.dateRange} {report.yr}</div>
          </div>
          
          <div style={{display:"flex", gap:8, marginBottom:24}}>
            {WDS.map(day => {
              const active = daysTrained.includes(day);
              return (
                <div key={day} style={{
                  flex:1, height:40, borderRadius:12, display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:12, fontWeight:800, color:active?"#000":"#444", 
                  background:active?"#00D9C0":"#161618",
                  border:active?"none":"1px solid #1E1E24"
                }}>
                  {day}
                </div>
              );
            })}
          </div>

          <div style={{display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:8, marginBottom:24}}>
            {[
              [totalW, "Workouts", "#FF6B35"],
              [`${totalD}m`, "Gesamtzeit", "#00D9C0"],
              [`${Math.round(totalVol/1000)}k`, "Volumen (kg)", "#A78BFA"],
              [`${totalKcal}`, "Kcal", "#FF6B6B"],
              [`${totalKm.toFixed(1)}k`, "Km", "#4CC9F0"],
              [`${Math.floor(totalHiitSec/60)}m`, "HIIT Zeit", "#FFD166"]
            ].filter(x => x[0] !== "0" && x[0] !== "0.0k").map(([v,l,c], i) => (
              <div key={i} style={{background:"#161618", padding:"12px 4px", borderRadius:16, textAlign:"center", border:"1px solid #1E1E24"}}>
                <div style={{fontFamily:"'DM Sans',sans-serif", fontSize: 16, fontWeight: 800, color:c}}>{v}</div>
                <div style={{fontSize: 8, color:"#666", marginTop: 4, textTransform:"uppercase", fontWeight: 700}}>{l}</div>
              </div>
            ))}
          </div>


          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:24}}>
             <div>
               <h3 style={{fontSize:11, fontWeight:800, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:12}}>Trainingseinheiten</h3>
               <div style={{display:"flex", flexDirection:"column", gap:6}}>
                 {Object.entries(planCounts).map(([name, count]) => (
                   <div key={name} style={{fontSize:12, fontWeight:600, color:"#F0EDE8", background:"#161618", padding:"6px 10px", borderRadius:8, display:"flex", justifyContent:"space-between"}}>
                     <span>{name}</span>
                     <span style={{color:"#FF6B35"}}>{count}x</span>
                   </div>
                 ))}
               </div>
             </div>
             <div>
               <h3 style={{fontSize:11, fontWeight:800, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:12}}>Muskelgruppen</h3>
               <div style={{display:"flex", flexDirection:"column", gap:10}}>
                 {sortedMuscles.slice(0, 4).map(([name, count]) => (
                   <div key={name}>
                     <div style={{display:"flex", justifyContent:"space-between", fontSize:10, fontWeight:700, marginBottom:4}}>
                       <span style={{color:"#888"}}>{name}</span>

function PhotoDetailModal({photo, onClose, isMobile}) {
  const [zoom, setZoom] = useState(1);
  const [pos, setPos] = useState({x:0, y:0});
  const [dragging, setDragging] = useState(false);
  const [start, setStart] = useState({x:0, y:0});
  const [initialDist, setInitialDist] = useState(null);

  const handleZoom = (delta) => {
    setZoom(prev => {
      const next = Math.min(Math.max(prev + delta, 1), 5);
      if (next === 1) setPos({x:0, y:0});
      return next;
    });
  };

  const handleStart = (e) => {
    if (e.touches && e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      setInitialDist(dist);
    } else {
      if (zoom <= 1) return;
      setDragging(true);
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      setStart({x: clientX - pos.x, y: clientY - pos.y});
    }
  };

  const handleMove = (e) => {
    if (e.touches && e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (initialDist) {
        const delta = (dist - initialDist) / 150;
        handleZoom(delta);
        setInitialDist(dist);
      }
    } else if (dragging) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      setPos({x: clientX - start.x, y: clientY - start.y});
    }
  };

  const handleEnd = () => {
    setDragging(false);
    setInitialDist(null);
  };

  const handleWheel = (e) => {
    if (e.ctrlKey) {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.2 : 0.2;
      handleZoom(delta);
    }
  };

  useEffect(() => {
    const el = document.getElementById("photoWrapper");
    if (el) el.addEventListener("wheel", handleWheel, { passive: false });
    return () => { if (el) el.removeEventListener("wheel", handleWheel); };
  }, [zoom]);

  return (
    <div style={s.overlay2} onClick={e => e.target === e.currentTarget && onClose()} onMouseMove={handleMove} onMouseUp={handleEnd} onTouchMove={handleMove} onTouchEnd={handleEnd}>
      <div style={{position:"absolute", top:24, right:24, display:"flex", gap:12, zIndex:120}}>
        <button style={{...s.iconCircle, background:"rgba(0,0,0,0.6)", border:"1px solid rgba(255,255,255,0.1)", width:44, height:44, color:"#fff"}} onClick={() => handleZoom(0.5)}>{IC.plus}</button>
        <button style={{...s.iconCircle, background:"rgba(0,0,0,0.6)", border:"1px solid rgba(255,255,255,0.1)", width:44, height:44, color:"#fff"}} onClick={() => handleZoom(-0.5)}>{IC.minus}</button>
        <button style={{...s.iconCircle, background:"#EF476F", border:"none", color:"#fff", marginLeft:8, width:44, height:44, boxShadow:"0 4px 12px rgba(239,71,111,0.3)"}} onClick={onClose}>{IC.x}</button>
      </div>
      
      <div id="photoWrapper" style={{width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", cursor: zoom > 1 ? "grab" : "default"}}
           onMouseDown={handleStart} onTouchStart={handleStart}>
        <img 
          src={photo.url} 
          style={{
            maxWidth:"95%", 
            maxHeight:"95%", 
            objectFit:"contain", 
            transform: `translate(${pos.x}px, ${pos.y}px) scale(${zoom})`,
            transition: dragging ? "none" : "transform 0.2s cubic-bezier(0.16,1,0.3,1)",
            boxShadow: "0 20px 50px rgba(0,0,0,0.5)",
            borderRadius: 8
          }} 
          draggable="false"
        />
      </div>
      
      <div style={{position:"absolute", bottom:30, left:"50%", transform:"translateX(-50%)", background:"rgba(0,0,0,0.6)", backdropFilter:"blur(8px)", padding:"12px 24px", borderRadius:20, textAlign:"center", color:"#fff"}}>
        <div style={{fontFamily:"'DM Sans',sans-serif", fontWeight:800, fontSize:15}}>{fmtDate(photo.date)}</div>
        <div style={{fontSize:11, color:"#FF6B35", fontWeight:700, textTransform:"uppercase", marginTop:2}}>{photo.tag}</div>
      </div>
    </div>
  );
}
